  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAhv0PJy95vqXdzOQkCqbg1FuXfiqHTnI0",
      authDomain:        "task-monitor-bd7ee.firebaseapp.com",
      databaseURL:       "https://task-monitor-bd7ee-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "task-monitor-bd7ee",
      storageBucket:     "task-monitor-bd7ee.firebasestorage.app",
      messagingSenderId: "544624731364",
      appId:             "1:544624731364:web:419d52fa061c5c7b4f38f1",
    };

    const app     = initializeApp(firebaseConfig);
    const db      = getDatabase(app);
    const dataRef = ref(db, "arcpData");

    window._arcp_fb = { update, dataRef };

    onValue(dataRef, snap => {
      const data = snap.val();
      let changed = false;

      if (data) {
        Object.entries(data).forEach(([k, remote]) => {
          // Reset sentinel — either plain string or timestamped object
          if (remote === "__reset__" || (typeof remote === "object" && remote?.value === "__reset__")) {
            localStorage.removeItem(k);
            localStorage.removeItem(k + "__ts");
            changed = true;
            return;
          }
          // Legacy plain string
          if (typeof remote === "string") {
            localStorage.setItem(k, remote);
            localStorage.setItem(k + "__ts", "0");
            changed = true;
            return;
          }
          // Timestamped object — only apply if newer than local
          if (!remote || typeof remote !== "object") return;
          const remoteTs = remote.ts || 0;
          const localTs  = parseInt(localStorage.getItem(k + "__ts") || "0");
          if (remoteTs > localTs) {
            localStorage.setItem(k, remote.value);
            localStorage.setItem(k + "__ts", remoteTs);
            changed = true;
          }
        });
      }

      window.dispatchEvent(new CustomEvent("arcp-sync", { detail: { ok: true, changed } }));
    }, err => {
      console.error("Firebase error:", err);
      window.dispatchEvent(new CustomEvent("arcp-sync", { detail: { ok: false } }));
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #060810; --bg2: #0a0d18; --bg3: #0f1220; --bg4: #141828;
      --blue:  #4f9eff; --blue2: #3a7acc; --blue3: #264d8a; --blue4: #162d57; --blue5: #0a1a36;
      --gim:   #4f9eff; --renal: #a78bfa;

    .logo-line2 { font-size:8px; color:var(--blue3); letter-spacing:0.3em; margin-top:4px; }
    .logo-sub   { font-size:9px; color:var(--blue2); letter-spacing:0.12em; margin-top:3px; }

    .arcp-countdown { padding:14px 20px; border-right:1px solid var(--blue5); display:flex; flex-direction:column; justify-content:center; }
    .countdown-val { font-size:26px; font-weight:700; color:var(--blue); line-height:1; }
    .countdown-val.warn  { color:var(--amber); text-shadow:0 0 8px rgba(255,176,0,0.4); }
    .countdown-val.alert { color:var(--red);   text-shadow:0 0 8px rgba(255,68,68,0.4); }
    .countdown-key { font-size:8px; color:var(--blue3); letter-spacing:0.18em; margin-top:3px; }

    .als-status { padding:14px 20px; border-right:1px solid var(--blue5); display:flex; flex-direction:column; justify-content:center; }
    .als-val { font-size:12px; font-weight:700; color:var(--blue); line-height:1.3; }
    .als-val.warn  { color:var(--amber); }
    .als-val.alert { color:var(--red); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .als-key { font-size:8px; color:var(--blue3); letter-spacing:0.15em; margin-top:3px; }

    .readiness-bar-wrap { flex:1; padding:14px 20px; display:flex; flex-direction:column; justify-content:center; }
    .readiness-label { display:flex; justify-content:space-between; font-size:9px; color:var(--blue3); letter-spacing:0.15em; margin-bottom:6px; }
    .readiness-pct { color:var(--blue); font-weight:700; font-size:11px; }
    .bar-track { height:6px; background:var(--blue5); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--blue3),var(--blue)); transition:width 0.5s ease; }
    .bar-fill.warn { background:linear-gradient(90deg,#8a5500,var(--amber)); }
    .bar-fill.good { background:linear-gradient(90deg,#0a4a1a,var(--green)); }

    .year-sel-wrap { padding:14px 20px; border-left:1px solid var(--blue5); display:flex; flex-direction:column; justify-content:center; gap:6px; }
    .year-label { font-size:8px; color:var(--blue3); letter-spacing:0.18em; }
    .year-btns  { display:flex; gap:4px; }
    .year-btn { padding:4px 10px; background:transparent; border:1px solid var(--blue5); color:var(--dim); font-family:var(--font); font-size:10px; cursor:pointer; transition:all 0.12s; }

    .year-btn.active { background:var(--blue4); border-color:var(--blue); color:var(--blue); font-weight:700; }
    .year-btn.locked { border-color:var(--green); color:var(--green); opacity:0.7; }
    .year-btn.locked.active { background:rgba(57,255,20,0.08); border-color:var(--green); color:var(--green); font-weight:700; opacity:1; }

    .locked-banner { background:rgba(57,255,20,0.05); border:1px solid rgba(57,255,20,0.2); border-left:3px solid var(--green); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; cursor:pointer; }
    .locked-banner:hover { background:rgba(57,255,20,0.08); }
    .locked-banner-left { display:flex; flex-direction:column; gap:4px; }
    .locked-outcome { font-size:11px; font-weight:700; color:var(--green); letter-spacing:0.1em; }
    .locked-note    { font-size:9px; color:var(--dim); letter-spacing:0.08em; }
    .locked-toggle  { font-size:10px; color:var(--dim); letter-spacing:0.1em; }

    .outcome-selector { display:flex; align-items:center; gap:8px; margin-bottom:20px; padding:10px 14px; background:var(--bg2); border:1px solid var(--blue5); flex-wrap:wrap; }
    .outcome-label { font-size:9px; color:var(--blue3); letter-spacing:0.15em; }
    .outcome-select { background:var(--bg); border:1px solid var(--blue4); color:var(--blue); font-family:var(--font); font-size:11px; padding:5px 10px; outline:none; cursor:pointer; }
    .outcome-select option { background:var(--bg2); }
    .outcome-clear { background:none; border:1px solid var(--blue5); color:var(--dim); font-family:var(--font); font-size:9px; padding:4px 10px; cursor:pointer; letter-spacing:0.08em; transition:all 0.1s; }
    .outcome-clear:hover { border-color:var(--red); color:var(--red); }

    /* ── Tab bar ── */
    #tabbar { background:var(--bg3); border-bottom:1px solid var(--blue4); padding:0 24px; display:flex; align-items:stretch; overflow-x:auto; }
    .tab { padding:10px 16px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--dim); font-family:var(--font); font-size:10px; letter-spacing:0.1em; cursor:pointer; transition:all 0.12s; white-space:nowrap; }
    .tab:hover { color:var(--blue2); }
    .tab.active { color:var(--blue); border-bottom-color:var(--blue); }
    .tab.gim-tab.active   { color:var(--gim);   border-bottom-color:var(--gim); }
    .tab.renal-tab.active { color:var(--renal); border-bottom-color:var(--renal); }

    /* ── Main ── */
    #main { padding:20px 24px 80px; }

    .sec-head { display:flex; align-items:baseline; gap:12px; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--blue5); }

    .sec-rule { flex:1; height:1px; background:var(--blue5); }
    .sec-note { font-size:9px; color:var(--dim); letter-spacing:0.08em; }

    .req-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:10px; margin-bottom:24px; }

    .req-card { background:var(--bg2); border:1px solid var(--blue5); border-left:3px solid; padding:12px 14px; transition:background 0.1s; }
    .req-card:hover { background:var(--bg3); }
    .req-card.met     { border-left-color:var(--green); }
    .req-card.partial { border-left-color:var(--amber); }
    .req-card.unmet   { border-left-color:var(--red); }
    .req-card.na      { border-left-color:var(--dim); opacity:0.45; }
    .req-card.warn    { border-left-color:var(--amber); }

    .req-label { font-size:11px; color:#c8d8ff; font-weight:500; margin-bottom:8px; line-height:1.3; }
    .badge { font-size:8px; font-weight:700; letter-spacing:0.1em; padding:1px 5px; border-radius:2px; margin-left:5px; vertical-align:middle; }
    .badge-gim   { background:rgba(79,158,255,0.15);  color:var(--gim);   border:1px solid rgba(79,158,255,0.3); }
    .badge-renal { background:rgba(167,139,250,0.15); color:var(--renal); border:1px solid rgba(167,139,250,0.3); }
    .badge-both  { background:rgba(170,187,255,0.1);  color:#aabbff;      border:1px solid rgba(170,187,255,0.25); }

    .req-progress { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .req-track { flex:1; height:4px; background:var(--blue5); border-radius:2px; overflow:hidden; }
    .req-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }
    .req-fill.met     { background:var(--green); }
    .req-fill.partial { background:var(--amber); }
    .req-fill.unmet   { background:var(--red); }

    .req-count { font-size:11px; font-weight:700; white-space:nowrap; min-width:60px; text-align:right; }
    .req-count.met     { color:var(--green); }
    .req-count.partial { color:var(--amber); }
    .req-count.unmet   { color:var(--red); }

    .req-controls { display:flex; align-items:center; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .req-input { background:var(--bg); border:1px solid var(--blue4); color:var(--blue); font-family:var(--font); font-size:12px; padding:4px 8px; width:65px; outline:none; transition:border-color 0.12s; caret-color:var(--blue); }
    .req-input:focus { border-color:var(--blue); }
    .req-input.date-inp { width:130px; }
    .req-unit   { font-size:9px; color:var(--dim); letter-spacing:0.08em; }
    .req-target { font-size:9px; color:var(--blue3); letter-spacing:0.06em; }

    .req-check { display:flex; align-items:center; gap:8px; margin-top:8px; }
    .chk { width:16px; height:16px; border:1px solid var(--blue4); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--green); transition:all 0.15s; flex-shrink:0; }
    .chk.checked { background:var(--blue4); border-color:var(--blue); box-shadow:0 0 6px rgba(79,158,255,0.3); }
    .chk-label { font-size:10px; color:var(--dim); letter-spacing:0.06em; cursor:pointer; }

    .req-deadline { font-size:8px; color:var(--dim); margin-top:5px; letter-spacing:0.08em; }
    .req-deadline.soon { color:var(--amber); }
    .req-deadline.past { color:var(--red); }

    /* DOPS grid */
    .dops-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; margin-bottom:24px; }
    .dops-card { background:var(--bg2); border:1px solid var(--blue5); border-left:3px solid var(--dim); padding:10px 12px; display:flex; align-items:center; gap:10px; transition:background 0.1s; }
    .dops-card:hover { background:var(--bg3); }
    .dops-card.done { border-left-color:var(--green); }
    .dops-label { flex:1; font-size:11px; color:#c8d8ff; line-height:1.3; }
    .dops-chk { width:16px; height:16px; border:1px solid var(--blue4); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--green); transition:all 0.15s; flex-shrink:0; }
    .dops-chk.checked { background:var(--blue4); border-color:var(--blue); box-shadow:0 0 6px rgba(79,158,255,0.3); }

    /* Summary */
    .summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:24px; }
    .sum-cell { background:var(--bg2); border:1px solid var(--blue5); padding:12px 14px; text-align:center; }
    .sum-val { font-size:26px; font-weight:700; line-height:1; }
    .sum-val.green { color:var(--green); text-shadow:0 0 8px rgba(57,255,20,0.25); }
    .sum-val.amber { color:var(--amber); }
    .sum-val.red   { color:var(--red); }
    .sum-val.blue  { color:var(--blue); }
    .sum-key { font-size:8px; color:var(--blue3); letter-spacing:0.15em; margin-top:4px; }

    /* Status bar */
    #statusbar { position:fixed; bottom:0; left:0; right:0; background:var(--bg3); border-top:1px solid var(--blue4); padding:6px 24px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
    .status-left { display:flex; gap:16px; flex-wrap:wrap; }
    .status-item { font-size:9px; color:var(--blue3); letter-spacing:0.1em; }
    .status-item strong { color:var(--blue); }
    .btn-reset { background:transparent; border:1px solid var(--blue5); color:var(--dim); font-family:var(--font); font-size:9px; letter-spacing:0.1em; padding:3px 10px; cursor:pointer; }
    .btn-reset:hover { border-color:var(--red); color:var(--red); }

    @media (max-width:640px) {
      .req-grid, .dops-grid { grid-template-columns:1fr; }
      .year-sel-wrap { display:none; }
      #main { padding:14px 16px 80px; }
    }
  </style>

</head>

<script>
// ══════════════════════════════════════════════════════
//  ARCP DATES — ST4 started Feb 2026
// ══════════════════════════════════════════════════════
const ARCP_DEFAULTS = {
  ST4: "2026-12-01",
  ST5: "2027-12-01",
  ST6: "2028-12-01",
  ST7: "2029-12-01",
};

const YEARS = ["ST4","ST5","ST6","ST7"];
let currentYear = "ST4";
let currentTab  = "gim";

// ══════════════════════════════════════════════════════
//  GIM DOPS PROCEDURES (cumulative — once done, done)
// ══════════════════════════════════════════════════════
const DOPS_PROCEDURES = [

  "Temporary cardiac pacing using an external device",
  "Central venous cannulation (internal jugular or subclavian)",
  "Access to circulation for resuscitation (femoral vein or intraosseous)",
  "Pleural aspiration for fluid (diagnostic)",
  "Pleural aspiration (pneumothorax)",
  "Intercostal drain for pneumothorax",

  "Ascitic tap",
  "Abdominal paracentesis",
  "Lumbar puncture",
];

// ══════════════════════════════════════════════════════
//  REQUIREMENTS
// ══════════════════════════════════════════════════════
const REQS = {
  // ── GIM Annual ──────────────────────────────────────

    label:"GIM ACATs", stream:"gim", type:"number",
    target:4, unit:"ACATs", deadline:"annual",

    label:"GIM MCRs", stream:"gim", type:"number",
    target:2, unit:"MCRs", deadline:"annual",

  gim_msf_raters: {

  },

    deadline:"ST7", sharedWith:"renal_patient_survey_st7",
    note:"Shared with Renal — only needed once",

// ══════════════════════════════════════════════════════
//  ARCP OUTCOME PER YEAR
// ══════════════════════════════════════════════════════
const LOCKING_OUTCOMES = ["1","2","6","8"];
function outcomeKey(yr)    { return `pft_arcp_outcome_${yr}`; }
function getOutcome(yr)    { return localStorage.getItem(outcomeKey(yr)) || ""; }
function setOutcome(yr, v) {
  localStorage.setItem(outcomeKey(yr), v);
  fbPush(outcomeKey(yr), v);
  renderYearBtns();
  renderAll();
}
function isYearLocked(yr)  { return LOCKING_OUTCOMES.includes(getOutcome(yr)); }

// ══════════════════════════════════════════════════════
//  STORAGE — localStorage + Firebase timestamped sync
// ══════════════════════════════════════════════════════
function fbPush(key, val) {
  if (!window._arcp_fb) return;
  const { update, dataRef } = window._arcp_fb;
  const ts = Date.now();
  localStorage.setItem(key + "__ts", ts);
  update(dataRef, { [key]: { value: String(val), ts } })
    .catch(e => console.error("FB write error:", e));
}

function getARCPDate(yr) {
  const custom = localStorage.getItem(`pft_arcp_date_${yr}`);
  return custom ? new Date(custom) : new Date(ARCP_DEFAULTS[yr]);
}
function setARCPDate(yr, val) {
  localStorage.setItem(`pft_arcp_date_${yr}`, val);
  fbPush(`pft_arcp_date_${yr}`, val);
  updateCountdown();
  renderAdmin();
}

function sKey(reqId) {
  const req = REQS[reqId];
  if (!req) return `pft_${currentYear}_${reqId}`;
  if (req.cumulative) return `pft_cum_${reqId}`;
  return `pft_${currentYear}_${reqId}`;
}
function dopsKey(proc) { return `pft_dops_${proc.replace(/\s+/g,'_').toLowerCase()}`; }
function adminKey(id)  { return `pft_admin_${currentYear}_${id}`; }
function alsKey()      { return "pft_als_expiry"; }

function getVal(reqId) {
  const req = REQS[reqId];
  if (!req) return false;
  const raw = localStorage.getItem(sKey(reqId));
  if (req.type === "checkbox") return raw === "true";
  return raw ? parseInt(raw) : 0;
}
function setVal(reqId, val) {
  const k = sKey(reqId);
  localStorage.setItem(k, String(val));
  fbPush(k, val);
  const req = REQS[reqId];
  if (req && req.sharesTo) {
    const k2 = sKey(req.sharesTo);
    localStorage.setItem(k2, String(val));
    fbPush(k2, val);
  }
  updateReadiness();
}
function getDops(proc)   { return localStorage.getItem(dopsKey(proc)) === "true"; }
function setDops(proc,v) {
  const k = dopsKey(proc);
  localStorage.setItem(k, String(v));
  fbPush(k, v);
  updateDopsCount();
}
function getAdmin(id)    { return localStorage.getItem(adminKey(id)) === "true"; }
function setAdmin(id,v)  {
  const k = adminKey(id);
  localStorage.setItem(k, String(v));
  fbPush(k, v);
}
function getALS()        { return localStorage.getItem(alsKey()) || ""; }
function setALS(val)     {
  localStorage.setItem(alsKey(), val);
  fbPush(alsKey(), val);
  updateALSDisplay();
}

// ══════════════════════════════════════════════════════
//  STATUS
// ══════════════════════════════════════════════════════
function getStatus(reqId) {
  const req = REQS[reqId];
  if (!req) return "unmet";
  if (req.type === "eseneph") return esenephStatus();
  const val = getVal(reqId);
  if (req.type === "checkbox") {
    if (isDeadlineFuture(req.deadline) && !val) return "na";
    return val ? "met" : (isDeadlinePast(req.deadline) ? "unmet" : "partial");
  }
  if (val >= req.target) return "met";
  if (val > 0)           return "partial";
  return "unmet";
}
function isDeadlinePast(d)   { return d !== "annual" && YEARS.indexOf(d) < YEARS.indexOf(currentYear); }
function isDeadlineFuture(d) { return d !== "annual" && YEARS.indexOf(d) > YEARS.indexOf(currentYear); }
function deadlineLabel(d) {
  if (d === "annual") return "// required this year";
  if (isDeadlinePast(d)) return `// deadline was ${d}`;
  if (YEARS.indexOf(d) === YEARS.indexOf(currentYear)) return `// due this year (${d})`;
  return `// due by ${d}`;
}
function deadlineClass(d) {
  if (d === "annual") return "";
  if (isDeadlinePast(d)) return "past";
  if (YEARS.indexOf(d) === YEARS.indexOf(currentYear)) return "soon";
  return "";
}

// ══════════════════════════════════════════════════════
//  ARCP COUNTDOWN
// ══════════════════════════════════════════════════════
function updateCountdown() {
  const arcp  = getARCPDate(currentYear);
  const today = new Date(); today.setHours(0,0,0,0);
  const days  = Math.round((arcp - today) / 86400000);
  const el    = document.getElementById("arcp-days");
  el.textContent = days > 0 ? days : "PAST";
  el.className   = "countdown-val" + (days < 60 ? " alert" : days < 120 ? " warn" : "");
  document.getElementById("sb-arcp").textContent =
    arcp.toLocaleDateString("en-GB",{month:"short",year:"numeric"});
}

// ══════════════════════════════════════════════════════
//  ALS DISPLAY
// ══════════════════════════════════════════════════════
function updateALSDisplay() {
  const val = getALS();
  const el  = document.getElementById("als-display");
  if (!val) { el.textContent = "NOT SET"; el.className = "als-val"; return; }
  const expiry = new Date(val);
  const today  = new Date(); today.setHours(0,0,0,0);
  const daysTo = Math.round((expiry - today) / 86400000);
  const alert6m = daysTo < 183;
  const expired = daysTo < 0;
  el.textContent = expired
    ? `EXPIRED ${expiry.toLocaleDateString("en-GB",{month:"short",year:"numeric"})}`
    : `${expiry.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})} (${daysTo}d)`;
  el.className = "als-val" + (expired ? " alert" : alert6m ? " warn" : "");
}

// ══════════════════════════════════════════════════════
//  READINESS
// ══════════════════════════════════════════════════════
function updateReadiness() {
  const relevant = Object.keys(REQS).filter(id => {
    const req = REQS[id];
    if (req.deadline === "annual") return true;
    return YEARS.indexOf(req.deadline) <= YEARS.indexOf(currentYear);
  });
  const met        = relevant.filter(id => getStatus(id) === "met").length;
  const dopsDone   = DOPS_PROCEDURES.filter(p => getDops(p)).length;
  const dopsTotal  = DOPS_PROCEDURES.length;
  const adminDone  = ADMIN_DOCS.filter(doc => getAdmin(doc.id)).length;
  const adminTotal = ADMIN_DOCS.length;
  const alsOk      = getALS() && (() => {
    const d = Math.round((new Date(getALS()) - new Date()) / 86400000);
    return d > 0;
  })() ? 1 : 0;
  const totalAll = relevant.length + dopsTotal + adminTotal + 1; // +1 for ALS
  const metAll   = met + dopsDone + adminDone + alsOk;
  const pct = totalAll > 0 ? Math.round((metAll/totalAll)*100) : 0;
  document.getElementById("readiness-pct").textContent    = `${pct}%`;
  document.getElementById("readiness-detail").textContent = `${metAll} of ${totalAll} requirements met`;
  const bar = document.getElementById("readiness-bar");
  bar.style.width = `${pct}%`;
  bar.className   = "bar-fill" + (pct >= 80 ? " good" : pct >= 50 ? "" : " warn");
}

function updateDopsCount() {
  const done = DOPS_PROCEDURES.filter(p => getDops(p)).length;
  const el   = document.getElementById("dops-count");
  if (el) el.textContent = `${done} / ${DOPS_PROCEDURES.length} completed`;
}

    b.className  = "year-btn" + (active ? " active" : "") + (locked ? " locked" : "");
    b.title      = locked ? `${yr} — Outcome ${getOutcome(yr)} (locked)` : "";
  });

  currentYear = yr;

  currentTab = tab;
  const tabs = document.querySelectorAll(".tab");

  ["gim","renal","admin","overview"].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? "block" : "none";

      </div>
      <div class="sum-cell">
        <div class="sum-val red">${gimUnmet}</div>
        <div class="sum-key">GIM UNMET</div>
      </div>
      <div class="sum-cell">
        <div class="sum-val green">${renalMet}</div>
        <div class="sum-key">RENAL MET</div>
      </div>
      <div class="sum-cell">
        <div class="sum-val red">${renalUnmet}</div>
        <div class="sum-key">RENAL UNMET</div>
      </div>
      <div class="sum-cell">
        <div class="sum-val blue">${dopsDone}</div>
        <div class="sum-key">DOPS DONE</div>
      </div>
      <div class="sum-cell">
        <div class="sum-val ${dopsDone === DOPS_PROCEDURES.length ? 'green' : 'amber'}">${DOPS_PROCEDURES.length - dopsDone}</div>
        <div class="sum-key">DOPS LEFT</div>
      </div>
    </div>`;

  // Outstanding
  const outstanding = allIds.filter(id => {
    const s = getStatus(id);
    return s === "unmet" || s === "partial";
  });

  if (outstanding.length > 0) {
    el.appendChild(makeSection("OUTSTANDING / IN PROGRESS","gim",
      "All items not yet fully met", outstanding));
  } else {
    el.innerHTML += `
      <div style="text-align:center;padding:40px;color:var(--green);font-size:13px;letter-spacing:0.1em;">
        ✓ ALL REQUIREMENTS MET FOR ${currentYear}
      </div>`;
  }
}

// ══════════════════════════════════════════════════════
//  CARD BUILDERS
// ══════════════════════════════════════════════════════
function makeSection(title, stream, note, reqIds) {
  const wrap = document.createElement("div");
  wrap.style.marginBottom = "24px";
  const head = document.createElement("div");
  head.className = "sec-head";
  head.innerHTML = `
    <span class="sec-title ${stream}">${title}</span>
    <span class="sec-rule"></span>
    <span class="sec-note">${note}</span>`;
  wrap.appendChild(head);
  const grid = document.createElement("div");
  grid.className = "req-grid";
  reqIds.forEach(id => grid.appendChild(makeCard(id, REQS[id])));
  wrap.appendChild(grid);
  return wrap;
}

function esenephKey() { return "pft_eseneph_date"; }
function getEseneph() { return localStorage.getItem(esenephKey()) || ""; }
function setEseneph(val) {
  localStorage.setItem(esenephKey(), val);
  fbPush(esenephKey(), val);
  updateReadiness();
  renderRenal();
}

function esenephStatus() {
  if (currentYear === "ST4" || currentYear === "ST5") return "na";
  const val = getEseneph();
  if (currentYear === "ST7") return val ? "met" : "unmet";
  // ST6
  if (!val) return "unmet";
  const examDate = new Date(val);
  const today    = new Date(); today.setHours(0,0,0,0);
  return examDate <= today ? "met" : "partial";
}

function makeCard(reqId, req) {
  // Special handling for ESENeph
  if (req.type === "eseneph") {
    const val    = getEseneph();
    const status = esenephStatus();
    const card   = document.createElement("div");
    card.className = `req-card ${status}`;
    card.id = `card-${reqId}`;

    const today     = new Date(); today.setHours(0,0,0,0);
    const alertDate = new Date("2027-12-01"); // 1 year before ST6 ARCP Dec 2028
    const daysToAlert = Math.round((alertDate - today) / 86400000);
    const shouldAlert = daysToAlert < 366 && daysToAlert > 0;
    const examDate  = val ? new Date(val) : null;
    const examPast  = examDate && examDate <= today;

    let statusNote = "// not yet booked";
    let noteClass  = "past";
    if (examPast)      { statusNote = `// ✓ sat ${examDate.toLocaleDateString("en-GB",{month:"short",year:"numeric"})}`; noteClass = ""; }
    else if (val)      { statusNote = `// booked ${examDate.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}`; noteClass = "soon"; }
    else if (shouldAlert) { statusNote = `// !! book now — exam within 1 year`; noteClass = "past"; }

    let cardBody = "";
    if (currentYear === "ST4" || currentYear === "ST5") {
      cardBody = `
        <div class="req-controls" style="margin-top:8px;">
          <input class="req-input date-inp" type="date"
            value="${val}"
            placeholder="exam date"
            onchange="setEseneph(this.value)" />
          <span class="req-unit">exam date sat / to sit</span>
        </div>
        <div class="req-deadline ${noteClass}">
          ${statusNote} · ${req.note}
        </div>`;
    } else if (currentYear === "ST7") {
      cardBody = `
        <div class="req-check" style="margin-top:8px;">
          <div class="chk ${val ? "checked" : ""}" style="opacity:0.6;cursor:default;">
            ${val ? "✓" : ""}
          </div>
          <span style="font-size:10px;color:${val ? "var(--green)" : "var(--red)"};letter-spacing:0.06em;">
            ${val ? `Sat ${examDate.toLocaleDateString("en-GB",{month:"short",year:"numeric"})}` : "!! Should have been completed in ST6"}
          </span>
        </div>
        <div class="req-deadline ${val ? "" : "past"}">// deadline was ST6 · ${req.note}</div>`;
    } else {
      // ST6 — active with date picker
      cardBody = `
        ${shouldAlert && !val ? `<div style="font-size:9px;color:var(--red);margin-bottom:6px;letter-spacing:0.08em;animation:pulse 2s ease-in-out infinite;">!! BOOK NOW — within 1 year of ST6 deadline</div>` : ""}
        <div class="req-controls" style="margin-top:8px;">
          <input class="req-input date-inp" type="date"
            value="${val}"
            placeholder="exam date"
            onchange="setEseneph(this.value)" />
          <span class="req-unit">exam date sat / to sit</span>
        </div>
        <div class="req-deadline ${noteClass}">
          ${statusNote} · ${req.note}
        </div>`;
    }

    card.innerHTML = `
      <div class="req-label">ESENeph Exam
        <span class="badge badge-renal">RENAL</span>
      </div>
      ${cardBody}`;
    return card;
  }
  const val    = getVal(reqId);
  const status = getStatus(reqId);
  const card   = document.createElement("div");
  card.className = `req-card ${status}`;
  card.id = `card-${reqId}`;

  const streamBadge = req.stream === "gim"
    ? `<span class="badge badge-gim">GIM</span>`
    : `<span class="badge badge-renal">RENAL</span>`;

  const sharedNote = req.sharesTo
    ? `<div style="font-size:8px;color:var(--renal);margin-top:3px;letter-spacing:0.08em;">// also applies to GIM</div>`
    : req.sharedWith
    ? `<div style="font-size:8px;color:var(--dim);margin-top:3px;letter-spacing:0.08em;">// auto-filled from Renal</div>`
    : "";

  const deadlineHtml = `
    <div class="req-deadline ${deadlineClass(req.deadline)}">
      ${deadlineLabel(req.deadline)}${req.note ? ` · ${req.note}` : ""}
    </div>`;

  if (req.type === "checkbox") {
    const disabled = req.sharedWith ? 'style="opacity:0.6;cursor:default;"' : "";
    card.innerHTML = `
      <div class="req-label">${req.label} ${streamBadge}</div>
      ${sharedNote}
      <div class="req-check">
        <button class="chk ${val ? "checked" : ""}" id="chk-${reqId}"
          ${disabled} onclick="${req.sharedWith ? '' : `toggleCheck('${reqId}')`}">
          ${val ? "✓" : ""}
        </button>
        <span class="chk-label" onclick="${req.sharedWith ? '' : `toggleCheck('${reqId}')`}">
          ${val ? "COMPLETE" : "NOT YET DONE"}
        </span>
      </div>
      ${deadlineHtml}`;
  } else {
    const pct    = Math.min(100, Math.round((val / req.target) * 100));
    const cumTag = req.cumulative
      ? `<span style="font-size:8px;color:var(--dim);margin-left:4px;">(cumulative)</span>` : "";
    card.innerHTML = `
      <div class="req-label">${req.label} ${streamBadge} ${cumTag}</div>
      ${sharedNote}
      <div class="req-progress">
        <div class="req-track">
          <div class="req-fill ${status}" style="width:${pct}%"></div>
        </div>
        <span class="req-count ${status}">${val} / ${req.target}</span>
      </div>
      <div class="req-controls">
        <input class="req-input" type="number" min="0" value="${val}"
          onchange="updateNumber('${reqId}', this.value)"
          oninput="liveUpdate('${reqId}', this.value)" />
        <span class="req-unit">${req.unit}</span>
        <span class="req-target">· target ${req.target}</span>
      </div>
      ${deadlineHtml}`;
  }
  return card;
}

// ══════════════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════════════
function toggleCheck(reqId) {
  const current = getVal(reqId);
  setVal(reqId, !current);
  refreshCard(reqId);
  // If this req shares to another, refresh that card too
  const req = REQS[reqId];
  if (req && req.sharesTo) refreshCard(req.sharesTo);
}

function toggleDops(proc) {
  const current = getDops(proc);
  setDops(proc, !current);
  const safeId = proc.replace(/\s+/g,'_');
  const card   = document.getElementById(`dops-${safeId}`);
  if (card) {
    card.className = `dops-card ${!current ? "done" : ""}`;
    const chk = card.querySelector(".dops-chk");
    if (chk) { chk.className = `dops-chk ${!current ? "checked" : ""}`; chk.textContent = !current ? "✓" : ""; }
  }
  updateDopsCount();
}

function toggleAdmin(id) {
  const current = getAdmin(id);
  setAdmin(id, !current);
  const card = document.getElementById(`admin-${id}`);
  if (card) {
    const doc = ADMIN_DOCS.find(d => d.id === id);
    card.replaceWith((() => {
      const newCard = document.createElement("div");
      const done = !current;
      newCard.className = `req-card ${done ? "met" : "unmet"}`;
      newCard.id = `admin-${id}`;
      newCard.innerHTML = `
        <div class="req-label">${doc.label}<span class="badge badge-both">ANNUAL</span></div>
        <div class="req-check">
          <button class="chk ${done ? "checked" : ""}" onclick="toggleAdmin('${id}')">
            ${done ? "✓" : ""}
          </button>
          <span class="chk-label" onclick="toggleAdmin('${id}')">${done ? "IN LIBRARY" : "NOT YET DONE"}</span>
        </div>
        <div class="req-deadline">${doc.note}</div>`;
      return newCard;
    })());
  }
}

function updateNumber(reqId, rawVal) {
  const val = Math.max(0, parseInt(rawVal) || 0);
  setVal(reqId, val);
  refreshCard(reqId);
}

function liveUpdate(reqId, rawVal) {
  const val    = Math.max(0, parseInt(rawVal) || 0);
  const req    = REQS[reqId];
  const status = val >= req.target ? "met" : val > 0 ? "partial" : "unmet";
  const pct    = Math.min(100, Math.round((val / req.target) * 100));
  const card   = document.getElementById(`card-${reqId}`);
  if (!card) return;
  const fill  = card.querySelector(".req-fill");
  const count = card.querySelector(".req-count");
  if (fill)  { fill.style.width = `${pct}%`; fill.className = `req-fill ${status}`; }
  if (count) { count.textContent = `${val} / ${req.target}`; count.className = `req-count ${status}`; }
  card.className = `req-card ${status}`;
  setVal(reqId, val);
}

function refreshCard(reqId) {
  const req  = REQS[reqId];
  const card = document.getElementById(`card-${reqId}`);
  if (card && req) card.replaceWith(makeCard(reqId, req));
}

function resetYearData() {
  if (!confirm(`Reset all annual data for ${currentYear}? Cumulative and DOPS data will not be affected.`)) return;
  const updates = {};
  const ts = Date.now();
  Object.keys(REQS).forEach(id => {
    if (!REQS[id].cumulative) {
      const k = `pft_${currentYear}_${id}`;
      localStorage.removeItem(k);
      localStorage.removeItem(k + "__ts");
      updates[k] = { value: "__reset__", ts };
    }
  });
  ADMIN_DOCS.forEach(doc => {
    const k = adminKey(doc.id);
    localStorage.removeItem(k);
    localStorage.removeItem(k + "__ts");
    updates[k] = { value: "__reset__", ts };
  });
  if (window._arcp_fb) {
    const { update, dataRef } = window._arcp_fb;
    update(dataRef, updates).catch(e => console.error("FB reset error:", e));
  }
  renderAll();
}

// ══════════════════════════════════════════════════════
//  INIT — render immediately from localStorage (no blank
//          screen), update when Firebase responds
// ══════════════════════════════════════════════════════
renderAll();
setTab("gim");

window.addEventListener("arcp-sync", e => {
  const { ok, changed } = e.detail;
  const indicator = document.getElementById("sync-indicator");
  indicator.textContent = ok ? "● LIVE" : "● OFFLINE";
  indicator.style.color = ok ? "var(--green)" : "var(--red)";
  // Only re-render if Firebase actually changed something
  if (ok && changed) {
    const activeTab = currentTab || "gim";
    renderAll();
    setTab(activeTab);
  }
});

setInterval(updateCountdown, 60000);

// ── Service Worker registration ───────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./arcp-sw.js").then(reg => {
    // Check for updates every time the page loads
    reg.update();

    // When a new SW is waiting, activate it and reload
    reg.addEventListener("updatefound", () => {
      const newWorker = reg.installing;
      newWorker.addEventListener("statechange", () => {
        if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
          // New version available — tell it to skip waiting then reload
          newWorker.postMessage("skipWaiting");
        }
      });
    });
  }).catch(err => console.warn("SW registration failed:", err));

  // Reload page when new SW takes control
  let refreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (!refreshing) {
      refreshing = true;
      window.location.reload();
    }
  });
}
</script>

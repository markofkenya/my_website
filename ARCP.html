<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ARCP // Portfolio Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="ARCP" />
  <meta name="theme-color" content="#060810" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAhv0PJy95vqXdzOQkCqbg1FuXfiqHTnI0",
      authDomain:        "task-monitor-bd7ee.firebaseapp.com",
      databaseURL:       "https://task-monitor-bd7ee-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "task-monitor-bd7ee",
      storageBucket:     "task-monitor-bd7ee.firebasestorage.app",
      messagingSenderId: "544624731364",
      appId:             "1:544624731364:web:419d52fa061c5c7b4f38f1",
    };

    const app          = initializeApp(firebaseConfig);
    signInAnonymously(getAuth(app)).then(c => console.log("UID:", c.user.uid));
    const db           = getDatabase(app);
    const dataRef      = ref(db, "arcpData");
    const logbookRef   = ref(db, "logbookData");

    window._arcp_fb = { update, dataRef, logbookRef, db, ref };

    // ── Logbook sync — separate path, raw JSON per type ──────────────────────
    onValue(logbookRef, snap => {
      const data = snap.val();
      if (!data) return;
      let changed = false;
      Object.entries(data).forEach(([k, val]) => {
        if (typeof val === "string") {
          const localKey = "pft_lb_" + k + "_entries";
          const current  = localStorage.getItem(localKey);
          if (current !== val) {
            localStorage.setItem(localKey, val);
            changed = true;
          }
        }
      });
      if (changed) {
        window.dispatchEvent(new CustomEvent("arcp-sync", { detail: { ok: true, changed: true } }));
      }
    });

    onValue(dataRef, snap => {
      const data = snap.val();
      let changed = false;

      if (data) {
        Object.entries(data).forEach(([k, remote]) => {
          if (remote === "__reset__" || (typeof remote === "object" && remote?.value === "__reset__")) {
            localStorage.removeItem(k);
            localStorage.removeItem(k + "__ts");
            changed = true;
            return;
          }
          if (typeof remote === "string") {
            localStorage.setItem(k, remote);
            localStorage.setItem(k + "__ts", "0");
            changed = true;
            return;
          }
          if (!remote || typeof remote !== "object") return;
          const remoteTs = remote.ts || 0;
          const localTs  = parseInt(localStorage.getItem(k + "__ts") || "0");
          if (remoteTs > localTs) {
            localStorage.setItem(k, remote.value);
            localStorage.setItem(k + "__ts", remoteTs);
            changed = true;
          }
        });
      }

      window.dispatchEvent(new CustomEvent("arcp-sync", { detail: { ok: true, changed } }));
    }, err => {
      console.error("Firebase error:", err);
      window.dispatchEvent(new CustomEvent("arcp-sync", { detail: { ok: false } }));
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #060810; --bg2: #0a0d18; --bg3: #0f1220; --bg4: #141828;
      --blue:  #4f9eff; --blue2: #3a7acc; --blue3: #264d8a; --blue4: #162d57; --blue5: #0a1a36;
      --gim:   #4f9eff; --renal: #a78bfa;

    #header { background:var(--bg2); border-bottom:2px solid var(--blue3); }
    .header-top { display:flex; align-items:stretch; border-bottom:1px solid var(--blue5); flex-wrap:wrap; }

    .arcp-countdown { padding:14px 20px; border-right:1px solid var(--blue5); display:flex; flex-direction:column; justify-content:center; }
    .countdown-val { font-size:26px; font-weight:700; color:var(--blue); line-height:1; }
    .countdown-val.warn  { color:var(--amber); text-shadow:0 0 8px rgba(255,176,0,0.4); }
    .countdown-val.alert { color:var(--red);   text-shadow:0 0 8px rgba(255,68,68,0.4); }
    .countdown-key { font-size:8px; color:var(--blue3); letter-spacing:0.18em; margin-top:3px; }
    .als-status { padding:14px 20px; border-right:1px solid var(--blue5); display:flex; flex-direction:column; justify-content:center; }

    .als-val.warn  { color:var(--amber); }
    .als-val.alert { color:var(--red); animation:pulse 2s ease-in-out infinite; }

    .als-key { font-size:8px; color:var(--blue3); letter-spacing:0.15em; margin-top:3px; }
    .readiness-bar-wrap { flex:1; padding:14px 20px; display:flex; flex-direction:column; justify-content:center; }
    .readiness-label { display:flex; justify-content:space-between; font-size:9px; color:var(--blue3); letter-spacing:0.15em; margin-bottom:6px; }
    .readiness-pct { color:var(--blue); font-weight:700; font-size:11px; }
    .bar-track { height:6px; background:var(--blue5); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--blue3),var(--blue)); transition:width 0.5s ease; }
    .bar-fill.warn { background:linear-gradient(90deg,#8a5500,var(--amber)); }

    .year-btn.active { background:var(--blue4); border-color:var(--blue); color:var(--blue); font-weight:700; }

    .locked-banner { background:rgba(57,255,20,0.05); border:1px solid rgba(57,255,20,0.2); border-left:3px solid var(--green); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; cursor:pointer; }
    .locked-banner:hover { background:rgba(57,255,20,0.08); }
    .locked-banner-left { display:flex; flex-direction:column; gap:4px; }
    .locked-outcome { font-size:11px; font-weight:700; color:var(--green); letter-spacing:0.1em; }
    .locked-note    { font-size:9px; color:var(--dim); letter-spacing:0.08em; }

    .outcome-selector { display:flex; align-items:center; gap:8px; margin-bottom:20px; padding:10px 14px; background:var(--bg2); border:1px solid var(--blue5); flex-wrap:wrap; }

    #main { padding:20px 24px 80px; }

    .sec-head { display:flex; align-items:baseline; gap:12px; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--blue5); }

    .sec-note { font-size:9px; color:var(--dim); letter-spacing:0.08em; }

    .req-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:10px; margin-bottom:24px; }
    .req-card { background:var(--bg2); border:1px solid var(--blue5); border-left:3px solid; padding:12px 14px; transition:background 0.1s; }
    .req-card:hover { background:var(--bg3); }
    .req-card.met     { border-left-color:var(--green); }
    .req-card.partial { border-left-color:var(--amber); }
    .req-card.unmet   { border-left-color:var(--red); }

    .req-card.warn    { border-left-color:var(--amber); }

    .req-label { font-size:11px; color:#c8d8ff; font-weight:500; margin-bottom:8px; line-height:1.3; }

    .badge-renal { background:rgba(167,139,250,0.15); color:var(--renal); border:1px solid rgba(167,139,250,0.3); }
    .badge-both  { background:rgba(170,187,255,0.1);  color:#aabbff;      border:1px solid rgba(170,187,255,0.25); }

    .req-progress { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .req-track { flex:1; height:4px; background:var(--blue5); border-radius:2px; overflow:hidden; }

    .req-fill.met     { background:var(--green); }
    .req-fill.partial { background:var(--amber); }
    .req-fill.unmet   { background:var(--red); }

    .req-count { font-size:11px; font-weight:700; white-space:nowrap; min-width:60px; text-align:right; }
    .req-count.met     { color:var(--green); }
    .req-count.partial { color:var(--amber); }
    .req-count.unmet   { color:var(--red); }

    .req-controls { display:flex; align-items:center; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .req-input { background:var(--bg); border:1px solid var(--blue4); color:var(--blue); font-family:var(--font); font-size:12px; padding:4px 8px; width:65px; outline:none; transition:border-color 0.12s; caret-color:var(--blue); }

    .req-deadline { font-size:8px; color:var(--dim); margin-top:5px; letter-spacing:0.08em; }
    .req-deadline.soon { color:var(--amber); }
    .req-deadline.past { color:var(--red); }

    .dops-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; margin-bottom:24px; }

    .dops-card.done { border-left-color:var(--green); }
    .dops-label { flex:1; font-size:11px; color:#c8d8ff; line-height:1.3; }
    .dops-chk { width:16px; height:16px; border:1px solid var(--blue4); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--green); transition:all 0.15s; flex-shrink:0; }
    .dops-chk.checked { background:var(--blue4); border-color:var(--blue); box-shadow:0 0 6px rgba(79,158,255,0.3); }

    .summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:24px; }
    .sum-cell { background:var(--bg2); border:1px solid var(--blue5); padding:12px 14px; text-align:center; }
    .sum-val { font-size:26px; font-weight:700; line-height:1; }
    .sum-val.green { color:var(--green); text-shadow:0 0 8px rgba(57,255,20,0.25); }
    .sum-val.amber { color:var(--amber); }
    .sum-val.red   { color:var(--red); }
    .sum-val.blue  { color:var(--blue); }
    .sum-key { font-size:8px; color:var(--blue3); letter-spacing:0.15em; margin-top:4px; }

    #statusbar { position:fixed; bottom:0; left:0; right:0; background:var(--bg3); border-top:1px solid var(--blue4); padding:6px 24px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
    .status-left { display:flex; gap:16px; flex-wrap:wrap; }
    .status-item { font-size:9px; color:var(--blue3); letter-spacing:0.1em; }
    .status-item strong { color:var(--blue); }
    .btn-reset { background:transparent; border:1px solid var(--blue5); color:var(--dim); font-family:var(--font); font-size:9px; letter-spacing:0.1em; padding:3px 10px; cursor:pointer; }
    .btn-reset:hover { border-color:var(--red); color:var(--red); }

    @media (max-width:640px) {
      .req-grid, .dops-grid { grid-template-columns:1fr; }
      .year-sel-wrap { display:none; }
      #main { padding:14px 16px 80px; }
    }
  </style>
</head>

<script>
const ARCP_DEFAULTS = {
  ST4: "2026-12-01",
  ST5: "2027-12-01",
  ST6: "2028-12-01",
  ST7: "2029-12-01",
};

const YEARS = ["ST4","ST5","ST6","ST7"];
let currentYear = localStorage.getItem("pft_current_year") || "ST4";
let currentTab  = "gim";

const DOPS_PROCEDURES = [
  "Advanced cardiopulmonary resuscitation (CPR)",
  "Direct current (DC) cardioversion",
  "Temporary cardiac pacing using an external device",
  "Central venous cannulation (internal jugular or subclavian)",
  "Access to circulation for resuscitation (femoral vein or intraosseous)",
  "Pleural aspiration for fluid (diagnostic)",
  "Pleural aspiration (pneumothorax)",
  "Intercostal drain for pneumothorax",
  "Intercostal drain for effusion",
  "Nasogastric (NG) tube",
  "Ascitic tap",
  "Abdominal paracentesis",
  "Lumbar puncture",
];

const REQS = {
  gim_acats: { label:"GIM ACATs", stream:"gim", type:"number", target:4, unit:"ACATs", deadline:"annual", note:"GIM consultants, labelled GIM" },
  gim_mcrs:  { label:"GIM MCRs",  stream:"gim", type:"number", target:2, unit:"MCRs",  deadline:"annual", note:"GIM consultants only, labelled GIM" },
  gim_sles:  { label:"GIM SLEs (miniCEX / CBD)", stream:"gim", type:"number", target:3, unit:"SLEs", deadline:"annual", note:"Labelled GIM by GIM consultants" },
  gim_msf_raters: { label:"GIM MSF Raters", stream:"gim", type:"number", target:4, unit:"raters", deadline:"annual", note:"4 GIM raters in MSF (part of 12 total)" },
  gim_es_report:  { label:"GIM Educational Supervisor Report", stream:"gim", type:"checkbox", deadline:"annual", note:"1 per year — even without a GIM placement" },

const ADMIN_DOCS = [
  { id:"doc_form_r",   label:"Form R in Library",         note:"Required each year" },

];

const LOCKING_OUTCOMES = ["1","2","6","8"];
function outcomeKey(yr)    { return `pft_arcp_outcome_${yr}`; }
function getOutcome(yr)    { return localStorage.getItem(outcomeKey(yr)) || ""; }
function setOutcome(yr, v) { localStorage.setItem(outcomeKey(yr), v); fbPush(outcomeKey(yr), v); renderYearBtns(); renderAll(); }
function isYearLocked(yr)  { return LOCKING_OUTCOMES.includes(getOutcome(yr)); }

function fbPush(key, val) {
  if (!window._arcp_fb) return;
  const { update, dataRef } = window._arcp_fb;
  const ts = Date.now();
  localStorage.setItem(key + "__ts", ts);
  update(dataRef, { [key]: { value: String(val), ts } }).catch(e => console.error("FB write error:", e));
}

function getARCPDate(yr) {
  const custom = localStorage.getItem(`pft_arcp_date_${yr}`);
  return custom ? new Date(custom) : new Date(ARCP_DEFAULTS[yr]);
}
function setARCPDate(yr, val) {
  localStorage.setItem(`pft_arcp_date_${yr}`, val);
  fbPush(`pft_arcp_date_${yr}`, val);
  updateCountdown();
  // Update just the deadline note in place without re-rendering whole admin tab
  const noteEl = document.getElementById(`arcp-note-${yr}`);
  if (noteEl) noteEl.textContent = val ? `// custom — ${new Date(val).toLocaleDateString("en-GB",{month:"short",year:"numeric"})}` : "// default — update if LTFT";
}

function sKey(reqId) {
  const req = REQS[reqId];
  if (!req) return `pft_${currentYear}_${reqId}`;
  if (req.cumulative) return `pft_cum_${reqId}`;
  if (req.type === "checkbox" && req.deadline !== "annual") return `pft_milestone_${reqId}`;
  if (req.type === "eseneph") return `pft_milestone_${reqId}`;
  return `pft_${currentYear}_${reqId}`;
}
function dopsKey(proc) { return `pft_dops_${proc.replace(/\s+/g,'_').toLowerCase()}`; }
function adminKey(id)  { return `pft_admin_${currentYear}_${id}`; }
function alsKey()      { return "pft_als_expiry"; }

function getVal(reqId) {
  const req = REQS[reqId];
  if (!req) return false;
  const raw = localStorage.getItem(sKey(reqId));
  if (req.type === "checkbox") return raw === "true";
  return raw ? parseInt(raw) : 0;
}
function setVal(reqId, val) {
  const k = sKey(reqId);
  localStorage.setItem(k, String(val));
  fbPush(k, val);
  const req = REQS[reqId];
  if (req && req.sharesTo) {
    const k2 = sKey(req.sharesTo);
    localStorage.setItem(k2, String(val));
    fbPush(k2, val);
  }
  updateReadiness();
}
function getDops(proc)   { return localStorage.getItem(dopsKey(proc)) === "true"; }
function setDops(proc,v) { const k = dopsKey(proc); localStorage.setItem(k, String(v)); fbPush(k, v); updateDopsCount(); }
function getAdmin(id)    { return localStorage.getItem(adminKey(id)) === "true"; }
function setAdmin(id,v)  { const k = adminKey(id); localStorage.setItem(k, String(v)); fbPush(k, v); }
function getALS()        { return localStorage.getItem(alsKey()) || ""; }
function setALS(val)     { localStorage.setItem(alsKey(), val); fbPush(alsKey(), val); updateALSDisplay(); }

function getStatus(reqId) {
  const req = REQS[reqId];
  if (!req) return "unmet";
  if (req.type === "eseneph") return esenephStatus();
  const val = getVal(reqId);
  if (req.type === "checkbox") {
    if (isDeadlineFuture(req.deadline) && !val) return "na";
    return val ? "met" : (isDeadlinePast(req.deadline) ? "unmet" : "partial");
  }
  if (val >= req.target) return "met";
  if (val > 0)           return "partial";
  return "unmet";
}
function isDeadlinePast(d)   { return d !== "annual" && YEARS.indexOf(d) < YEARS.indexOf(currentYear); }
function isDeadlineFuture(d) { return d !== "annual" && YEARS.indexOf(d) > YEARS.indexOf(currentYear); }
function deadlineLabel(d) {
  if (d === "annual") return "// required this year";
  if (isDeadlinePast(d)) return `// deadline was ${d}`;
  if (YEARS.indexOf(d) === YEARS.indexOf(currentYear)) return `// due this year (${d})`;
  return `// due by ${d}`;
}
function deadlineClass(d) {
  if (d === "annual") return "";
  if (isDeadlinePast(d)) return "past";
  if (YEARS.indexOf(d) === YEARS.indexOf(currentYear)) return "soon";
  return "";
}

function updateCountdown() {
  const arcp  = getARCPDate(currentYear);
  const today = new Date(); today.setHours(0,0,0,0);
  const days  = Math.round((arcp - today) / 86400000);
  const el    = document.getElementById("arcp-days");
  el.textContent = days > 0 ? days : "PAST";
  el.className   = "countdown-val" + (days < 60 ? " alert" : days < 120 ? " warn" : "");
  document.getElementById("sb-arcp").textContent = arcp.toLocaleDateString("en-GB",{month:"short",year:"numeric"});
}

function updateALSDisplay() {
  const val = getALS();
  const el  = document.getElementById("als-display");
  if (!val) { el.textContent = "NOT SET"; el.className = "als-val"; return; }
  const expiry = new Date(val);
  const today  = new Date(); today.setHours(0,0,0,0);
  const daysTo = Math.round((expiry - today) / 86400000);
  const expired = daysTo < 0;
  el.textContent = expired
    ? `EXPIRED ${expiry.toLocaleDateString("en-GB",{month:"short",year:"numeric"})}`
    : `${expiry.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})} (${daysTo}d)`;
  el.className = "als-val" + (expired ? " alert" : daysTo < 183 ? " warn" : "");
}

function updateReadiness() {
  const relevant = Object.keys(REQS).filter(id => {
    const req = REQS[id];
    if (req.deadline === "annual") return true;
    return YEARS.indexOf(req.deadline) <= YEARS.indexOf(currentYear);
  });
  const gimIds    = relevant.filter(id => REQS[id].stream === "gim");
  const gimMet    = gimIds.filter(id => getStatus(id) === "met").length;
  const dopsDone  = DOPS_PROCEDURES.filter(p => getDops(p)).length;
  const dopsTotal = DOPS_PROCEDURES.length;
  const gimTotal  = gimIds.length + dopsTotal;
  const gimMetAll = gimMet + dopsDone;
  const gimPct    = gimTotal > 0 ? Math.round((gimMetAll / gimTotal) * 100) : 0;

  const renalIds   = relevant.filter(id => REQS[id].stream === "renal");
  const renalMet   = renalIds.filter(id => getStatus(id) === "met").length;
  const renalTotal = renalIds.length;
  const renalPct   = renalTotal > 0 ? Math.round((renalMet / renalTotal) * 100) : 0;

  const adminDone  = ADMIN_DOCS.filter(doc => getAdmin(doc.id)).length;
  const adminTotal = ADMIN_DOCS.length;
  const alsOk      = getALS() && (() => { const d = Math.round((new Date(getALS()) - new Date()) / 86400000); return d > 0; })() ? 1 : 0;

  document.getElementById("readiness-pct-gim").textContent = `${gimPct}%`;
  const gimBar = document.getElementById("readiness-bar-gim");
  gimBar.style.width = `${gimPct}%`;
  gimBar.className = "bar-fill" + (gimPct >= 80 ? " good" : gimPct >= 50 ? "" : " warn");

  document.getElementById("readiness-pct-renal").textContent = `${renalPct}%`;
  const renalBar = document.getElementById("readiness-bar-renal");
  renalBar.style.width = `${renalPct}%`;
  renalBar.style.background = renalPct >= 80
    ? "linear-gradient(90deg,#2d1b69,#39ff14)"
    : renalPct >= 50
    ? "linear-gradient(90deg,#5b21b6,var(--renal))"
    : "linear-gradient(90deg,#7c2d12,#ff4444)";

  document.getElementById("readiness-detail").textContent =
    `GIM ${gimMetAll}/${gimTotal} · Renal ${renalMet}/${renalTotal} · Admin ${adminDone + alsOk}/${adminTotal + 1}`;
}

function updateDopsCount() {
  const done = DOPS_PROCEDURES.filter(p => getDops(p)).length;
  const el   = document.getElementById("dops-count");
  if (el) el.textContent = `${done} / ${DOPS_PROCEDURES.length} completed`;
}

function renderYearBtns() {
  document.querySelectorAll(".year-btn").forEach(b => {
    const yr = b.dataset.year;
    b.className = "year-btn" + (yr === currentYear ? " active" : "") + (isYearLocked(yr) ? " locked" : "");
    b.title = isYearLocked(yr) ? `${yr} — Outcome ${getOutcome(yr)} (locked)` : "";
  });
}

function setYear(yr) {
  currentYear = yr;
  localStorage.setItem("pft_current_year", yr);
  renderYearBtns();
  document.getElementById("sb-year").textContent = yr;
  renderAll();
}
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.getAttribute("onclick").includes(`'${tab}'`)));
  ["gim","renal","admin","overview","cips","logbook"].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? "block" : "none";
  });
  if (tab === "cips") renderCIPs();
  if (tab === "logbook") renderLogbook();
}

function renderAll() {
  updateCountdown();
  updateALSDisplay();
  renderYearBtns();
  renderGIM();
  renderRenal();
  renderAdmin();
  renderOverview();
  updateReadiness();
  updateDopsCount();
  if (currentTab === "cips") renderCIPs();
  if (currentTab === "logbook") renderLogbook();
}

function renderOutcomeSelector(el) {
  const outcome = getOutcome(currentYear);
  const locked  = isYearLocked(currentYear);
  const sel = document.createElement("div");
  sel.className = "outcome-selector";
  sel.innerHTML = `
    <span class="outcome-label">ARCP OUTCOME</span>
    <select class="outcome-select" onchange="setOutcome('${currentYear}', this.value)">
      <option value=""  ${!outcome?"selected":""}>-- not yet --</option>
      <option value="1" ${outcome==="1"?"selected":""}>Outcome 1 — Satisfactory progress ✓</option>
      <option value="2" ${outcome==="2"?"selected":""}>Outcome 2 — Development needs identified ✓</option>
      <option value="3" ${outcome==="3"?"selected":""}>Outcome 3 — Inadequate progress</option>
      <option value="4" ${outcome==="4"?"selected":""}>Outcome 4 — Released from programme</option>
      <option value="5" ${outcome==="5"?"selected":""}>Outcome 5 — Incomplete evidence</option>
      <option value="6" ${outcome==="6"?"selected":""}>Outcome 6 — Completion of training ✓</option>
      <option value="8" ${outcome==="8"?"selected":""}>Outcome 8 — Out of programme ✓</option>
    </select>
    ${outcome ? `<button class="outcome-clear" onclick="setOutcome('${currentYear}','')">CLEAR</button>` : ""}
    ${locked  ? `<span style="font-size:9px;color:var(--green);letter-spacing:0.1em;">// year locked</span>` : ""}`;

}

function renderLockedBanner(el, tabId) {
  const outcome = getOutcome(currentYear);
  const LABELS  = { "1":"Outcome 1 — Satisfactory progress","2":"Outcome 2 — Development needs identified","6":"Outcome 6 — Completion of training","8":"Outcome 8 — Out of programme" };
  const storageKey = `pft_collapsed_${currentYear}_${tabId}`;
  const collapsed  = localStorage.getItem(storageKey) !== "false";
  const banner = document.createElement("div");
  banner.className = "locked-banner";
  banner.onclick = () => { localStorage.setItem(storageKey, String(!collapsed)); renderAll(); };
  banner.innerHTML = `
    <div class="locked-banner-left">
      <div class="locked-outcome">✓ ${LABELS[outcome]}</div>
      <div class="locked-note">// ${currentYear} ARCP complete · click to ${collapsed?"expand":"collapse"} details</div>
    </div>
    <span class="locked-toggle">${collapsed ? "▸ EXPAND" : "▾ COLLAPSE"}</span>`;
  el.appendChild(banner);
  return !collapsed;
}

      <div class="sum-cell"><div class="sum-val blue">${dopsDone}</div><div class="sum-key">DOPS DONE</div></div>
      <div class="sum-cell"><div class="sum-val ${dopsDone===DOPS_PROCEDURES.length?'green':'amber'}">${DOPS_PROCEDURES.length-dopsDone}</div><div class="sum-key">DOPS LEFT</div></div>
    </div>`;
  const outstanding = allIds.filter(id => { const s = getStatus(id); return s==="unmet"||s==="partial"; });
  if (outstanding.length > 0) {
    el.appendChild(makeSection("OUTSTANDING / IN PROGRESS","gim","All items not yet fully met", outstanding));
  } else {
    el.innerHTML += `<div style="text-align:center;padding:40px;color:var(--green);font-size:13px;letter-spacing:0.1em;">✓ ALL REQUIREMENTS MET FOR ${currentYear}</div>`;
  }
}

function makeSection(title, stream, note, reqIds) {
  const wrap = document.createElement("div");
  wrap.style.marginBottom = "24px";
  const head = document.createElement("div");
  head.className = "sec-head";
  head.innerHTML = `<span class="sec-title ${stream}">${title}</span><span class="sec-rule"></span><span class="sec-note">${note}</span>`;
  wrap.appendChild(head);
  const grid = document.createElement("div");
  grid.className = "req-grid";
  reqIds.forEach(id => grid.appendChild(makeCard(id, REQS[id])));
  wrap.appendChild(grid);
  return wrap;
}

function esenephKey() { return "pft_eseneph_date"; }
function getEseneph() { return localStorage.getItem(esenephKey()) || ""; }
function setEseneph(val) { localStorage.setItem(esenephKey(), val); fbPush(esenephKey(), val); updateReadiness(); renderRenal(); }

function esenephStatus() {
  if (currentYear === "ST4" || currentYear === "ST5") return "na";
  const val = getEseneph();
  if (currentYear === "ST7") return val ? "met" : "unmet";
  if (!val) return "unmet";
  const examDate = new Date(val);
  const today    = new Date(); today.setHours(0,0,0,0);
  return examDate <= today ? "met" : "partial";
}

function makeCard(reqId, req) {
  if (req.type === "eseneph") {
    const val    = getEseneph();
    const status = esenephStatus();
    const card   = document.createElement("div");
    card.className = `req-card ${status}`;
    card.id = `card-${reqId}`;
    const today     = new Date(); today.setHours(0,0,0,0);
    const alertDate = new Date("2027-12-01");
    const daysToAlert = Math.round((alertDate - today) / 86400000);
    const shouldAlert = daysToAlert < 366 && daysToAlert > 0;
    const examDate  = val ? new Date(val) : null;
    const examPast  = examDate && examDate <= today;
    let statusNote = "// not yet booked", noteClass = "past";
    if (examPast)         { statusNote = `// ✓ sat ${examDate.toLocaleDateString("en-GB",{month:"short",year:"numeric"})}`; noteClass = ""; }
    else if (val)         { statusNote = `// booked ${examDate.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}`; noteClass = "soon"; }
    else if (shouldAlert) { statusNote = `// !! book now — exam within 1 year`; noteClass = "past"; }
    let cardBody = "";
    if (currentYear === "ST4" || currentYear === "ST5") {
      cardBody = `<div class="req-controls" style="margin-top:8px;"><input class="req-input date-inp" type="date" value="${val}" placeholder="exam date" onchange="setEseneph(this.value)" /><span class="req-unit">exam date sat / to sit</span></div><div class="req-deadline ${noteClass}">${statusNote} · ${req.note}</div>`;
    } else if (currentYear === "ST7") {
      cardBody = `<div class="req-check" style="margin-top:8px;"><div class="chk ${val?"checked":""}" style="opacity:0.6;cursor:default;">${val?"✓":""}</div><span style="font-size:10px;color:${val?"var(--green)":"var(--red)"};letter-spacing:0.06em;">${val?`Sat ${examDate.toLocaleDateString("en-GB",{month:"short",year:"numeric"})}`:"!! Should have been completed in ST6"}</span></div><div class="req-deadline ${val?"":"past"}">// deadline was ST6 · ${req.note}</div>`;
    } else {
      cardBody = `${shouldAlert&&!val?`<div style="font-size:9px;color:var(--red);margin-bottom:6px;letter-spacing:0.08em;animation:pulse 2s ease-in-out infinite;">!! BOOK NOW — within 1 year of ST6 deadline</div>`:""}<div class="req-controls" style="margin-top:8px;"><input class="req-input date-inp" type="date" value="${val}" placeholder="exam date" onchange="setEseneph(this.value)" /><span class="req-unit">exam date sat / to sit</span></div><div class="req-deadline ${noteClass}">${statusNote} · ${req.note}</div>`;
    }
    card.innerHTML = `<div class="req-label">ESENeph Exam <span class="badge badge-renal">RENAL</span></div>${cardBody}`;
    return card;
  }
  const val    = getVal(reqId);
  const status = getStatus(reqId);
  const card   = document.createElement("div");
  card.className = `req-card ${status}`;
  card.id = `card-${reqId}`;
  const streamBadge = req.stream === "gim" ? `<span class="badge badge-gim">GIM</span>` : `<span class="badge badge-renal">RENAL</span>`;
  const sharedNote  = req.sharesTo ? `<div style="font-size:8px;color:var(--renal);margin-top:3px;letter-spacing:0.08em;">// also applies to GIM</div>` : req.sharedWith ? `<div style="font-size:8px;color:var(--dim);margin-top:3px;letter-spacing:0.08em;">// auto-filled from Renal</div>` : "";
  const deadlineHtml = `<div class="req-deadline ${deadlineClass(req.deadline)}">${deadlineLabel(req.deadline)}${req.note?` · ${req.note}`:""}</div>`;
  if (req.type === "checkbox") {
    card.innerHTML = `<div class="req-label">${req.label} ${streamBadge}</div>${sharedNote}<div class="req-check"><button class="chk ${val?"checked":""}" id="chk-${reqId}" onclick="toggleCheck('${reqId}')">${val?"✓":""}</button><span class="chk-label" onclick="toggleCheck('${reqId}')">${val?"COMPLETE":"NOT YET DONE"}</span></div>${deadlineHtml}`;
  } else {
    const pct    = Math.min(100, Math.round((val / req.target) * 100));
    const cumTag = req.cumulative ? `<span style="font-size:8px;color:var(--dim);margin-left:4px;">(cumulative)</span>` : "";
    card.innerHTML = `<div class="req-label">${req.label} ${streamBadge} ${cumTag}</div>${sharedNote}<div class="req-progress"><div class="req-track"><div class="req-fill ${status}" style="width:${pct}%"></div></div><span class="req-count ${status}">${val} / ${req.target}</span></div><div class="req-controls"><input class="req-input" type="number" min="0" value="${val}" onchange="updateNumber('${reqId}', this.value)" oninput="liveUpdate('${reqId}', this.value)" /><span class="req-unit">${req.unit}</span><span class="req-target">· target ${req.target}</span></div>${deadlineHtml}`;
  }
  return card;
}

function toggleCheck(reqId) {
  const current = getVal(reqId);
  setVal(reqId, !current);
  refreshCard(reqId);
  const req = REQS[reqId];
  if (req && req.sharesTo) refreshCard(req.sharesTo);
}

function toggleDops(proc) {
  const current = getDops(proc);
  setDops(proc, !current);
  const card = document.getElementById(`dops-${proc.replace(/\s+/g,'_')}`);
  if (card) {
    card.className = `dops-card ${!current?"done":""}`;
    const chk = card.querySelector(".dops-chk");
    if (chk) { chk.className = `dops-chk ${!current?"checked":""}`; chk.textContent = !current?"✓":""; }
  }
  updateDopsCount();
}

function toggleAdmin(id) {
  const current = getAdmin(id);
  setAdmin(id, !current);
  const card = document.getElementById(`admin-${id}`);
  if (card) {
    const doc  = ADMIN_DOCS.find(d => d.id === id);
    const done = !current;
    const newCard = document.createElement("div");
    newCard.className = `req-card ${done?"met":"unmet"}`;
    newCard.id = `admin-${id}`;
    newCard.innerHTML = `<div class="req-label">${doc.label}<span class="badge badge-both">ANNUAL</span></div><div class="req-check"><button class="chk ${done?"checked":""}" onclick="toggleAdmin('${id}')">${done?"✓":""}</button><span class="chk-label" onclick="toggleAdmin('${id}')">${done?"IN LIBRARY":"NOT YET DONE"}</span></div><div class="req-deadline">${doc.note}</div>`;
    card.replaceWith(newCard);
  }
}

function updateNumber(reqId, rawVal) { const val = Math.max(0, parseInt(rawVal)||0); setVal(reqId, val); refreshCard(reqId); }

function liveUpdate(reqId, rawVal) {
  const val    = Math.max(0, parseInt(rawVal)||0);
  const req    = REQS[reqId];
  const status = val >= req.target ? "met" : val > 0 ? "partial" : "unmet";
  const pct    = Math.min(100, Math.round((val/req.target)*100));
  const card   = document.getElementById(`card-${reqId}`);
  if (!card) return;
  const fill  = card.querySelector(".req-fill");
  const count = card.querySelector(".req-count");
  if (fill)  { fill.style.width = `${pct}%`; fill.className = `req-fill ${status}`; }
  if (count) { count.textContent = `${val} / ${req.target}`; count.className = `req-count ${status}`; }
  card.className = `req-card ${status}`;
  setVal(reqId, val);
}

function refreshCard(reqId) {
  const req  = REQS[reqId];
  const card = document.getElementById(`card-${reqId}`);
  if (card && req) card.replaceWith(makeCard(reqId, req));
}

function resetYearData() {
  if (!confirm(`Reset all annual data for ${currentYear}? Cumulative and DOPS data will not be affected.`)) return;
  const updates = {}, ts = Date.now();
  Object.keys(REQS).forEach(id => {
    if (!REQS[id].cumulative) {
      const k = `pft_${currentYear}_${id}`;
      localStorage.removeItem(k); localStorage.removeItem(k+"__ts");
      updates[k] = { value:"__reset__", ts };
    }
  });
  ADMIN_DOCS.forEach(doc => {
    const k = adminKey(doc.id);
    localStorage.removeItem(k); localStorage.removeItem(k+"__ts");
    updates[k] = { value:"__reset__", ts };
  });
  if (window._arcp_fb) { const { update, dataRef } = window._arcp_fb; update(dataRef, updates).catch(e => console.error("FB reset error:", e)); }
  renderAll();
}

function cipEvidKey(cipId, itemLabel) {
  const safe = itemLabel.replace(/[^a-z0-9]/gi,'_').toLowerCase();
  return `pft_cip_${currentYear}_${cipId}_${safe}`;
}
function cipEntrustKey(cipId) { return `pft_cip_entrust_${cipId}`; } // global — not year-specific
function cipSatKey(cipId)     { return `pft_cip_sat_${currentYear}_${cipId}`; } // generic "satisfactory"

function getCipEvid(cipId, itemLabel) {
  return parseInt(localStorage.getItem(cipEvidKey(cipId, itemLabel)) || "0");
}
function setCipEvid(cipId, itemLabel, val) {
  const k = cipEvidKey(cipId, itemLabel);
  localStorage.setItem(k, String(val));
  fbPush(k, val);
}
function getCipEntrust(cipId)    { return localStorage.getItem(cipEntrustKey(cipId)) || ""; }
function setCipEntrust(cipId, v) {
  const k = cipEntrustKey(cipId);
  localStorage.setItem(k, v);
  fbPush(k, v);
}
function getCipSat(cipId)        { return localStorage.getItem(cipSatKey(cipId)) === "true"; }
function setCipSat(cipId, v)     {
  const k = cipSatKey(cipId);
  localStorage.setItem(k, String(v));
  fbPush(k, v);
}

// Total evidence count across all items for a CiP
function cipEvidTotal(cipId, evidenceList) {
  return evidenceList.reduce((acc, item) => acc + getCipEvid(cipId, item), 0);
}

// Interpolate red→amber→green based on count 0–10
function evidBarColor(count) {
  const t = Math.min(count, 5) / 5;
  // 0=red #ff4444, 5=amber #ffb000, 10=green #39ff14
  if (t <= 0.5) {
    const u = t * 2;
    const r = Math.round(255 + (255 - 255) * u);
    const g = Math.round(68  + (176 - 68)  * u);
    const b = Math.round(68  + (0   - 68)  * u);
    return `rgb(${r},${g},${b})`;
  } else {
    const u = (t - 0.5) * 2;
    const r = Math.round(255 + (57  - 255) * u);
    const g = Math.round(176 + (255 - 176) * u);
    const b = Math.round(0   + (20  - 0)   * u);
    return `rgb(${r},${g},${b})`;
  }
}

  const target       = CIP_YEAR_TARGETS[cip.id]?.[currentYear];
  const currentLevel = entrust ? parseInt(entrust) : 0;
  const atTarget     = isLevel ? (target && currentLevel >= target) : sat;
  const collapsed    = localStorage.getItem(`pft_cip_open_${cip.id}`) !== "true";
  const evidTotal    = cipEvidTotal(cip.id, cip.evidence);
  const evidColor    = evidBarColor(evidTotal);
  const evidWidth    = Math.min(100, evidTotal * 20);

  const ENTRUST_LABELS = {
    "":"— not assessed","1":"L1 · Observe only","2":"L2 · Direct supervision",
    "3":"L3 · Indirect supervision","4":"L4 · Unsupervised ✓"
  };
  const levelColor = currentLevel === 4 ? "var(--green)"
    : currentLevel === 3 ? "var(--amber)"
    : currentLevel > 0  ? "var(--blue)"
    : "var(--dim)";
  const borderColor = atTarget ? "var(--green)" : group.color;

  const card = document.createElement("div");
  card.style.cssText = `background:var(--bg2);border:1px solid var(--blue5);border-left:3px solid ${borderColor};`;

  // ── Header row ──────────────────────────────────────
  const header = document.createElement("div");
  header.style.cssText = "display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;";
  header.onclick = () => {
    localStorage.setItem(`pft_cip_open_${cip.id}`, String(collapsed));
    card.replaceWith(makeCipCard(cip, group));
  };

  // Spectrum bar in header — red→green, 0–10
  const evidBar = `
    <div style="width:60px;">
      <div style="height:4px;background:var(--blue5);border-radius:2px;overflow:hidden;">
        <div style="height:100%;width:${evidWidth}%;background:${evidColor};transition:width 0.3s,background 0.3s;"></div>
      </div>
      <div style="font-size:7px;color:var(--dim);margin-top:2px;text-align:center;letter-spacing:0.06em;">${evidTotal}/5</div>
    </div>`;

  // Target indicator
  const targetBadge = isLevel && target
    ? `<div style="font-size:8px;color:var(--dim);letter-spacing:0.06em;">target:L${target}</div>`
    : "";

  const levelBadge = isLevel
    ? `<div style="font-size:10px;font-weight:700;color:${levelColor};min-width:28px;text-align:right;">${entrust ? "L"+entrust : "—"}</div>`
    : `<div style="font-size:9px;font-weight:700;color:${sat?"var(--green)":"var(--dim)"};">${sat?"✓ SAT":"—"}</div>`;

  header.innerHTML = `
    <div style="flex:1;font-size:11px;color:#c8d8ff;font-weight:500;line-height:1.3;">${cip.label}</div>
    ${evidBar}
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;">
      ${targetBadge}
      ${levelBadge}
    </div>
    <div style="font-size:10px;color:var(--dim);margin-left:2px;">${collapsed?"▸":"▾"}</div>`;
  card.appendChild(header);

  if (!collapsed) {
    const body = document.createElement("div");
    body.style.cssText = "padding:0 14px 14px;border-top:1px solid var(--blue5);";

    // ── Entrustment / satisfactory selector ────────────
    const assessDiv = document.createElement("div");
    assessDiv.style.cssText = "display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--blue5);margin-bottom:14px;flex-wrap:wrap;";

    if (isLevel) {
      // Show entrustment levels + year target indicator
      const targetRow = target
        ? `<span style="font-size:9px;color:var(--dim);">// ${currentYear} target: L${target} · ${currentLevel >= target ? '<span style="color:var(--green)">✓ met</span>' : '<span style="color:var(--amber)">not yet</span>'}</span>`
        : "";
      assessDiv.innerHTML = `
        <span style="font-size:9px;color:var(--blue3);letter-spacing:0.12em;">ES ENTRUSTMENT</span>
        <select style="background:var(--bg);border:1px solid var(--blue4);color:var(--blue);font-family:var(--font);font-size:10px;padding:4px 8px;outline:none;cursor:pointer;"
          onchange="setCipEntrust('${cip.id}',this.value);renderCIPs();">
          <option value=""  ${!entrust    ?"selected":""}>— not yet assessed —</option>
          <option value="1" ${entrust==="1"?"selected":""}>Level 1 — Observe only</option>
          <option value="2" ${entrust==="2"?"selected":""}>Level 2 — Direct supervision</option>
          <option value="3" ${entrust==="3"?"selected":""}>Level 3 — Indirect supervision</option>
          <option value="4" ${entrust==="4"?"selected":""}>Level 4 — Unsupervised ✓</option>
        </select>
        ${targetRow}`;
    } else {
      // Generic CiPs — satisfactory checkbox
      assessDiv.innerHTML = `
        <span style="font-size:9px;color:var(--blue3);letter-spacing:0.12em;">GENERIC CiP STATUS</span>
        <button class="chk ${sat?"checked":""}" onclick="setCipSat('${cip.id}',${!sat});renderCIPs();">
          ${sat?"✓":""}
        </button>
        <span style="font-size:10px;color:${sat?"var(--green)":"var(--dim)"};letter-spacing:0.06em;cursor:pointer;"
          onclick="setCipSat('${cip.id}',${!sat});renderCIPs();">
          ${sat?"SATISFACTORY — signed off":"NOT YET SIGNED OFF"}
        </span>`;
    }
    body.appendChild(assessDiv);

    // ── Evidence items ─────────────────────────────────
    const evidHead = document.createElement("div");
    evidHead.style.cssText = "font-size:9px;color:var(--blue3);letter-spacing:0.15em;margin-bottom:8px;";
    evidHead.textContent = "EVIDENCE TO INFORM DECISION";
    body.appendChild(evidHead);

    const evidNote = document.createElement("div");
    evidNote.style.cssText = "font-size:8px;color:var(--dim);letter-spacing:0.06em;margin-bottom:10px;";
    evidNote.textContent = "// count each type — bar fills as evidence accumulates";
    body.appendChild(evidNote);

    const evidGrid = document.createElement("div");
    evidGrid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;";

    cip.evidence.forEach(item => {
      const val     = getCipEvid(cip.id, item);
      const hasEvid = val > 0;
      const itemDiv = document.createElement("div");
      itemDiv.style.cssText = `
        background:var(--bg3);border:1px solid ${hasEvid?"var(--blue4)":"var(--blue5)"};
        border-left:2px solid ${hasEvid?group.color:"var(--blue5)"};
        padding:6px 8px;`;
      itemDiv.innerHTML = `
        <div style="font-size:9px;color:${hasEvid?"#c8d8ff":"var(--dim)"};margin-bottom:5px;line-height:1.3;">${item}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="number" min="0" value="${val}"
            style="background:var(--bg);border:1px solid var(--blue4);color:var(--blue);
              font-family:var(--font);font-size:11px;padding:2px 5px;width:44px;outline:none;"
            onchange="setCipEvid('${cip.id}','${item.replace(/'/g,"\\'")}',Math.max(0,parseInt(this.value)||0));renderCIPs();" />
          <div style="flex:1;height:2px;background:var(--blue5);overflow:hidden;">
            <div style="height:100%;width:${hasEvid?100:0}%;background:${group.color};"></div>
          </div>
          ${hasEvid?`<span style="font-size:8px;color:${group.color};">✓</span>`:""}
        </div>`;
      evidGrid.appendChild(itemDiv);
    });
    body.appendChild(evidGrid);
    card.appendChild(body);
  }

  return card;
}

// ── Storage helpers ──────────────────────────────────
function lbKey(type, id) { return `pft_lb_${type}_${id}`; }

function getLbEntries(type) {
  const raw = localStorage.getItem(lbKey(type, "entries"));
  return raw ? JSON.parse(raw) : [];
}
function saveLbEntries(type, entries) {
  const k = lbKey(type, "entries");
  const val = JSON.stringify(entries);
  localStorage.setItem(k, val);
  // Sync to Firebase logbookData path (separate from arcpData to avoid corruption)
  if (window._arcp_fb && window._arcp_fb.logbookRef) {
    const { update, db, ref } = window._arcp_fb;
    update(ref(db, "logbookData"), { [type]: val })
      .catch(e => console.error("Logbook FB sync error:", e));
  }
  // If GIM clinics — sync cumulative target
  if (type === "clinics_gim") {
    const gimCount = entries.length;
    const cumK = sKey("gim_clinics");
    localStorage.setItem(cumK, String(gimCount));
    fbPush(cumK, gimCount);
  }
  // If simulation — sync cumulative target
  if (type === "simulation") {
    const totalSim = entries.reduce((acc,e) => acc+(parseFloat(e.hours)||0), 0);
    const cumK = sKey("gim_sim_hours");
    localStorage.setItem(cumK, String(Math.round(totalSim*10)/10));
    fbPush(cumK, Math.round(totalSim*10)/10);
  }
  // If GIM CPD — sync cumulative target (online capped at 15h)
  if (type === "cpd_gim") {
    const ONLINE_LIMIT = 15;
    const onlineHrs   = entries.filter(e => e.type === "Online CPD (approved)").reduce((acc,e) => acc+(parseFloat(e.hours)||0),0);
    const externalHrs = entries.filter(e => e.type !== "Online CPD (approved)").reduce((acc,e) => acc+(parseFloat(e.hours)||0),0);
    const countedTotal = externalHrs + Math.min(onlineHrs, ONLINE_LIMIT);
    const cumK = sKey("gim_cpd_hours");
    localStorage.setItem(cumK, String(Math.round(countedTotal)));
    fbPush(cumK, Math.round(countedTotal));
  }
}
function addLbEntry(type, entry) {
  const entries = getLbEntries(type);
  entries.push({ ...entry, id: Date.now(), date: entry.date || new Date().toISOString().split("T")[0] });
  saveLbEntries(type, entries);
}
function deleteLbEntry(type, id) {
  const entries = getLbEntries(type).filter(e => String(e.id) !== String(id));
  saveLbEntries(type, entries);
}

// ── CPD summary helpers ──────────────────────────────
function cpdSummary() {
  const gimEntries   = getLbEntries("cpd_gim");
  const ONLINE_LIMIT = 15;
  const onlineHrs    = gimEntries.filter(e => e.type === "Online CPD (approved)").reduce((acc,e) => acc+(parseFloat(e.hours)||0),0);
  const onlineCapped = Math.min(onlineHrs, ONLINE_LIMIT); // excess online hrs don't count toward total
  const externalHrs  = gimEntries.filter(e => e.type !== "Online CPD (approved)").reduce((acc,e) => acc+(parseFloat(e.hours)||0),0);
  const total        = externalHrs + onlineCapped;
  const currentYrHrs = gimEntries.filter(e => e.year === currentYear).reduce((acc,e) => {
    const h = parseFloat(e.hours) || 0;
    // For online in current year, pro-rate the cap
    if (e.type === "Online CPD (approved)") {
      const allOnlineYr = gimEntries.filter(x => x.type === "Online CPD (approved)" && x.year === currentYear).reduce((a,x) => a+(parseFloat(x.hours)||0),0);
      return acc + (allOnlineYr > ONLINE_LIMIT ? h * (ONLINE_LIMIT / allOnlineYr) : h);
    }
    return acc + h;
  }, 0);
  const st7Hrs = gimEntries.filter(e => e.year === "ST7").reduce((acc,e) => acc+(parseFloat(e.hours)||0),0);
  return {
    total:       Math.round(total*10)/10,
    onlineHrs:   Math.round(onlineHrs*10)/10,
    onlineCapped: Math.round(onlineCapped*10)/10,
    externalHrs: Math.round(externalHrs*10)/10,
    currentYrHrs:Math.round(currentYrHrs*10)/10,
    st7Hrs:      Math.round(st7Hrs*10)/10,
    overOnline:  onlineHrs > ONLINE_LIMIT,
  };
}

function makeLbForm(type, title, stream, fields, defaultYear) {
  const formId = `lb-form-${type}`;
  const wrap = document.createElement("div");
  wrap.style.cssText = "margin-bottom:20px;";

  const head = document.createElement("div");
  head.className = "sec-head";
  const streamColor = stream === "gim" ? "var(--gim)" : stream === "renal" ? "var(--renal)" : "var(--blue)";
  head.innerHTML = `<span class="sec-title" style="color:${streamColor}">${title}</span><span class="sec-rule"></span>`;
  wrap.appendChild(head);

  const form = document.createElement("div");
  form.id = formId;
  form.style.cssText = "background:var(--bg2);border:1px solid var(--blue5);border-top:2px solid " + streamColor + ";padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:8px;";

  fields.forEach(f => {
    const field = document.createElement("div");
    field.style.cssText = "display:flex;flex-direction:column;gap:4px;";
    let input = "";
    if (f.type === "select" || f.type === "select_other") {
      const otherId = f.otherId || (f.id + "_other");
      const otherLabel = f.otherLabel || "Please specify";
      const isSelectOther = f.type === "select_other";
      input = `<select id="${formId}-${f.id}" class="req-input" style="width:100%;padding:5px 8px;"
          ${isSelectOther ? `onchange="var ow=document.getElementById('${formId}-${otherId}-wrap');if(ow)ow.style.display=this.value.startsWith('Other')?'flex':'none';"` : ""}>
        ${(f.options || []).map(o => `<option value="${o}" ${defaultYear && o === defaultYear ? "selected" : ""}>${o}</option>`).join("")}
      </select>
      ${isSelectOther ? `<div id="${formId}-${otherId}-wrap" style="display:none;flex-direction:column;gap:4px;margin-top:4px;"><label style="font-size:9px;color:var(--blue3);letter-spacing:0.12em;">── ${otherLabel}</label><input id="${formId}-${otherId}" class="req-input" type="text" placeholder="${otherLabel}" style="width:100%;" /></div>` : ""}`;
    } else if (f.type === "date") {
      input = `<input id="${formId}-${f.id}" class="req-input date-inp" type="date" value="${new Date().toISOString().split('T')[0]}" style="width:100%;" />`;
    } else if (f.type === "number") {
      input = `<input id="${formId}-${f.id}" class="req-input" type="number" min="0" step="0.5" placeholder="${f.placeholder||''}" style="width:100%;" />`;
    } else {
      input = `<input id="${formId}-${f.id}" class="req-input" type="text" value="${f.default||''}" placeholder="${f.placeholder||''}" style="width:100%;" />`;
    }
    field.innerHTML = `<label style="font-size:9px;color:var(--blue3);letter-spacing:0.12em;">── ${f.label}</label>${input}`;
    form.appendChild(field);
  });

  // Add button
  const btnWrap = document.createElement("div");
  btnWrap.style.cssText = "grid-column:1/-1;display:flex;justify-content:flex-end;margin-top:4px;";
  const btn = document.createElement("button");
  btn.className = "btn-reset";
  btn.style.cssText = "border-color:" + streamColor + ";color:" + streamColor + ";";
  btn.textContent = "ADD ENTRY ▸";
  btn.dataset.lbtype  = type;
  btn.dataset.lbform  = formId;
  btn.dataset.lbfields = fields.map(f => f.id).join(",");
  btn.onclick = function() {
    submitLbForm(this.dataset.lbtype, this.dataset.lbform, this.dataset.lbfields.split(","));
  };
  btnWrap.appendChild(btn);
  form.appendChild(btnWrap);

  wrap.appendChild(form);
  return wrap;
}

function submitLbForm(type, formId, fieldIds) {
  const entry = {};
  fieldIds.forEach(fid => {
    const el = document.getElementById(`${formId}-${fid}`);
    if (el) entry[fid] = el.value.trim();
    // If this is a select with an "Other" option selected, capture the free-text
    const otherWrap = document.getElementById(`${formId}-${fid}_other-wrap`);
    if (otherWrap && otherWrap.style.display !== "none") {
      const otherEl = document.getElementById(`${formId}-${fid}_other`);
      if (otherEl && otherEl.value.trim()) entry[fid] = otherEl.value.trim();
    }
  });
  if (!entry.date) { alert("Please add a date"); return; }
  addLbEntry(type, entry);
  // Reset text/number inputs
  fieldIds.forEach(fid => {
    const el = document.getElementById(`${formId}-${fid}`);
    if (el && (el.type === "text" || el.type === "number")) el.value = "";
  });
  renderLogbook();
  updateReadiness();
}

function makeLbSection(title, stream, entries, type, summaryFn, showCount) {
  const wrap = document.createElement("div");
  wrap.style.cssText = "margin-bottom:24px;";
  const streamColor = stream === "gim" ? "var(--gim)" : stream === "renal" ? "var(--renal)" : "var(--blue)";

  // Year filter: CPD entries use explicit year field; others use date-based year
  const yearMap = { ST4:2026, ST5:2027, ST6:2028, ST7:2029 };
  const filtered = entries.filter(e => {
    if (e.year) return e.year === currentYear;
    if (!e.date) return true;
    return new Date(e.date).getFullYear() === yearMap[currentYear];
  });

  const head = document.createElement("div");
  head.className = "sec-head";
  head.style.marginTop = "16px";
  head.innerHTML =
    "<span class=\"sec-title\" style=\"color:" + streamColor + "\">" + title + "</span>" +
    "<span class=\"sec-rule\"></span>" +
    "<span class=\"sec-note\">" + filtered.length + " in " + currentYear + " · " + entries.length + " total" + (showCount ? " · adds to cumulative target" : "") + "</span>";
  wrap.appendChild(head);

  if (!filtered.length) {
    const empty = document.createElement("div");
    empty.style.cssText = "font-size:9px;color:var(--dim);letter-spacing:0.08em;padding:10px 0;";
    empty.textContent = "// no entries for " + currentYear + " — switch year or add above";
    wrap.appendChild(empty);
    return wrap;
  }

  // Compact table
  const table = document.createElement("div");
  table.style.cssText = "border:1px solid var(--blue5);overflow:hidden;";

  const hdr = document.createElement("div");
  hdr.style.cssText = "display:flex;background:var(--bg3);border-bottom:1px solid var(--blue5);padding:5px 10px;";
  hdr.innerHTML =
    "<span style=\"font-size:8px;color:var(--blue3);letter-spacing:0.12em;min-width:60px;\">DATE</span>" +
    "<span style=\"font-size:8px;color:var(--blue3);letter-spacing:0.12em;flex:1;\">DETAILS</span>" +
    "<span style=\"font-size:8px;color:var(--blue3);letter-spacing:0.12em;min-width:30px;text-align:right;\">DEL</span>";
  table.appendChild(hdr);

  [...filtered].sort((a,b) => (b.date||"").localeCompare(a.date||"")).forEach(function(e, i) {
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;padding:6px 10px;" +
      "border-bottom:1px solid var(--blue5);border-left:3px solid " + streamColor + ";" +
      "background:" + (i%2===0 ? "var(--bg2)" : "var(--bg3)") + ";";
    const date = e.date ? new Date(e.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short"}) : "—";
    const summary = summaryFn(e);
    row.innerHTML =
      "<span style=\"font-size:9px;color:var(--dim);min-width:60px;flex-shrink:0;\">" + date + "</span>" +
      "<span style=\"font-size:11px;color:#c8d8ff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\" title=\"" + summary + (e.notes ? " | " + e.notes : "") + "\">" + summary + "</span>";
    const delBtn = document.createElement("button");
    delBtn.style.cssText = "background:none;border:none;color:var(--dim);font-family:var(--font);font-size:10px;padding:0 4px;cursor:pointer;min-width:30px;text-align:right;";
    delBtn.textContent = "✕";
    delBtn.dataset.lbtype = type;
    delBtn.dataset.lbid   = String(e.id);
    delBtn.onmouseover = function() { this.style.color = "var(--red)"; };
    delBtn.onmouseout  = function() { this.style.color = "var(--dim)"; };
    delBtn.onclick = function() {
      if (confirm("Delete this entry?")) {
        deleteLbEntry(this.dataset.lbtype, this.dataset.lbid);
        renderLogbook();
        updateReadiness();
      }
    };
    row.appendChild(delBtn);
    table.appendChild(row);
  });

  wrap.appendChild(table);
  return wrap;
}

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAnJ3jPghuJUnQ3XysTDCfTFpror-Lv6IpmyS4Pc6e4BrSMUN_rT29mUMtyFZvYDyH/exec";

function buildLogbookPayload() {
  const yr = currentYear;
  const yearMap = { ST4:2026, ST5:2027, ST6:2028, ST7:2029 };

  function filterByYear(entries) {
    return entries.filter(e => {
      if (e.year) return e.year === yr;
      if (!e.date) return true;
      return new Date(e.date).getFullYear() === yearMap[yr];
    });
  }

  return {
    year:        yr,
    month:       new Date().toLocaleDateString("en-GB",{month:"long",year:"numeric"}),
    generatedOn: new Date().toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}),
    clinics_gim:      getLbEntries("clinics_gim"),        // all entries — cumulative target
    clinics_renal:    filterByYear(getLbEntries("clinics_renal")),
    procedures_renal: filterByYear(getLbEntries("procedures_renal")),
    procedures_gim:   filterByYear(getLbEntries("procedures_gim")),
    cpd_renal:        filterByYear(getLbEntries("cpd_renal")),
    cpd_gim:          getLbEntries("cpd_gim"),             // all entries — cumulative 100h target
    teaching:         filterByYear(getLbEntries("teaching")),
    simulation:       getLbEntries("simulation"),
  };
}

async function sendLogbookReport(auto) {
  // Auto: only send once per month
  if (auto) {
    const last = localStorage.getItem("pft_lb_last_sent");
    if (last) {
      const lastDate = new Date(parseInt(last));
      const now = new Date();
      if (lastDate.getMonth() === now.getMonth() && lastDate.getFullYear() === now.getFullYear()) return;
    }
  }

  const payload = buildLogbookPayload();
  const totalEntries = [
    payload.clinics_gim, payload.clinics_renal,
    payload.procedures_renal, payload.procedures_gim,
    payload.cpd_renal, payload.cpd_gim, payload.teaching
  ].reduce((acc, arr) => acc + arr.length, 0);

  if (!auto && totalEntries === 0) {
    alert("No logbook entries for " + currentYear + " to send.");
    return;
  }

  // Show sending state
  const sendBtn = document.querySelector(".btn-reset[style*='var(--green)']");
  if (sendBtn) { sendBtn.textContent = "✉ SENDING..."; sendBtn.disabled = true; }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    // no-cors means we can't read response — assume success
    const sentTs = Date.now();
    localStorage.setItem("pft_lb_last_sent", String(sentTs));
    fbPush("pft_lb_last_sent", sentTs);
    if (!auto) {
      alert("✓ Report sent for " + currentYear + "! Check your Gmail in a few seconds.");
      if (currentTab === "logbook") renderLogbook();
    }
  } catch(err) {
    if (!auto) alert("Send failed: " + err.message);
  } finally {
    if (sendBtn) { sendBtn.textContent = "✉ SEND REPORT"; sendBtn.disabled = false; }
  }
}

// Auto-send check on load — fires if new month since last send
setTimeout(() => sendLogbookReport(true), 5000);

function printLogbookReport() {
  const yr = currentYear;
  const yearMap = { ST4:2026, ST5:2027, ST6:2028, ST7:2029 };
  const fmt = d => {
    if (!d) return "—";
    const p = d.split("-");
    return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : d;
  };
  const filterByYear = entries => entries.filter(e => {
    if (e.year) return e.year === yr;
    if (!e.date) return true;
    return new Date(e.date).getFullYear() === yearMap[yr];
  });

  const gimClinics   = getLbEntries("clinics_gim");
  const renalClinics = filterByYear(getLbEntries("clinics_renal"));
  const renalProcs   = filterByYear(getLbEntries("procedures_renal"));
  const gimProcs     = filterByYear(getLbEntries("procedures_gim"));
  const renalCpd     = filterByYear(getLbEntries("cpd_renal"));
  const gimCpd       = getLbEntries("cpd_gim");
  const teaching     = filterByYear(getLbEntries("teaching"));
  const simulation   = getLbEntries("simulation");
  const totalSimHrs  = simulation.reduce((a,e) => a+(parseFloat(e.hours)||0), 0);
  const st7SimHrs    = simulation.filter(e => e.year==="ST7").reduce((a,e) => a+(parseFloat(e.hours)||0), 0);

  const totalCpdHrs  = gimCpd.reduce((a,e) => a+(parseFloat(e.hours)||0), 0);
  const onlineHrs    = gimCpd.filter(e => e.type==="Online CPD (approved)").reduce((a,e) => a+(parseFloat(e.hours)||0), 0);
  const onlineCapped = Math.min(onlineHrs, 15);
  const countedTotal = (totalCpdHrs - onlineHrs) + onlineCapped;

  const tbl = (headers, rows, accentColor) => {
    if (!rows.length) return `<p class="empty-note">No entries logged</p>`;
    const ths = headers.map(h => `<th>${h}</th>`).join("");
    const trs = rows.map((r,i) => `<tr class="${i%2===0?'even':'odd'}">${r.map(c=>`<td>${c||"—"}</td>`).join("")}</tr>`).join("");
    return `<table><thead style="--ac:${accentColor}"><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  };

  const secHead = (title) => `<div class="section-head"><h2>${title}</h2><div class="rule"></div></div>`;
  const badge = (t, cls) => `<span class="stream-badge ${cls}">${t}</span>`;
  const note  = (t) => `<span class="badge-note">${t}</span>`;
  const subHead = (badges, noteText) => `<div class="sub-head">${badges} ${note(noteText)}</div>`;

  const today = new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"}).replace(/\//g,"-");
  const fullDate = new Date().toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ARCP Logbook Report — ${yr}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;font-size:10.5pt;color:#111;background:#e8e8e8;padding:20px;}
    .page{background:#fff;max-width:210mm;margin:0 auto;padding:18mm 16mm;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
    .doc-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:10px;border-bottom:3px solid #003087;margin-bottom:14px;}
    .doc-header h1{font-size:15pt;font-weight:700;color:#003087;letter-spacing:0.02em;}
    .doc-header .subtitle{font-size:8.5pt;color:#555;margin-top:3px;text-transform:uppercase;letter-spacing:0.05em;}
    .doc-meta{text-align:right;font-size:8.5pt;color:#555;line-height:1.7;}
    .doc-meta strong{color:#003087;}
    .info-box{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid #003087;margin-bottom:16px;}
    .info-cell{padding:7px 11px;border-right:1px solid #ccd6e8;}
    .info-cell:last-child{border-right:none;}
    .info-cell .lbl{font-size:7pt;text-transform:uppercase;letter-spacing:0.1em;color:#666;margin-bottom:2px;}
    .info-cell .val{font-size:10.5pt;font-weight:700;color:#003087;}
    .summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
    .sum-box{border:1px solid #ddd;border-top:3px solid var(--c);padding:7px 10px;text-align:center;}
    .sum-box .num{font-size:18pt;font-weight:700;color:var(--c);line-height:1;}
    .sum-box .key{font-size:7pt;text-transform:uppercase;letter-spacing:0.1em;color:#666;margin-top:3px;}
    .section-head{display:flex;align-items:center;gap:10px;margin:16px 0 7px;page-break-after:avoid;}
    .section-head h2{font-size:9.5pt;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#003087;white-space:nowrap;}
    .section-head .rule{flex:1;height:1px;background:#003087;}
    .sub-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .stream-badge{font-size:7pt;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:0.08em;text-transform:uppercase;}
    .badge-gim{background:#e8f0ff;color:#003087;border:1px solid #b3c6f0;}
    .badge-renal{background:#f3eeff;color:#5b21b6;border:1px solid #c4b0e8;}
    .badge-note{font-size:7.5pt;color:#666;font-style:italic;}
    .empty-note{font-style:italic;color:#999;font-size:8.5pt;padding:6px 0;margin-bottom:12px;}
    table{width:100%;border-collapse:collapse;font-size:8.5pt;margin-bottom:12px;page-break-inside:auto;}
    thead tr{background:var(--ac,#003087);color:#fff;}
    thead th{padding:5px 7px;text-align:left;font-size:7.5pt;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;}
    tr.even{background:#f5f8ff;}
    tr.odd{background:#fff;}
    td{padding:4px 7px;border-bottom:1px solid #e8eef8;vertical-align:top;}
    .dops-yes{color:#166534;font-weight:700;}
    .cpd-summary{background:#f8f9ff;border:1px solid #ccd6e8;padding:7px 11px;margin-bottom:9px;font-size:8.5pt;color:#333;}
    .doc-footer{margin-top:20px;padding-top:8px;border-top:1px solid #ccd6e8;display:flex;justify-content:space-between;font-size:7pt;color:#888;}
    @media print{
      body{background:#fff;padding:0;}
      .page{box-shadow:none;padding:12mm 14mm;max-width:100%;}
      .section-head{page-break-after:avoid;}
      tr{page-break-inside:avoid;}
      .no-print{display:none;}
    }
  </style>
</head>
<body>
<div class="page">

  <div class="no-print" style="text-align:right;margin-bottom:12px;">
    <button onclick="window.print()" style="background:#003087;color:#fff;border:none;padding:8px 20px;font-size:10pt;cursor:pointer;border-radius:3px;">⎙ Print / Save as PDF</button>
  </div>

  <div class="doc-header">
    <div>
      <h1>ARCP Logbook Report</h1>
      <div class="subtitle">Renal Medicine &amp; General Internal Medicine · Dual CCT Training</div>
    </div>
    <div class="doc-meta">
      <div><strong>Generated:</strong> ${today}</div>
      <div><strong>Training Year:</strong> ${yr}</div>
      <div><strong>Programme:</strong> Renal + GIM ST4–ST7</div>
    </div>
  </div>

  <div class="info-box">
    <div class="info-cell"><div class="lbl">Programme</div><div class="val">Renal Medicine + GIM</div></div>
    <div class="info-cell"><div class="lbl">Current Year</div><div class="val">${yr}</div></div>
    <div class="info-cell"><div class="lbl">CCT Date</div><div class="val">Dec 2030</div></div>
  </div>

  <div class="summary-strip">
    <div class="sum-box" style="--c:#003087"><div class="num">${gimClinics.length}</div><div class="key">GIM Clinics (total)</div></div>
    <div class="sum-box" style="--c:#5b21b6"><div class="num">${renalClinics.length}</div><div class="key">Renal Clinics (${yr})</div></div>
    <div class="sum-box" style="--c:#166534"><div class="num">${renalProcs.length + gimProcs.length}</div><div class="key">Procedures (${yr})</div></div>
    <div class="sum-box" style="--c:#92400e"><div class="num">${teaching.length}</div><div class="key">Teaching (${yr})</div></div>
    <div class="sum-box" style="--c:#0e7490"><div class="num">${totalSimHrs.toFixed(1)}h</div><div class="key">Simulation (total)</div></div>
  </div>

  ${secHead("Clinics")}
  ${subHead(badge("Renal","badge-renal"), `${renalClinics.length} entries · ${yr}`)}
  ${tbl(["Date","Type","Hospital","Supervisor","Patients","Notes"],
    renalClinics.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.hospital,e.supervisor,e.patients?e.patients+" pts":"—",e.notes]),
    "#5b21b6")}
  ${subHead(badge("GIM","badge-gim"), `${gimClinics.length} total entries · all years · cumulative target 20`)}
  ${tbl(["Date","Type","Hospital","Supervisor","Patients","Year","Notes"],
    gimClinics.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.hospital,e.supervisor,e.patients?e.patients+" pts":"—",e.year||"—",e.notes]),
    "#003087")}

  ${secHead("Procedures")}
  ${subHead(badge("Renal","badge-renal"), `${renalProcs.length} entries · ${yr}`)}
  ${tbl(["Date","Procedure","Supervisor","DOPS","Notes"],
    renalProcs.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.supervisor,e.dops==="Yes"?'<span class="dops-yes">✓ Yes</span>':"No",e.notes]),
    "#5b21b6")}
  ${subHead(badge("GIM","badge-gim"), `${gimProcs.length} entries · ${yr}`)}
  ${tbl(["Date","Procedure","Supervisor","DOPS","Notes"],
    gimProcs.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.supervisor,e.dops==="Yes"?'<span class="dops-yes">✓ Yes</span>':"No",e.notes]),
    "#003087")}

  ${secHead("CPD / Study Leave")}
  <div class="cpd-summary">
    <strong>GIM CPD Summary:</strong> &nbsp;
    Counted total: <strong style="color:#003087">${countedTotal.toFixed(1)}h</strong> / 100h &nbsp;·&nbsp;
    Online: <strong>${onlineCapped.toFixed(1)}h</strong> / 15h max &nbsp;·&nbsp;
    External: <strong>${(totalCpdHrs-onlineHrs).toFixed(1)}h</strong>
  </div>
  ${subHead(badge("Renal","badge-renal"), `${renalCpd.length} entries · ${yr}`)}
  ${tbl(["Date","Type","Title / Event","Hours","Notes"],
    renalCpd.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.title,e.hours?e.hours+"h":"—",e.notes]),
    "#5b21b6")}
  ${subHead(badge("GIM","badge-gim"), `${gimCpd.length} total entries · all years · cumulative target 100h`)}
  ${tbl(["Date","Type","Title / Event","Hours","Year","Notes"],
    gimCpd.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.title,e.hours?e.hours+"h":"—",e.year||"—",e.notes]),
    "#003087")}

  ${secHead("Simulation")}
  <div class="cpd-summary">
    <strong>Simulation Summary:</strong> &nbsp;
    Total: <strong style="color:#003087">${totalSimHrs.toFixed(1)}h</strong> / 12h &nbsp;·&nbsp;
    ST7: <strong>${st7SimHrs.toFixed(1)}h</strong> / 4h min
  </div>
  ${subHead(badge("GIM","badge-gim"), simulation.length + " total entries · all years · cumulative target 12h")}
  ${tbl(["Date","Course","Title / Session","Hours","Hospital / Venue","Year","Notes"],
    simulation.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.course,e.title,e.hours?e.hours+"h":"—",e.hospital,e.year||"—",e.notes]),
    "#0e7490")}

  ${secHead("Teaching")}
  ${subHead("", `${teaching.length} sessions · ${yr}`)}
  ${tbl(["Date","Type","Topic","Audience","Observed by","Sign-off","Notes"],
    teaching.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(e=>[fmt(e.date),e.type,e.topic,e.audience,e.supervisor||"—",e.signoff,e.notes]),
    "#92400e")}

  <div class="doc-footer">
    <span>ARCP Portfolio Tracker · Auto-generated document</span>
    <span>Generated ${fullDate} · Confidential</span>
  </div>

</div>
</body>
</html>`;

  const w = window.open("", "_blank");
  if (!w) { alert("Please allow popups for this site to use the print view."); return; }
  w.document.write(html);
  w.document.close();
}

setInterval(updateCountdown, 60000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./arcp-sw.js").then(reg => {
    reg.update();
    reg.addEventListener("updatefound", () => {
      const nw = reg.installing;
      nw.addEventListener("statechange", () => {
        if (nw.state === "installed" && navigator.serviceWorker.controller) nw.postMessage("skipWaiting");
      });
    });
  }).catch(err => console.warn("SW registration failed:", err));
  let refreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => { if (!refreshing) { refreshing = true; window.location.reload(); } });
}
</script>
</body>
</html>

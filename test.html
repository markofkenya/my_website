<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>SCE·NEP // Nephrology Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#080c14"/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#080c14; --bg2:#0e1420; --bg3:#141c2c; --bg4:#1a2438;
      --border:#1e2a3a; --border2:#263445;
      --white:#dde6f0; --grey:#6a7d92; --grey2:#3d5068;
      --green:#4ade80; --yellow:#fbbf24; --cyan:#22d3ee;
      --pink:#f472b6; --red:#f87171; --blue:#60a5fa;
      --orange:#fb923c; --purple:#a78bfa;
      --accent:#22d3ee;
      --font:'Fira Code',monospace;
    }
    html,body { background:var(--bg); color:var(--white); font-family:var(--font); font-size:12px; min-height:100vh; line-height:1.5; }
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:var(--border2);}

    /* ── HEADER ── */
    #header { background:var(--bg2); border-bottom:1px solid var(--border2); }
    .hdr-top { display:flex; align-items:stretch; flex-wrap:wrap; }
    .hdr-logo { padding:12px 20px; border-right:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; }
    .logo-main { font-size:16px; font-weight:600; color:var(--cyan); letter-spacing:0.04em; }
    .logo-main span { color:var(--grey); }
    .logo-sub { font-size:8px; color:var(--grey); letter-spacing:0.18em; margin-top:2px; }
    .hdr-stat { padding:10px 18px; border-right:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; min-width:100px; }
    .stat-val { font-size:20px; font-weight:500; line-height:1; }
    .stat-key { font-size:8px; color:var(--grey); letter-spacing:0.12em; margin-top:3px; }
    .readiness-wrap { padding:10px 20px; display:flex; flex-direction:column; justify-content:center; flex:1; min-width:200px; }
    .readiness-label { font-size:8px; color:var(--grey); letter-spacing:0.15em; margin-bottom:6px; }
    .readiness-bar-bg { height:6px; background:var(--border2); overflow:hidden; }
    .readiness-bar { height:100%; transition:width 0.6s ease; }
    .readiness-pct { font-size:18px; font-weight:600; margin-top:4px; }
    .sync-wrap { padding:10px 16px; border-left:1px solid var(--border); display:flex; align-items:center; }
    .sync-dot { font-size:8px; color:var(--grey2); letter-spacing:0.08em; }

    /* ── TABBAR ── */
    #tabbar { background:var(--bg2); border-bottom:1px solid var(--border2); display:flex; overflow-x:auto; }
    .tab { padding:8px 18px; background:transparent; border:none; border-right:1px solid var(--border); border-bottom:2px solid transparent; color:var(--grey); font-family:var(--font); font-size:10px; cursor:pointer; letter-spacing:0.06em; white-space:nowrap; transition:all 0.1s; }
    .tab:hover { color:var(--white); background:var(--bg3); }
    .tab.active { color:var(--cyan); border-bottom-color:var(--cyan); background:var(--bg3); }
    .tab::before { content:"[ "; color:var(--grey2); }
    .tab::after { content:" ]"; color:var(--grey2); }

    /* ── SUBTAB (Pass 1 / Pass 2) ── */
    .subtab-row { display:flex; gap:0; background:var(--bg3); border-bottom:1px solid var(--border); padding:0 18px; }
    .subtab { padding:6px 14px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--grey); font-family:var(--font); font-size:9px; cursor:pointer; letter-spacing:0.08em; }
    .subtab.active { color:var(--yellow); border-bottom-color:var(--yellow); }

    /* ── MAIN ── */
    #main { padding:14px 18px 80px; }

    /* ── CATEGORY CARDS ── */
    .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:8px; margin-bottom:20px; }
    .cat-card { background:var(--bg2); border:1px solid var(--border2); border-left:3px solid var(--border2); padding:12px 14px; cursor:pointer; transition:all 0.1s; }
    .cat-card:hover { background:var(--bg3); }
    .cat-card.expanded { border-left-color:var(--cyan); }
    .cat-name { font-size:11px; font-weight:500; color:var(--white); margin-bottom:6px; }
    .cat-stats { display:flex; gap:12px; font-size:9px; color:var(--grey); margin-bottom:6px; }
    .cat-stat strong { color:var(--yellow); }
    .cat-bar-bg { height:3px; background:var(--border2); overflow:hidden; }
    .cat-bar { height:100%; background:var(--cyan); transition:width 0.4s; }

    /* ── QUESTION LIST ── */
    .q-list { background:var(--bg3); border:1px solid var(--border); border-top:none; padding:0; }
    .q-row { display:flex; align-items:center; gap:10px; padding:7px 12px; border-bottom:1px solid var(--border); font-size:10px; transition:background 0.1s; }
    .q-row:hover { background:var(--bg4); }
    .q-row:last-child { border-bottom:none; }
    .q-code { color:var(--cyan); font-size:9px; min-width:90px; letter-spacing:0.04em; }
    .q-pass-label { font-size:8px; color:var(--grey2); min-width:40px; }
    .q-actions { display:flex; gap:6px; align-items:center; margin-left:auto; }
    .q-btn { padding:2px 8px; border:1px solid var(--border2); background:transparent; color:var(--grey2); font-family:var(--font); font-size:9px; cursor:pointer; transition:all 0.1s; }
    .q-btn.correct { border-color:var(--green); color:var(--green); background:rgba(74,222,128,0.08); }
    .q-btn.incorrect { border-color:var(--red); color:var(--red); background:rgba(248,113,113,0.08); }
    .q-btn:hover:not(.correct):not(.incorrect) { border-color:var(--cyan); color:var(--cyan); }
    .conf-dots { display:flex; gap:3px; }
    .conf-dot { width:8px; height:8px; border-radius:50%; border:1px solid var(--border2); background:transparent; cursor:pointer; transition:all 0.1s; }
    .conf-dot.lit { background:var(--yellow); border-color:var(--yellow); }
    .note-inp { background:var(--bg); border:1px solid var(--border2); color:var(--grey); font-family:var(--font); font-size:9px; padding:2px 6px; width:140px; outline:none; }
    .note-inp:focus { border-color:var(--yellow); color:var(--white); }
    .pass-badge { font-size:7px; padding:1px 4px; letter-spacing:0.06em; border:1px solid; }
    .pass-badge.p1 { color:var(--blue); border-color:rgba(96,165,250,0.3); }
    .pass-badge.p1done { color:var(--green); border-color:rgba(74,222,128,0.3); }
    .pass-badge.p2 { color:var(--purple); border-color:rgba(167,139,250,0.3); }
    .pass-badge.p2done { color:var(--orange); border-color:rgba(251,146,60,0.3); }

    /* ── TOPIC COVERAGE ── */
    .topic-section { margin-bottom:20px; }
    .topic-hdr { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg2); border:1px solid var(--border2); cursor:pointer; }
    .topic-hdr:hover { background:var(--bg3); }
    .topic-hdr-name { font-size:11px; font-weight:500; color:var(--white); flex:1; }
    .topic-hdr-stats { font-size:9px; color:var(--grey); }
    .topic-hdr-pct { font-size:11px; font-weight:500; }
    .subtopic-list { background:var(--bg3); border:1px solid var(--border2); border-top:none; }
    .st-row { display:flex; align-items:center; gap:10px; padding:6px 14px; border-bottom:1px solid var(--border); font-size:10px; }
    .st-row:last-child { border-bottom:none; }
    .st-name { flex:1; color:var(--grey); }
    .st-name.read { color:var(--white); }
    .st-actions { display:flex; gap:6px; align-items:center; }
    .st-btn { padding:1px 7px; border:1px solid var(--border2); background:transparent; color:var(--grey2); font-family:var(--font); font-size:9px; cursor:pointer; }
    .st-btn.read { border-color:var(--green); color:var(--green); background:rgba(74,222,128,0.06); }
    .st-btn.reviewed { border-color:var(--cyan); color:var(--cyan); background:rgba(34,211,238,0.06); }

    /* ── SEC HEADS ── */
    .sec-head { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; padding:4px 0; border-bottom:1px solid var(--border); }
    .sec-title { font-size:10px; font-weight:500; color:var(--cyan); letter-spacing:0.08em; }
    .sec-rule { flex:1; }
    .sec-note { font-size:9px; color:var(--grey2); }
    .empty-msg { padding:30px 0; color:var(--grey2); font-size:10px; letter-spacing:0.08em; }
    .empty-msg::before { content:"> "; }

    /* ── OVERVIEW ── */
    .overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:6px; margin-bottom:20px; }
    .ov-card { background:var(--bg2); border:1px solid var(--border2); border-left:3px solid var(--border2); padding:10px 14px; }
    .ov-cat { font-size:10px; color:var(--white); font-weight:500; margin-bottom:6px; }
    .ov-row { display:flex; justify-content:space-between; font-size:9px; color:var(--grey); margin-bottom:3px; }
    .ov-row strong { color:var(--yellow); }
    .ov-bar-bg { height:2px; background:var(--border2); margin-top:6px; overflow:hidden; }
    .ov-bar { height:100%; }

    /* ── STATUS BAR ── */
    #statusbar { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border2); padding:5px 18px; display:flex; justify-content:space-between; align-items:center; font-size:9px; color:var(--grey2); z-index:100; }
    .sb-items { display:flex; gap:18px; flex-wrap:wrap; }
    .sb-item strong { color:var(--yellow); }

    @media(max-width:640px) {
      .cat-grid,.overview-grid { grid-template-columns:1fr; }
      .note-inp { width:80px; }
      #main { padding:10px 10px 80px; }
      .hdr-stat { min-width:80px; padding:8px 12px; }
    }
  </style>

</head>

window.addEventListener("sce-sync", () => {
  sceData = window._sce_data || {};
  document.getElementById("sync-dot").textContent = "● LIVE";
  document.getElementById("sync-dot").style.color = "var(--green)";
  renderAll();
});

function qKey(code) { return code.replace(/[^a-zA-Z0-9]/g, "_"); }
function stKey(cat, topic, sub) { return `st_${cat}_${topic}_${sub}`.replace(/[^a-zA-Z0-9]/g,"_").slice(0,100); }
function getQ(code) { return sceData.ksap?.[qKey(code)] || {}; }
function getST(cat, topic, sub) { return sceData.topics?.[stKey(cat,topic,sub)] || {}; }

function saveQ(code, updates) {
  if (!window._sce_fb) return;
  const { db, ref, update } = window._sce_fb;
  update(ref(db, `sceData/ksap/${qKey(code)}`), updates);
}

function saveST(cat, topic, sub, updates) {
  if (!window._sce_fb) return;
  const { db, ref, update } = window._sce_fb;
  update(ref(db, `sceData/topics/${stKey(cat,topic,sub)}`), updates);
}

// ══════════════════════════════════════════════════════════════════════
// COMPUTED STATS
// ══════════════════════════════════════════════════════════════════════
function computeStats() {
  let attempted = 0, correct = 0, p1done = 0, p2done = 0;
  KSAP.forEach(q => {
    const d = getQ(q.code);
    if (d.p1correct || d.p1incorrect) { attempted++; p1done++; }
    if (d.p2correct || d.p2incorrect) p2done++;
    if (d.p1correct) correct++;
  });
  const ksapPct = attempted > 0 ? Math.round(correct / attempted * 100) : 0;

  let stTotal = 0, stRead = 0;
  Object.entries(TOPICS).forEach(([cat, topics]) => {
    Object.entries(topics).forEach(([topic, subs]) => {
      subs.forEach(sub => {
        stTotal++;
        const d = getST(cat, topic, sub);
        if (d.read || d.reviewed) stRead++;
      });
    });
  });
  const topicPct = stTotal > 0 ? Math.round(stRead / stTotal * 100) : 0;
  const readiness = Math.round(ksapPct * 0.6 + topicPct * 0.4);
  return { attempted, correct, ksapPct, topicPct, readiness, p1done, p2done, stTotal, stRead };
}

function computeCatStats(cat) {
  const qs = KSAP.filter(q => q.category === cat);
  let attempted = 0, correct = 0, p1done = 0, p2done = 0;
  qs.forEach(q => {
    const d = getQ(q.code);
    if (d.p1correct || d.p1incorrect) { attempted++; p1done++; }
    if (d.p2correct || d.p2incorrect) p2done++;
    if (d.p1correct) correct++;
  });
  return { total: qs.length, attempted, correct, p1done, p2done,
    pct: attempted > 0 ? Math.round(correct/attempted*100) : 0 };
}

function renderAll() {
  const s = computeStats();
  const rPct = s.readiness;
  const rColor = rPct >= 70 ? "var(--green)" : rPct >= 40 ? "var(--yellow)" : "var(--red)";

  document.getElementById("hdr-ksap-pct").textContent = `${s.ksapPct}%`;
  document.getElementById("hdr-topic-pct").textContent = `${s.topicPct}%`;
  document.getElementById("hdr-attempted").textContent = s.attempted;
  document.getElementById("readiness-bar").style.width = `${rPct}%`;
  document.getElementById("readiness-bar").style.background = rColor;
  document.getElementById("readiness-pct").textContent = `${rPct}%`;
  document.getElementById("readiness-pct").style.color = rColor;
  document.getElementById("sb-p1").textContent = `${s.p1done}/675`;
  document.getElementById("sb-p2").textContent = `${s.p2done}/675`;

  renderTab(currentTab);
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.getAttribute("onclick").includes(`'${tab}'`)));
  ["overview","ksap","topics"].forEach(t =>
    document.getElementById(`tab-${t}`).style.display = t === tab ? "block" : "none");
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === "overview") renderOverview();
  if (tab === "ksap")     renderKSAP();
  if (tab === "topics")   renderTopics();
}

// ── KSAP ──────────────────────────────────────────────────────────────
function renderKSAP() {
  const el = document.getElementById("tab-ksap");
  const isModule = ksapMode === "module";

  let html = `
    <div class="subtab-row">
      <button class="subtab ${!isModule?'active':''}" onclick="setKsapMode('category')">PASS 1 — BY CATEGORY</button>
      <button class="subtab ${isModule?'active':''}" onclick="setKsapMode('module')">PASS 2 — BY MODULE</button>
    </div>`;

  if (!isModule) {
    // Category view
    const cats = [...new Set(KSAP.map(q => q.category))].sort();
    html += `<div style="padding-top:10px;">`;
    cats.forEach(cat => {
      const qs = KSAP.filter(q => q.category === cat);
      const cs = computeCatStats(cat);
      const color = CAT_COLORS[cat] || "var(--cyan)";
      const expanded = expandedCats.has(cat);
      html += `
        <div style="margin-bottom:6px;">
          <div class="cat-card ${expanded?'expanded':''}" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')">
            <div class="cat-name">${cat}</div>
            <div class="cat-stats">
              <span>P1: <strong>${cs.p1done}/${cs.total}</strong></span>
              <span>P2: <strong>${cs.p2done}/${cs.total}</strong></span>
              <span>Correct: <strong style="color:${cs.pct>=70?'var(--green)':cs.pct>=50?'var(--yellow)':'var(--red)'}">${cs.attempted>0?cs.pct+'%':'—'}</strong></span>
            </div>
            <div class="cat-bar-bg"><div class="cat-bar" style="width:${Math.round(cs.p1done/cs.total*100)}%;background:${color}"></div></div>
          </div>
          ${expanded ? `<div class="q-list">${qs.map(q => qRow(q, "p1")).join("")}</div>` : ""}
        </div>`;
    });
    html += `</div>`;
  } else {
    // Module view
    html += `<div style="padding-top:10px;">`;
    MODULES.forEach(mod => {
      const qs = KSAP.filter(q => q.module === mod);
      let p2done = 0;
      qs.forEach(q => { const d = getQ(q.code); if(d.p2correct||d.p2incorrect) p2done++; });
      const expanded = expandedCats.has(mod);
      html += `
        <div style="margin-bottom:6px;">
          <div class="cat-card ${expanded?'expanded':''}" onclick="toggleCat('${mod}')">
            <div class="cat-name">${mod}</div>
            <div class="cat-stats"><span>P2 progress: <strong>${p2done}/${qs.length}</strong></span></div>
            <div class="cat-bar-bg"><div class="cat-bar" style="width:${Math.round(p2done/qs.length*100)}%"></div></div>
          </div>
          ${expanded ? `<div class="q-list">${qs.map(q => qRow(q, "p2")).join("")}</div>` : ""}
        </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function qRow(q, pass) {
  const d = getQ(q.code);
  const p1c = d.p1correct, p1i = d.p1incorrect;
  const p2c = d.p2correct, p2i = d.p2incorrect;
  const conf = d.confidence || 0;
  const note = d.note || "";
  const color = CAT_COLORS[q.category] || "var(--cyan)";

  const p1badge = p1c ? `<span class="pass-badge p1done">P1✓</span>` :
                  p1i ? `<span class="pass-badge p1">P1✗</span>` :
                  `<span class="pass-badge" style="color:var(--grey2);border-color:var(--border2)">P1·</span>`;
  const p2badge = p2c ? `<span class="pass-badge p2done">P2✓</span>` :
                  p2i ? `<span class="pass-badge p2">P2✗</span>` :
                  `<span class="pass-badge" style="color:var(--grey2);border-color:var(--border2)">P2·</span>`;

  const isP1 = pass === "p1";
  const curCorrect = isP1 ? p1c : p2c;
  const curIncorrect = isP1 ? p1i : p2i;
  const correctField = isP1 ? "p1correct" : "p2correct";
  const incorrectField = isP1 ? "p1incorrect" : "p2incorrect";

  return `<div class="q-row">
    <span class="q-code" style="color:${color}">${q.code}</span>
    <span style="display:flex;gap:3px;">${p1badge}${p2badge}</span>
    <div class="q-actions">
      <button class="q-btn ${curCorrect?'correct':''}" onclick="toggleQ('${q.code}','${correctField}','${incorrectField}',${curCorrect||false})">✓</button>
      <button class="q-btn ${curIncorrect?'incorrect':''}" onclick="toggleQ('${q.code}','${incorrectField}','${correctField}',${curIncorrect||false})">✗</button>
      <div class="conf-dots">
        ${[1,2,3].map(n => `<div class="conf-dot ${conf>=n?'lit':''}" onclick="setQConf('${q.code}',${n})"></div>`).join("")}
      </div>
      <input class="note-inp" value="${escHtml(note)}" placeholder="why wrong..."
        onchange="saveQ('${q.code}',{note:this.value})" />
    </div>
  </div>`;
}

function toggleQ(code, field, otherField, current) {
  const updates = { [field]: !current };
  if (!current) updates[otherField] = false; // untick the other
  saveQ(code, updates);
}

function setQConf(code, n) {
  const d = getQ(code);
  saveQ(code, { confidence: d.confidence === n ? 0 : n });
}

function toggleCat(cat) {
  if (expandedCats.has(cat)) expandedCats.delete(cat);
  else expandedCats.add(cat);
  renderKSAP();
}

function setKsapMode(mode) {
  ksapMode = mode;
  expandedCats.clear();
  renderKSAP();
}

    Object.entries(topicsObj).forEach(([topic, subs]) => {
      subs.forEach(sub => {

        if (d.read || d.reviewed) catRead++;
      });
    });

    html += `
      <div class="topic-section">
        <div class="topic-hdr" style="border-left:3px solid ${color}" onclick="toggleTopicCat('${escAttr(cat)}')">

        </div>`;

    if (expandedTopics.has(cat)) {
      Object.entries(topicsObj).forEach(([topic, subs]) => {
        let topicRead = 0;
        subs.forEach(sub => { const d = getST(cat, topic, sub); if (d.read || d.reviewed) topicRead++; });

        html += `
          <div style="background:var(--bg2);border:1px solid var(--border2);border-top:none;padding:6px 14px;font-size:9px;color:var(--cyan);letter-spacing:0.1em;">
            ${topic} · <span style="color:var(--grey2)">${topicRead}/${subs.length}</span>
          </div>
          <div class="subtopic-list">
            ${subs.map(sub => {
              const d = getST(cat, topic, sub);
              const k = `'${escAttr(cat)}','${escAttr(topic)}','${escAttr(sub)}'`;
              return `<div class="st-row">
                <div class="st-name ${d.read||d.reviewed?'read':''}">${sub}</div>
                <div class="st-actions">
                  <button class="st-btn ${d.read?'read':''}" onclick="toggleST(${k},'read')">READ</button>
                  <button class="st-btn ${d.reviewed?'reviewed':''}" onclick="toggleST(${k},'reviewed')">REVIEWED</button>
                </div>
              </div>`;
            }).join("")}
          </div>`;
      });
    }

    html += `</div>`;
  });

  el.innerHTML = html;
}

function toggleTopicCat(cat) {
  if (expandedTopics.has(cat)) expandedTopics.delete(cat);
  else expandedTopics.add(cat);
  renderTopics();
}

function toggleST(cat, topic, sub, field) {
  const d = getST(cat, topic, sub);
  saveST(cat, topic, sub, { [field]: !d[field] });
}

function escHtml(t) {
  return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(t) {
  return String(t||"").replace(/'/g,"\\'");
}

// Init
setTab("overview");
setTimeout(() => {
  if (!window._sce_data) {
    sceData = {};
    renderAll();
  }
}, 3000);
</script>

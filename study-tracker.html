<html lang="en">
<head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = {
      apiKey:            "AIzaSyAhv0PJy95vqXdzOQkCqbg1FuXfiqHTnI0",
      authDomain:        "task-monitor-bd7ee.firebaseapp.com",
      databaseURL:       "https://task-monitor-bd7ee-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "task-monitor-bd7ee",
      storageBucket:     "task-monitor-bd7ee.firebasestorage.app",
      messagingSenderId: "544624731364",
      appId:             "1:544624731364:web:419d52fa061c5c7b4f38f1",
    };

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const storage  = getStorage(app);
    const sessRef  = ref(db, "studySessions");
    const topicRef = ref(db, "studyTopics");

    window._stx_fb = { db, ref, push, update, remove, sessRef, topicRef };

    // ── Storage upload ────────────────────────────────
    window.uploadSessionFile = function(file, sessionId, onProgress, onDone, onError) {
      const path     = `studyNotes/${sessionId}/${Date.now()}_${file.name}`;
      const fileRef  = sRef(storage, path);
      const task     = uploadBytesResumable(fileRef, file);

      task.on("state_changed",
        snap => onProgress(Math.round((snap.bytesTransferred / snap.totalBytes) * 100)),
        onError,
        async () => {
          const url = await getDownloadURL(task.snapshot.ref);
          onDone({ url, name: file.name, path, size: file.size });
        }
      );
    };

    // ── Storage delete ────────────────────────────────
    window.deleteSessionFile = function(filePath) {
      const fileRef = sRef(storage, filePath);
      return deleteObject(fileRef).catch(e => console.warn("Storage delete:", e));
    };

    onValue(sessRef, snap => {
      window._stx_sessions = snap.val() || {};
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });
    onValue(topicRef, snap => {
      window._stx_topics = snap.val() || {};
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d0d0d; --bg2:#141414; --bg3:#1a1a1a; --bg4:#222222;
      --border:#2a2a2a; --border2:#333333;
      --white:#e8e8e8; --grey:#888888; --grey2:#555555;
      --green:#98c379; --yellow:#e5c07b; --cyan:#56b6c2;
      --magenta:#ff79c6; --pink:#e06c75; --blue:#61afef;
      --orange:#d19a66; --purple:#c678dd;
      --renal:#d19a66; --gim:#61afef;

    .week-wrap{padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .week-label{font-size:9px;color:var(--grey);letter-spacing:0.1em;margin-bottom:5px;}

    .week-sub{font-size:8px;color:var(--grey2);margin-top:4px;}
    .retest-wrap,.stat-cell{padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .retest-val,.stat-val{font-size:22px;font-weight:500;line-height:1;color:var(--yellow);}
    .retest-val.alert{color:var(--pink);}
    .retest-val.warn{color:var(--orange);}
    .retest-key,.stat-key{font-size:8px;color:var(--grey);letter-spacing:0.12em;margin-top:3px;}
    .header-clock{padding:10px 16px;margin-left:auto;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;align-items:flex-end;}

    .sync-dot{font-size:8px;color:var(--grey2);margin-top:3px;}
    #tabbar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0;display:flex;overflow-x:auto;}
    .tab{padding:8px 16px;background:transparent;border:none;border-right:1px solid var(--border);border-bottom:2px solid transparent;color:var(--grey);font-family:var(--font);font-size:11px;cursor:pointer;transition:all 0.1s;white-space:nowrap;}

    #timer-panel{background:var(--bg2);border-bottom:1px solid var(--border2);padding:20px 24px;display:none;}

    .timer-clock{font-size:72px;font-weight:300;color:var(--green);letter-spacing:0.04em;line-height:1;font-variant-numeric:tabular-nums;}

    .timer-bar{height:100%;background:var(--green);transition:width 1s linear;}
    .timer-bar.rest{background:var(--cyan);}
    .timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .timer-btn{padding:5px 16px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:0.08em;cursor:pointer;transition:all 0.1s;}

    .attached-file-del{background:none;border:none;color:var(--grey2);cursor:pointer;}

    .sess-attachment-name{font-size:10px;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .status-left{display:flex;gap:18px;color:var(--grey2);}
    .status-item strong{color:var(--yellow);}
    .btn-timer{padding:3px 12px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:9px;cursor:pointer;letter-spacing:0.06em;}
    .btn-timer:hover{border-color:var(--green);color:var(--green);}
    .empty-msg{padding:30px 0;color:var(--grey2);font-size:10px;letter-spacing:0.08em;}
    .empty-msg::before{content:"> ";}
    @media(max-width:640px){
      .session-grid,.topic-grid{grid-template-columns:1fr;}
      .header-clock{display:none;}
      .form-field.wide{grid-column:span 1;}
      #main{padding:10px 12px 100px;}
    }
  </style>

</head>

<script>
// ══════════════════════════════════════════════════════
//  DEFAULT TOPICS
// ══════════════════════════════════════════════════════
const DEFAULT_TOPICS = {
  renal: [
    "AKI — aetiology & management","CKD — staging & progression","Glomerulonephritis — overview",
    "IgA nephropathy","Lupus nephritis","Minimal change disease","FSGS","Membranous nephropathy",
    "ANCA vasculitis","Anti-GBM disease","Diabetic nephropathy","Hypertensive nephropathy",
    "Renovascular disease","Renal tubular acidosis","Hyperkalaemia management",
    "Hyponatraemia","Acid-base disorders","Dialysis — HD principles","Dialysis — PD principles",
    "Renal transplantation — basics","Immunosuppression in transplant","Rejection types",
    "Nephrotic syndrome","Nephritic syndrome","Polycystic kidney disease",
    "Renal calculi","Obstruction & hydronephrosis","Renal anaemia","CKD-MBD",
    "Contrast nephropathy","Hepatorenal syndrome",
    "Renal physiology — GFR & tubular function","Renal haemodynamics",
    "Water & sodium homeostasis","Potassium homeostasis","Calcium & phosphate",
    "Acid-base — Henderson-Hasselbalch","Tubular transport mechanisms",
    "Diuretics — mechanism & use","RAAS — physiology & pharmacology",
    "Immunology of glomerulonephritis","Complement system in renal disease",
    "Transplant immunology","Pathology of diabetic nephropathy",
    "Pathology of FSGS","Pathology of membranous nephropathy",
    "Renal biopsy interpretation","Urinalysis & urine microscopy",
    "Biomarkers in AKI","Drug dosing in renal impairment",
  ],
  gim: [
    "Sepsis & septic shock","ACS — STEMI & NSTEMI","Heart failure — acute & chronic",
    "AF management","Pneumonia — CAP & HAP","COPD exacerbation","Asthma — acute",
    "PE & DVT","Stroke — ischaemic & haemorrhagic","Meningitis & encephalitis",
    "Diabetic emergencies — DKA & HHS","Hypo & hyperglycaemia","Thyroid emergencies",
    "Adrenal insufficiency","GI bleed — upper & lower","Acute liver failure",
    "Hepatic encephalopathy","Pancreatitis","Electrolyte disturbances",
    "Approach to shock","Overdose & poisoning","Antimicrobial stewardship",
  ],
};

const STREAM_LABELS = { renal:"RENAL", gim:"GIM" };

// Confidence → retest days mapping
function retestDaysFromConf(conf) {
  if (conf <= 2) return 7;   // 1-2 stars → 1 week
  if (conf === 3) return 14;  // 3 stars  → 2 weeks
  if (conf === 4) return 21;  // 4 stars  → 3 weeks
  return 28;                  // 5 stars  → 4 weeks
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let sessions  = {};
let topics    = {};
let currentTab = "log";
let selConfidence = 3;
let timerInterval = null;
let timerRunning  = false;
let timerCompleted = false;
let pendingFile   = null; // { url, name, path, size } — set after upload completes
let timerPhase    = "study"; // "study" | "rest"
let timerSeconds  = 90 * 60;
let timerTotal    = 90 * 60;

// ══════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════
function tickClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("clock-date").textContent =
    now.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}).toUpperCase();
}
tickClock(); setInterval(tickClock, 1000);

// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
function toggleTimer() {
  const panel = document.getElementById("timer-panel");
  panel.classList.toggle("show");
  if (panel.classList.contains("show")) updateTimerDisplay();
}

function timerStartPause() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById("timer-start-btn").textContent = "▶ RESUME";
  } else {
    timerRunning = true;
    document.getElementById("timer-start-btn").textContent = "⏸ PAUSE";
    timerInterval = setInterval(() => {
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        // Auto-switch phase
        if (timerPhase === "study") {
          timerCompleted = true; // unlock log form
          if (currentTab === "log") renderLog(); // refresh to show unlocked button
          switchPhase();
          document.getElementById("timer-clock").classList.add("alert-pulse");
          setTimeout(() => document.getElementById("timer-clock").classList.remove("alert-pulse"), 5000);
        } else {
          timerReset();
        }
        return;
      }
      timerSeconds--;
      updateTimerDisplay();
    }, 1000);
  }
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = timerPhase === "study" ? 90 * 60 : 20 * 60;
  timerTotal   = timerSeconds;
  document.getElementById("timer-start-btn").textContent = "▶ START";
  document.getElementById("timer-clock").classList.remove("alert-pulse");
  updateTimerDisplay();
}

function switchPhase() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerPhase   = timerPhase === "study" ? "rest" : "study";
  timerSeconds = timerPhase === "study" ? 90 * 60 : 20 * 60;
  timerTotal   = timerSeconds;
  document.getElementById("timer-start-btn").textContent = "▶ START";
  document.getElementById("timer-clock").classList.remove("alert-pulse");
  const btn = document.querySelector(".timer-btn.secondary:nth-child(3)");
  if (btn) btn.textContent = timerPhase === "study" ? "⇄ SWITCH TO REST" : "⇄ SWITCH TO STUDY";
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const pct = (timerSeconds / timerTotal) * 100;
  const isRest = timerPhase === "rest";

  document.getElementById("timer-phase").textContent = isRest ? "REST PERIOD" : "STUDY SESSION";
  document.getElementById("timer-clock").textContent =
    `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  document.getElementById("timer-clock").className = "timer-clock" + (isRest ? " rest" : "");
  document.getElementById("timer-bar").style.width = `${pct}%`;
  document.getElementById("timer-bar").className = "timer-bar" + (isRest ? " rest" : "");
}

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function topicList() {
  return Object.entries(topics).map(([id,t]) => ({id,...t})).sort((a,b) => a.name.localeCompare(b.name));
}
function sessionList() {
  return Object.entries(sessions).map(([id,s]) => ({id,...s})).sort((a,b) => b.date.localeCompare(a.date));
}
function retestStatus(sess) {
  if (sess.retestDone) return "done";
  if (!sess.retestDate) return "ok";
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(sess.retestDate);
  const diff  = Math.round((due - today) / 86400000);
  if (diff < 0)  return "due";
  if (diff <= 3) return "soon";
  return "ok";
}
function retestLabel(sess) {
  if (sess.retestDone) return "✓ RETESTED";
  if (!sess.retestDate) return "no retest set";
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(sess.retestDate);
  const diff  = Math.round((due - today) / 86400000);
  if (diff < 0)  return `!! OVERDUE ${Math.abs(diff)}d`;
  if (diff === 0) return "!! DUE TODAY";
  if (diff <= 3) return `⚠ due in ${diff}d`;
  return `retest ${due.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}`;
}
function weekSessions() {
  const now   = new Date();
  const day   = now.getDay() || 7;
  const monday = new Date(now); monday.setDate(now.getDate() - day + 1); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);
  return sessionList().filter(s => {
    const d = new Date(s.date);
    return d >= monday && d <= sunday;
  });
}
function calcStreak() {
  // Count consecutive weeks with >= 2 sessions going back from this week
  let streak = 0;
  const now = new Date();
  for (let w = 0; w < 52; w++) {
    const refDate = new Date(now);
    refDate.setDate(now.getDate() - w * 7);
    const day = refDate.getDay() || 7;
    const mon = new Date(refDate); mon.setDate(refDate.getDate() - day + 1); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
    const count = sessionList().filter(s => { const d = new Date(s.date); return d >= mon && d <= sun; }).length;
    if (count >= 2) streak++;
    else if (w > 0) break; // gap found
  }
  return streak;
}

function renderAll() {
  const wk      = weekSessions();

  const soon    = sessionList().filter(s => retestStatus(s) === "soon").length;
  const streak  = calcStreak();

  // Header stats
  document.getElementById("week-pips").querySelectorAll(".pip").forEach((p,i) => {
    p.classList.toggle("done", i < wk.length);
  });
  document.getElementById("week-sub").textContent = `${wk.length} / 2 sessions`;
  document.getElementById("sb-week").textContent = `${wk.length}/2`;
  document.getElementById("total-sessions").textContent = sessionList().length;
  document.getElementById("streak-val").textContent = streak;

  const retestEl = document.getElementById("retest-due-count");
  retestEl.textContent = due + soon;
  retestEl.className = "retest-val" + (due > 0 ? " alert" : soon > 0 ? " warn" : "");

  renderTab(currentTab);
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.getAttribute("onclick").includes(`'${tab}'`)));
  ["log","sessions","retests","topics"].forEach(t =>
    document.getElementById(`tab-${t}`).style.display = t === tab ? "block" : "none");
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === "log")      renderLog();
  if (tab === "sessions") renderSessions();
  if (tab === "retests")  renderRetests();
  if (tab === "topics")   renderTopics();
}

// ── All Sessions ──────────────────────────────────────
function renderSessions() {

let html = “”;

streams.forEach(stream => {
const filtered = list.filter(s => {
const t = topics[s.topicId];
return t && t.stream === stream;
});
if (!filtered.length) return;
html += ` <div class="sec-head"> <span class="sec-title" style="color:var(--${stream})">${STREAM_LABELS[stream]}</span> <span class="sec-rule"></span> <span class="sec-note">${filtered.length} sessions</span> </div> <div class="session-grid"> ${filtered.map(sessCard).join("")} </div>`;
});

el.innerHTML = html || `<div class="empty-msg">no sessions logged yet</div>`;

const soon  = sessionList().filter(s => retestStatus(s) === “soon”);
const ok    = sessionList().filter(s => retestStatus(s) === “ok” && s.retestDate && !s.retestDone);
const done  = sessionList().filter(s => s.retestDone);
let html = “”;

if (due.length) {
html += `<div class="sec-head"><span class="sec-title" style="color:var(--red)">OVERDUE</span><span class="sec-rule"></span><span class="sec-note">${due.length} retests overdue</span></div><div class="session-grid">${due.map(sessCard).join("")}</div>`;

}

html += `<div class="sec-head"><span class="sec-title">UPCOMING</span><span class="sec-rule"></span></div><div class="session-grid">${ok.map(sessCard).join("")}</div>`;

// ── Session card ──────────────────────────────────────
function sessCard(s) {
const topic  = topics[s.topicId] || { name: s.topicId || “Unknown”, stream: “renal” };
const rs     = retestStatus(s);
const rl     = retestLabel(s);
const stars  = [1,2,3,4,5].map(n =>
`<span class="conf-star ${n<=s.confidence?'lit':'dim'}">${n<=s.confidence?'★':'☆'}</span>`
).join(””);
// sessionTypes can be array (new) or string (legacy)
const types = Array.isArray(s.sessionTypes)
? s.sessionTypes.map(t => t.toUpperCase()).join(” + “)
: (s.sessionType || “STUDY”).toUpperCase();

return `<div class="sess-card stream-${topic.stream} ${rs==='due'?'retest-due':rs==='soon'?'retest-soon':''}"> <div class="sess-head"> <div class="sess-topic">${topic.name}</div> <span class="sess-stream ${topic.stream}">${STREAM_LABELS[topic.stream] || topic.stream.toUpperCase()}</span> </div> <div class="sess-meta"> ${new Date(s.date).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"})} &nbsp;·&nbsp; ${types} </div> ${s.notes ?`<div class="sess-notes">// ${s.notes}</div>`: ""} ${s.attachment ?`
<a class="sess-attachment" href="${s.attachment.url}" target="_blank" rel="noopener">
<span class="sess-attachment-icon">📎</span>
<span class="sess-attachment-name">${s.attachment.name}</span>
<span class="attached-file-size">${(s.attachment.size/1024).toFixed(0)}KB ↗</span>
</a>`: ""} <div class="sess-footer"> <div> <div class="conf-stars">${stars}</div> <div class="sess-retest ${rs}">${rl}</div> </div> <div class="sess-actions"> ${!s.retestDone && s.retestDate ?`<button class="sess-btn" onclick="markRetested('${s.id}')">✓ RETESTED</button>` : ""} <button class="sess-btn danger" onclick="deleteSession('${s.id}')">✕</button> </div> </div> </div>`;
}

// ══════════════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════════════
function handleFileSelect(input) {
const file = input.files[0];
if (!file) return;

// Show progress bar
const prog    = document.getElementById(“upload-progress”);
const progBar = document.getElementById(“upload-progress-bar”);
const preview = document.getElementById(“attached-file-preview”);
prog.style.display = “block”;
progBar.style.width = “0%”;
preview.innerHTML = `<div style="font-size:9px;color:var(--pur3);margin-top:6px;letter-spacing:0.08em;">// uploading ${file.name}...</div>`;

// Use a temp ID for upload path — will be linked to session on save
const tempId = `temp_${Date.now()}`;

if (!window.uploadSessionFile) {
preview.innerHTML = `<div style="font-size:9px;color:var(--red);margin-top:6px;">// Firebase Storage not ready — try again</div>`;
prog.style.display = “none”;
return;
}

window.uploadSessionFile(
file, tempId,
pct => { progBar.style.width = `${pct}%`; },
fileData => {
pendingFile = fileData;
prog.style.display = “none”;
preview.innerHTML = ` <div class="attached-file"> <span class="attached-file-name">📎 ${fileData.name}</span> <span class="attached-file-size">${(fileData.size/1024).toFixed(0)}KB</span> <button class="attached-file-del" onclick="clearPendingFile()">✕</button> </div>`;
},
err => {
prog.style.display = “none”;
preview.innerHTML = `<div style="font-size:9px;color:var(--red);margin-top:6px;">// upload failed: ${err.message}</div>`;
}
);
}

function clearPendingFile() {
if (pendingFile?.path) window.deleteSessionFile?.(pendingFile.path);
pendingFile = null;
const preview = document.getElementById(“attached-file-preview”);
if (preview) preview.innerHTML = “”;
const input = document.getElementById(“f-file”);
if (input) input.value = “”;
}

function setConf(n) {
selConfidence = n;
const row = document.getElementById(“star-row”);
if (row) {
row.querySelectorAll(”.star”).forEach((b, i) => {
b.className = “star” + (i < n ? “ lit” : “”);
b.textContent = i < n ? “★” : “☆”;
});
}
const hint = document.getElementById(“retest-hint”);
if (hint) {
const days = retestDaysFromConf(n);
hint.textContent = `// retest in ${days/7} week${days > 7 ? "s" : ""}`;
}
}

function saveSession() {
const topicId = document.getElementById(“f-topic”)?.value;
if (!topicId) { alert(“Please select a topic”); return; }

const date  = document.getElementById(“f-date”).value;
const notes = document.getElementById(“f-notes”).value.trim();

// Collect checked session types
const sessionTypes = [“study”,“quiz”,“teach”].filter(t =>
document.getElementById(`f-type-${t}`)?.checked
);
if (!sessionTypes.length) sessionTypes.push(“study”);

// Auto retest date from confidence
const days = retestDaysFromConf(selConfidence);
const d = new Date(date);
d.setDate(d.getDate() + days);
const retestDate = d.toISOString().split(“T”)[0];

const payload = {
topicId, date, sessionTypes, notes,
confidence: selConfidence,
retestDate, retestDone: false,
createdAt: Date.now(),
…(pendingFile ? { attachment: pendingFile } : {}),
};

if (window._stx_fb) {
window._stx_fb.push(window._stx_fb.sessRef, payload);
}
timerCompleted = false;
pendingFile = null;
clearForm();
}

function clearForm() {
const d = document.getElementById(“f-date”);
const t = document.getElementById(“f-topic”);
const n = document.getElementById(“f-notes”);
const f = document.getElementById(“f-file”);
const p = document.getElementById(“attached-file-preview”);
if (d) d.value = new Date().toISOString().split(“T”)[0];
if (t) t.value = “”;
if (n) n.value = “”;
if (f) f.value = “”;
if (p) p.innerHTML = “”;
pendingFile = null;
selConfidence = 3;
setConf(3);
renderLog(); // re-render to restore locked button state
}

function deleteSession(id) {
if (!confirm(“Delete this session?”)) return;
if (window._stx_fb) {
const { db, ref, remove } = window._stx_fb;
remove(ref(db, `studySessions/${id}`));
}
}

function markRetested(id) {
if (window._stx_fb) {
const { db, ref, update } = window._stx_fb;
update(ref(db, `studySessions/${id}`), { retestDone: true, retestedAt: Date.now() });
}
}

function addTopic() {
const name   = document.getElementById(“new-topic-name”)?.value.trim();
const stream = document.getElementById(“new-topic-stream”)?.value;
if (!name) return;
if (window._stx_fb) {
window._stx_fb.push(window._stx_fb.topicRef, { name, stream });
}
document.getElementById(“new-topic-name”).value = “”;
}

function deleteTopic(id) {
if (!confirm(“Delete this topic?”)) return;
if (window._stx_fb) {
const { db, ref, remove } = window._stx_fb;
remove(ref(db, `studyTopics/${id}`));
}
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
renderAll();
setTab(“log”);
</script>

<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>STX // Study Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="STX" />
  <meta name="theme-color" content="#06080f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAhv0PJy95vqXdzOQkCqbg1FuXfiqHTnI0",
      authDomain:        "task-monitor-bd7ee.firebaseapp.com",
      databaseURL:       "https://task-monitor-bd7ee-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "task-monitor-bd7ee",
      storageBucket:     "task-monitor-bd7ee.firebasestorage.app",
      messagingSenderId: "544624731364",
      appId:             "1:544624731364:web:419d52fa061c5c7b4f38f1",
    };

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const storage  = getStorage(app);
    const sessRef  = ref(db, "studySessions");
    const topicRef = ref(db, "studyTopics");
    const planRef  = ref(db, "studyPlan");

    window._stx_fb = { db, ref, push, update, remove, sessRef, topicRef, planRef };

    window.uploadSessionFile = function(file, sessionId, onProgress, onDone, onError) {
      const path     = `studyNotes/${sessionId}/${Date.now()}_${file.name}`;
      const fileRef  = sRef(storage, path);
      const task     = uploadBytesResumable(fileRef, file);

      task.on("state_changed",
        snap => onProgress(Math.round((snap.bytesTransferred / snap.totalBytes) * 100)),
        onError,
        async () => {
          const url = await getDownloadURL(task.snapshot.ref);
          onDone({ url, name: file.name, path, size: file.size });
        }
      );
    };

    window.deleteSessionFile = function(filePath) {
      const fileRef = sRef(storage, filePath);
      return deleteObject(fileRef).catch(e => console.warn("Storage delete:", e));
    };

    onValue(sessRef, snap => {
      window._stx_sessions = snap.val() || {};
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });
    onValue(topicRef, snap => {
      window._stx_topics = snap.val() || {};
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });
    onValue(planRef, snap => {
      window._stx_plan = snap.val() || {};
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d0d0d; --bg2:#141414; --bg3:#1a1a1a; --bg4:#222222;
      --border:#2a2a2a; --border2:#333333;
      --white:#e8e8e8; --grey:#888888; --grey2:#555555;
      --green:#98c379; --yellow:#e5c07b; --cyan:#56b6c2;
      --magenta:#ff79c6; --pink:#e06c75; --blue:#61afef;
      --orange:#d19a66; --purple:#c678dd;
      --renal:#d19a66; --gim:#61afef;
      --font:'Fira Code','Cascadia Code','Courier New',monospace;
    }
    html,body { background:var(--bg); color:var(--white); font-family:var(--font); font-size:13px; min-height:100vh; line-height:1.5; }
    ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:var(--border2);}
    #header{background:var(--bg2);border-bottom:1px solid var(--border2);}
    .header-top{display:flex;align-items:stretch;flex-wrap:wrap;border-bottom:1px solid var(--border);}
    .header-logo{padding:10px 18px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .logo-line1{font-size:14px;font-weight:600;line-height:1;color:var(--green);}
    .logo-line1::before{content:"~/";color:var(--grey);}
    .logo-line1 span{color:var(--grey);}
    .logo-line2{font-size:9px;color:var(--grey);margin-top:3px;letter-spacing:0.12em;}
    .logo-sub{font-size:9px;color:var(--grey2);margin-top:2px;}
    .week-wrap{padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .week-label{font-size:9px;color:var(--grey);letter-spacing:0.1em;margin-bottom:5px;}
    .week-pips{display:flex;gap:5px;}
    .pip{width:24px;height:24px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--grey2);}
    .pip.done{background:rgba(152,195,121,0.12);border-color:var(--green);color:var(--green);}
    .week-sub{font-size:8px;color:var(--grey2);margin-top:4px;}
    .retest-wrap,.stat-cell{padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .retest-val,.stat-val{font-size:22px;font-weight:500;line-height:1;color:var(--yellow);}
    .retest-val.alert{color:var(--pink);}
    .retest-val.warn{color:var(--orange);}
    .retest-key,.stat-key{font-size:8px;color:var(--grey);letter-spacing:0.12em;margin-top:3px;}
    .header-clock{padding:10px 16px;margin-left:auto;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;align-items:flex-end;}
    .clock-time{font-size:16px;font-weight:500;color:var(--cyan);}
    .clock-date{font-size:9px;color:var(--grey);margin-top:2px;}
    .sync-dot{font-size:8px;color:var(--grey2);margin-top:3px;}
    #tabbar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0;display:flex;overflow-x:auto;}
    .tab{padding:8px 16px;background:transparent;border:none;border-right:1px solid var(--border);border-bottom:2px solid transparent;color:var(--grey);font-family:var(--font);font-size:11px;cursor:pointer;transition:all 0.1s;white-space:nowrap;}
    .tab:hover{color:var(--white);background:var(--bg3);}
    .tab.active{color:var(--yellow);border-bottom-color:var(--yellow);background:var(--bg3);}
    .tab::before{content:"[ ";color:var(--grey2);}
    .tab::after{content:" ]";color:var(--grey2);}
    #timer-panel{background:var(--bg2);border-bottom:1px solid var(--border2);padding:20px 24px;display:none;}
    #timer-panel.show{display:block;}
    .timer-display{text-align:center;margin-bottom:12px;}
    .timer-phase{font-size:9px;letter-spacing:0.2em;color:var(--grey);margin-bottom:6px;}
    .timer-phase::before{content:"# ";color:var(--grey2);}
    .timer-clock{font-size:72px;font-weight:300;color:var(--green);letter-spacing:0.04em;line-height:1;font-variant-numeric:tabular-nums;}
    .timer-clock.rest{color:var(--cyan);}
    .timer-clock.alert-pulse{animation:tpulse 1s ease-in-out infinite;}
    @keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .timer-bar-wrap{height:2px;background:var(--border2);margin-bottom:14px;overflow:hidden;}
    .timer-bar{height:100%;background:var(--green);transition:width 1s linear;}
    .timer-bar.rest{background:var(--cyan);}
    .timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .timer-btn{padding:5px 16px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:0.08em;cursor:pointer;transition:all 0.1s;}
    .timer-btn:hover{border-color:var(--green);color:var(--green);}
    .timer-btn.secondary:hover{border-color:var(--cyan);color:var(--cyan);}
    .timer-btn.danger{color:var(--pink);}
    .timer-btn.danger:hover{border-color:var(--pink);}
    #main{padding:14px 18px 100px;}
    .sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding:4px 0;border-bottom:1px solid var(--border);}
    .sec-title{font-size:11px;font-weight:500;color:var(--green);}
    .sec-rule{flex:1;}
    .sec-note{font-size:9px;color:var(--grey2);}
    .log-form{background:var(--bg2);border:1px solid var(--border2);border-top:2px solid var(--yellow);padding:12px 14px;margin-bottom:18px;}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:10px;}
    .form-field{display:flex;flex-direction:column;gap:3px;}
    .form-field.wide{grid-column:span 2;}
    .form-label{font-size:9px;color:var(--grey);letter-spacing:0.12em;}
    .form-label::before{content:"\u2500\u2500 ";color:var(--grey2);}
    .form-inp{background:var(--bg);border:1px solid var(--border2);color:var(--white);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none;transition:border-color 0.1s;caret-color:var(--green);}
    .form-inp:focus{border-color:var(--yellow);}
    .form-inp option{background:var(--bg2);color:var(--white);}
    textarea.form-inp{resize:vertical;min-height:52px;color:var(--yellow);}
    .form-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .star-row{display:flex;gap:3px;}
    .star{width:22px;height:22px;border:1px solid var(--border2);background:transparent;color:var(--grey2);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
    .star.lit{color:var(--yellow);border-color:var(--yellow);background:rgba(229,192,123,0.08);}
    .session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:6px;margin-bottom:18px;}
    .sess-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border2);padding:10px 12px;transition:background 0.1s;}
    .sess-card:hover{background:var(--bg3);}
    .sess-card.stream-renal{border-left-color:var(--orange);}
    .sess-card.stream-gim{border-left-color:var(--blue);}
    .sess-card.retest-due{border-left-color:var(--pink);background:rgba(224,108,117,0.03);}
    .sess-card.retest-soon{border-left-color:var(--yellow);}
    .sess-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
    .sess-topic{font-size:12px;font-weight:500;color:var(--white);}
    .sess-stream{font-size:8px;font-weight:500;padding:1px 5px;letter-spacing:0.06em;}
    .sess-stream.renal{color:var(--orange);border:1px solid rgba(209,154,102,0.3);}
    .sess-stream.gim{color:var(--blue);border:1px solid rgba(97,175,239,0.3);}
    .sess-meta{font-size:9px;color:var(--grey2);margin-bottom:5px;}
    .sess-notes{font-size:10px;color:var(--grey);padding:3px 8px;border-left:2px solid var(--border2);margin-bottom:6px;line-height:1.6;}
    .sess-footer{display:flex;justify-content:space-between;align-items:center;}
    .sess-retest{font-size:9px;font-weight:500;}
    .sess-retest.due{color:var(--pink);}
    .sess-retest.soon{color:var(--yellow);}
    .sess-retest.ok{color:var(--grey2);}
    .sess-retest.done{color:var(--green);}
    .sess-actions{display:flex;gap:3px;}
    .sess-btn{background:none;border:1px solid var(--border2);color:var(--grey2);font-family:var(--font);font-size:9px;padding:2px 7px;cursor:pointer;transition:all 0.1s;}
    .sess-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    .sess-btn.danger:hover{border-color:var(--pink);color:var(--pink);}
    .conf-stars{display:flex;gap:2px;margin-bottom:2px;}
    .conf-star.lit{color:var(--yellow);}
    .conf-star.dim{color:var(--grey2);}
    .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:3px;margin-bottom:18px;}
    .topic-card{background:transparent;border:none;border-bottom:1px solid var(--border);padding:5px 8px;display:flex;justify-content:space-between;align-items:center;}
    .topic-card:hover{background:var(--bg2);}
    .topic-name{font-size:11px;color:var(--white);}
    .topic-stream{font-size:8px;}
    .topic-stream.renal{color:var(--orange);}
    .topic-stream.gim{color:var(--blue);}
    .topic-del{background:none;border:none;color:var(--grey2);font-size:10px;cursor:pointer;padding:2px 4px;}
    .topic-del:hover{color:var(--pink);}
    .add-topic-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
    .btn-primary{padding:5px 16px;background:transparent;border:1px solid var(--green);color:var(--green);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:0.08em;cursor:pointer;transition:all 0.1s;}
    .btn-primary:hover{background:rgba(152,195,121,0.1);}
    .btn-primary:disabled{border-color:var(--grey2);color:var(--grey2);cursor:not-allowed;opacity:0.5;}
    .btn-secondary{padding:5px 12px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:10px;letter-spacing:0.06em;cursor:pointer;}
    .btn-secondary:hover{border-color:var(--grey);color:var(--white);}
    .upload-area{border:1px dashed var(--border2);padding:8px 12px;margin-top:5px;cursor:pointer;transition:all 0.1s;color:var(--grey2);font-size:10px;}
    .upload-area:hover{border-color:var(--cyan);color:var(--cyan);}
    .upload-progress{height:2px;background:var(--border2);margin-top:5px;overflow:hidden;display:none;}
    .upload-progress-bar{height:100%;background:var(--green);transition:width 0.2s;}
    .attached-file{display:flex;align-items:center;gap:8px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);margin-top:4px;font-size:10px;}
    .attached-file-name{color:var(--yellow);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .attached-file-size{color:var(--grey2);font-size:8px;}
    .attached-file-del{background:none;border:none;color:var(--grey2);cursor:pointer;}
    .attached-file-del:hover{color:var(--pink);}
    .sess-attachment{display:flex;align-items:center;gap:6px;margin-top:4px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border);text-decoration:none;border-left:2px solid var(--cyan);}
    .sess-attachment-name{font-size:10px;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sess-attachment-icon{color:var(--grey2);font-size:9px;}
    #statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);padding:5px 18px;display:flex;justify-content:space-between;align-items:center;z-index:100;font-size:9px;}
    .status-left{display:flex;gap:18px;color:var(--grey2);}
    .status-item strong{color:var(--yellow);}
    .btn-timer{padding:3px 12px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:9px;cursor:pointer;letter-spacing:0.06em;}
    .btn-timer:hover{border-color:var(--green);color:var(--green);}
    .empty-msg{padding:30px 0;color:var(--grey2);font-size:10px;letter-spacing:0.08em;}
    .empty-msg::before{content:"> ";}
    .topic-search-wrap{position:relative;}
    .topic-search-inp{background:var(--bg);border:1px solid var(--border2);color:var(--white);font-family:var(--font);font-size:12px;padding:5px 8px;width:100%;outline:none;caret-color:var(--green);transition:border-color 0.1s;}
    .topic-search-inp:focus{border-color:var(--yellow);}
    .topic-dropdown{position:absolute;top:100%;left:0;right:0;z-index:500;background:var(--bg2);border:1px solid var(--yellow);border-top:none;max-height:180px;overflow-y:auto;display:none;}
    .topic-dropdown.open{display:block;}
    .topic-opt{padding:7px 10px;font-size:11px;color:var(--white);cursor:pointer;border-bottom:1px solid var(--border);}
    .topic-opt:hover,.topic-opt.active{background:var(--bg3);color:var(--yellow);}
    .topic-opt-stream{font-size:8px;color:var(--grey2);margin-left:6px;}
    .topic-opt.empty{color:var(--grey2);cursor:default;font-style:italic;}
    @media(max-width:640px){
      .session-grid,.topic-grid{grid-template-columns:1fr;}
      .header-clock{display:none;}
      .form-field.wide{grid-column:span 1;}
      #main{padding:10px 12px 100px;}
    }
  </style>

</head>
<body>

<div id="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-line1">STX<span>//</span>01</div>
      <div class="logo-line2">STUDY TRACKER</div>
      <div class="logo-sub">RENAL &middot; GIM</div>
    </div>
    <div class="week-wrap">
      <div class="week-label">THIS WEEK</div>
      <div class="week-pips" id="week-pips">
        <div class="pip" id="pip-1">1</div>
        <div class="pip" id="pip-2">2</div>
      </div>
      <div class="week-sub" id="week-sub">0 / 2 sessions</div>
    </div>
    <div class="retest-wrap">
      <div class="retest-val" id="retest-due-count">0</div>
      <div class="retest-key">RETESTS DUE</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="total-sessions">0</div>
      <div class="stat-key">TOTAL SESSIONS</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="streak-val">0</div>
      <div class="stat-key">WEEK STREAK</div>
    </div>
    <div class="header-clock">
      <div class="clock-time" id="clock">00:00</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="sync-dot" id="sync-dot">&#9679; CONNECTING</div>
    </div>
  </div>
</div>

<div id="timer-panel">
  <div class="timer-display">
    <div class="timer-phase" id="timer-phase">STUDY SESSION</div>
    <div class="timer-clock" id="timer-clock">90:00</div>
  </div>
  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timer-bar" style="width:100%"></div>
  </div>
  <div class="timer-btns">
    <button class="timer-btn" id="timer-start-btn" onclick="timerStartPause()">&#9654; START</button>
    <button class="timer-btn secondary" onclick="timerReset()">&#8634; RESET</button>
    <button class="timer-btn secondary" id="switch-phase-btn" onclick="switchPhase()">&#8644; SWITCH TO REST</button>
    <button class="timer-btn danger" onclick="toggleTimer()">&#10005; CLOSE</button>
  </div>
</div>

<div id="tabbar">
  <button class="tab active" onclick="setTab('today')">TODAY</button>
  <button class="tab" onclick="setTab('log')">LOG SESSION</button>
  <button class="tab" onclick="setTab('sessions')">SESSIONS</button>
  <button class="tab" onclick="setTab('retests')">RETESTS</button>
  <button class="tab" onclick="setTab('plan')">PLAN</button>
  <button class="tab" onclick="setTab('topics')">TOPICS</button>
</div>

<div id="main">
  <div id="tab-today"    style="display:none"></div>
  <div id="tab-log"      style="display:none"></div>
  <div id="tab-sessions" style="display:none"></div>
  <div id="tab-retests"  style="display:none"></div>
  <div id="tab-plan"     style="display:none"></div>
  <div id="tab-topics"   style="display:none"></div>
</div>

<div id="statusbar">
  <div class="status-left">
    <span class="status-item">Sessions this week: <strong id="sb-week">0/2</strong></span>
    <span class="status-item" id="sb-sync" style="color:var(--yellow)">&#9679; CONNECTING</span>
  </div>
  <button class="btn-timer" onclick="toggleTimer()">&#9201; TIMER</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DEFAULT TOPICS
// ══════════════════════════════════════════════════════
const DEFAULT_TOPICS = {
  renal: [
    "AKI \u2014 aetiology & management","CKD \u2014 staging & progression","Glomerulonephritis \u2014 overview",
    "IgA nephropathy","Lupus nephritis","Minimal change disease","FSGS","Membranous nephropathy",
    "ANCA vasculitis","Anti-GBM disease","Diabetic nephropathy","Hypertensive nephropathy",
    "Renovascular disease","Renal tubular acidosis","Hyperkalaemia management",
    "Hyponatraemia","Acid-base disorders","Dialysis \u2014 HD principles","Dialysis \u2014 PD principles",
    "Renal transplantation \u2014 basics","Immunosuppression in transplant","Rejection types",
    "Nephrotic syndrome","Nephritic syndrome","Polycystic kidney disease",
    "Renal calculi","Obstruction & hydronephrosis","Renal anaemia","CKD-MBD",
    "Contrast nephropathy","Hepatorenal syndrome",
    "Renal physiology \u2014 GFR & tubular function","Renal haemodynamics",
    "Water & sodium homeostasis","Potassium homeostasis","Calcium & phosphate",
    "Acid-base \u2014 Henderson-Hasselbalch","Tubular transport mechanisms",
    "Diuretics \u2014 mechanism & use","RAAS \u2014 physiology & pharmacology",
    "Immunology of glomerulonephritis","Complement system in renal disease",
    "Transplant immunology","Pathology of diabetic nephropathy",
    "Pathology of FSGS","Pathology of membranous nephropathy",
    "Renal biopsy interpretation","Urinalysis & urine microscopy",
    "Biomarkers in AKI","Drug dosing in renal impairment",
  ],
  gim: [
    "Sepsis & septic shock","ACS \u2014 STEMI & NSTEMI","Heart failure \u2014 acute & chronic",
    "AF management","Pneumonia \u2014 CAP & HAP","COPD exacerbation","Asthma \u2014 acute",
    "PE & DVT","Stroke \u2014 ischaemic & haemorrhagic","Meningitis & encephalitis",
    "Diabetic emergencies \u2014 DKA & HHS","Hypo & hyperglycaemia","Thyroid emergencies",
    "Adrenal insufficiency","GI bleed \u2014 upper & lower","Acute liver failure",
    "Hepatic encephalopathy","Pancreatitis","Electrolyte disturbances",
    "Approach to shock","Overdose & poisoning","Antimicrobial stewardship",
  ],
};

const STREAM_LABELS = { renal:"RENAL", gim:"GIM" };

// ── Adaptive spaced repetition ────────────────────────
function nextRetestDays(conf, prevInterval) {
  const prev = prevInterval || 7;
  if (conf <= 2) return 3;
  if (conf === 3) return Math.round(prev * 1.5);
  if (conf === 4) return Math.round(prev * 2);
  return Math.round(prev * 2.5);
}

function retestDaysFromConf(conf) {
  if (conf <= 2) return 3;
  if (conf === 3) return 14;
  if (conf === 4) return 21;
  return 28;
}

// ── Weakest topics ────────────────────────────────────
function weakestTopics(n) {
  n = n || 5;
  var map = {};
  sessionList().forEach(function(s) {
    if (!s.topicId || !s.confidence) return;
    if (!map[s.topicId]) map[s.topicId] = [];
    map[s.topicId].push(s.confidence);
  });
  return Object.entries(map)
    .map(function(entry) {
      var id = entry[0], confs = entry[1];
      return {
        id: id,
        name: (topics[id] || {}).name || "Unknown",
        stream: (topics[id] || {}).stream || "renal",
        avg: confs.reduce(function(a,b){ return a+b; }, 0) / confs.length,
        count: confs.length,
      };
    })
    .sort(function(a,b){ return a.avg - b.avg; })
    .slice(0, n);
}

function toggleTimer() {
  var panel = document.getElementById("timer-panel");
  panel.classList.toggle("show");
  if (panel.classList.contains("show")) updateTimerDisplay();
}

function timerStartPause() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById("timer-start-btn").innerHTML = "&#9654; RESUME";
  } else {
    if (!timerStartTime && timerPhase === "study") timerStartTime = Date.now();
    timerRunning = true;
    document.getElementById("timer-start-btn").innerHTML = "&#9208; PAUSE";
    timerInterval = setInterval(function() {
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        if (timerPhase === "study") {
          timerCompleted = true;
          if (currentTab === "log") renderLog();
          if (currentTab === "today") renderToday();
          switchPhase();
          document.getElementById("timer-clock").classList.add("alert-pulse");
          setTimeout(function() { document.getElementById("timer-clock").classList.remove("alert-pulse"); }, 5000);
        } else {
          timerReset();
        }
        return;
      }
      timerSeconds--;
      updateTimerDisplay();
    }, 1000);
  }
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning  = false;
  timerStartTime = null;
  timerSeconds  = timerPhase === "study" ? 90 * 60 : 20 * 60;
  timerTotal    = timerSeconds;
  document.getElementById("timer-start-btn").innerHTML = "&#9654; START";
  document.getElementById("timer-clock").classList.remove("alert-pulse");
  updateTimerDisplay();
}

function switchPhase() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerPhase   = timerPhase === "study" ? "rest" : "study";
  timerSeconds = timerPhase === "study" ? 90 * 60 : 20 * 60;
  timerTotal   = timerSeconds;
  if (timerPhase === "study") timerStartTime = null;
  document.getElementById("timer-start-btn").innerHTML = "&#9654; START";
  document.getElementById("timer-clock").classList.remove("alert-pulse");
  var btn = document.getElementById("switch-phase-btn");
  if (btn) btn.innerHTML = timerPhase === "study" ? "&#8644; SWITCH TO REST" : "&#8644; SWITCH TO STUDY";
  updateTimerDisplay();
}

function updateTimerDisplay() {
  var m = Math.floor(timerSeconds / 60);
  var s = timerSeconds % 60;
  var pct = (timerSeconds / timerTotal) * 100;
  var isRest = timerPhase === "rest";
  document.getElementById("timer-phase").textContent = isRest ? "REST PERIOD" : "STUDY SESSION";
  document.getElementById("timer-clock").textContent =
    String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  document.getElementById("timer-clock").className = "timer-clock" + (isRest ? " rest" : "");
  document.getElementById("timer-bar").style.width = pct + "%";
  document.getElementById("timer-bar").className = "timer-bar" + (isRest ? " rest" : "");
}

function topicList() {
  return Object.entries(topics).map(function(e){ return Object.assign({id:e[0]}, e[1]); }).sort(function(a,b){ return a.name.localeCompare(b.name); });
}
function sessionList() {
  return Object.entries(sessions).map(function(e){ return Object.assign({id:e[0]}, e[1]); }).sort(function(a,b){ return b.date.localeCompare(a.date); });
}
function retestStatus(sess) {
  if (sess.retestDone) return "done";
  if (!sess.retestDate) return "ok";
  var today = new Date(); today.setHours(0,0,0,0);
  var due   = new Date(sess.retestDate);
  var diff  = Math.round((due - today) / 86400000);
  if (diff < 0)  return "due";
  if (diff <= 3) return "soon";
  return "ok";
}
function retestLabel(sess) {
  if (sess.retestDone) return "\u2713 RETESTED";
  if (!sess.retestDate) return "no retest set";
  var today = new Date(); today.setHours(0,0,0,0);
  var due   = new Date(sess.retestDate);
  var diff  = Math.round((due - today) / 86400000);
  if (diff < 0)  return "!! OVERDUE " + Math.abs(diff) + "d";
  if (diff === 0) return "!! DUE TODAY";
  if (diff <= 3) return "\u26A0 due in " + diff + "d";
  return "retest " + due.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
}
function weekSessions() {
  var now    = new Date();
  var day    = now.getDay() || 7;
  var monday = new Date(now); monday.setDate(now.getDate() - day + 1); monday.setHours(0,0,0,0);
  var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);
  return sessionList().filter(function(s) { var d = new Date(s.date); return d >= monday && d <= sunday; });
}
function totalStudyHours() {
  return sessionList().reduce(function(acc, s) { return acc + (s.duration || 90); }, 0) / 60;
}
function calcStreak() {
  var streak = 0;
  var now = new Date();
  for (var w = 0; w < 52; w++) {
    var refDate = new Date(now); refDate.setDate(now.getDate() - w * 7);
    var day = refDate.getDay() || 7;
    var mon = new Date(refDate); mon.setDate(refDate.getDate() - day + 1); mon.setHours(0,0,0,0);
    var sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
    var count = sessionList().filter(function(s) { var d = new Date(s.date); return d >= mon && d <= sun; }).length;
    if (count >= 2) streak++;
    else if (w > 0) break;
  }
  return streak;
}

// ── Session card ──────────────────────────────────────
function sessCard(s) {
var topic = topics[s.topicId] || { name: s.topicId || “Unknown”, stream: “renal” };
var rs    = retestStatus(s);
var rl    = retestLabel(s);
var stars = ‘’;
for (var n = 1; n <= 5; n++) {
stars += ‘<span class="conf-star ' + (n<=s.confidence?'lit':'dim') + '">’ + (n<=s.confidence?’\u2605’:’\u2606’) + ‘</span>’;
}

var typeArr = Array.isArray(s.sessionTypes)
? s.sessionTypes
: s.sessionType ? [s.sessionType] : [“study”];
var typeBadges = typeArr.map(function(t) {
return ‘<span style="font-size:8px;color:var(--grey);border:1px solid var(--border2);padding:1px 5px;margin-right:3px;">’ + t.toUpperCase() + ‘</span>’;
}).join(””);

var dur = s.duration ? s.duration + “min” : “90min”;

var retestStyle = rs === “due”
? “color:var(–pink);animation:tpulse 2s ease-in-out infinite;”
: rs === “soon” ? “color:var(–yellow);” : “color:var(–grey2);”;

var cardClass = “sess-card stream-” + topic.stream + (rs===‘due’?’ retest-due’:rs===‘soon’?’ retest-soon’:’’);

var html = ‘<div class="' + cardClass + '">’ +
‘<div class="sess-head">’ +
‘<div class="sess-topic">’ + topic.name + ‘</div>’ +
‘<span class="sess-stream ' + topic.stream + '">’ + (STREAM_LABELS[topic.stream]||topic.stream.toUpperCase()) + ‘</span>’ +
‘</div>’ +
‘<div class="sess-meta">’ +
new Date(s.date).toLocaleDateString(“en-GB”,{weekday:“short”,day:“2-digit”,month:“short”,year:“numeric”}) +
’ \u00B7 ’ + dur + ’ \u00B7 ’ + typeBadges +
‘</div>’;

if (s.notes) {
html += ‘<div class="sess-notes">’ + s.notes + ‘</div>’;
}
if (s.attachment) {
html += ‘<a class="sess-attachment" href="' + s.attachment.url + '" target="_blank" rel="noopener">’ +
‘<span class="sess-attachment-icon">\uD83D\uDCCE</span>’ +
‘<span class="sess-attachment-name">’ + s.attachment.name + ‘</span>’ +
‘<span style="font-size:8px;color:var(--grey2)">’ + (s.attachment.size/1024).toFixed(0) + ‘KB \u2197</span>’ +
‘</a>’;
}

html += ‘<div class="sess-footer">’ +
‘<div>’ +
‘<div class="conf-stars">’ + stars + ‘</div>’ +
‘<div class="sess-retest" style="' + retestStyle + '">’ + rl + ‘</div>’ +
‘</div>’ +
‘<div class="sess-actions">’;
if (!s.retestDone && s.retestDate) {
html += ‘<button class="sess-btn" onclick="markRetested(\'' + s.id + '\')">\u2713 RETESTED</button>’;
}
html += ‘<button class="sess-btn danger" onclick="deleteSession(\'' + s.id + '\')">\u2715</button>’ +
‘</div></div></div>’;

return html;
}

function markRetested(id) {
var sess = sessions[id];
if (!sess) return;
var newConf = parseInt(prompt(“Rate your recall (1\u20135):”) || “0”);
if (!newConf || newConf < 1 || newConf > 5) return;
var nextDays = nextRetestDays(newConf, sess.interval || 7);
var nd = new Date(); nd.setDate(nd.getDate() + nextDays);
var nextDate = nd.toISOString().split(“T”)[0];

if (window._stx_fb) {
var fb = window._stx_fb;
fb.update(fb.ref(fb.db, “studySessions/” + id), {
retestDone: true, retestedAt: Date.now(),
retestConfidence: newConf,
});
fb.push(fb.sessRef, {
topicId: sess.topicId,
date: new Date().toISOString().split(“T”)[0],
sessionTypes: [“quiz”],
notes: “Retest of session from “ + sess.date,
confidence: newConf,
interval: nextDays,
retestDate: nextDate,
retestDone: false,
duration: 20,
createdAt: Date.now(),
isRetest: true,
});
}
}

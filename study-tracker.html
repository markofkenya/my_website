<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>STX // Study Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="STX" />
  <meta name="theme-color" content="#06080f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const DEFAULT_TOPICS_FALLBACK = {
      renal: [
        "AKI — aetiology & management","CKD — staging & progression","Glomerulonephritis — overview",
        "IgA nephropathy","Lupus nephritis","Minimal change disease","FSGS","Membranous nephropathy",
        "ANCA vasculitis","Anti-GBM disease","Diabetic nephropathy","Hypertensive nephropathy",
        "Renovascular disease","Renal tubular acidosis","Hyperkalaemia management",
        "Hyponatraemia","Acid-base disorders","Dialysis — HD principles","Dialysis — PD principles",
        "Renal transplantation — basics","Immunosuppression in transplant","Rejection types",
        "Nephrotic syndrome","Nephritic syndrome","Polycystic kidney disease",
        "Renal calculi","Obstruction & hydronephrosis","Renal anaemia","CKD-MBD",
        "Contrast nephropathy","Hepatorenal syndrome",
        "Renal physiology — GFR & tubular function","Renal haemodynamics",
        "Water & sodium homeostasis","Potassium homeostasis","Calcium & phosphate",
        "Acid-base — Henderson-Hasselbalch","Tubular transport mechanisms",
        "Diuretics — mechanism & use","RAAS — physiology & pharmacology",
        "Immunology of glomerulonephritis","Complement system in renal disease",
        "Transplant immunology","Pathology of diabetic nephropathy",
        "Pathology of FSGS","Pathology of membranous nephropathy",
        "Renal biopsy interpretation","Urinalysis & urine microscopy",
        "Biomarkers in AKI","Drug dosing in renal impairment",
      ],
      gim: [
        "Sepsis & septic shock","ACS — STEMI & NSTEMI","Heart failure — acute & chronic",
        "AF management","Pneumonia — CAP & HAP","COPD exacerbation","Asthma — acute",
        "PE & DVT","Stroke — ischaemic & haemorrhagic","Meningitis & encephalitis",
        "Diabetic emergencies — DKA & HHS","Hypo & hyperglycaemia","Thyroid emergencies",
        "Adrenal insufficiency","GI bleed — upper & lower","Acute liver failure",
        "Hepatic encephalopathy","Pancreatitis","Electrolyte disturbances",
        "Approach to shock","Overdose & poisoning","Antimicrobial stewardship",
      ],
    };

    const firebaseConfig = {
      apiKey:            "AIzaSyAhv0PJy95vqXdzOQkCqbg1FuXfiqHTnI0",
      authDomain:        "task-monitor-bd7ee.firebaseapp.com",
      databaseURL:       "https://task-monitor-bd7ee-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "task-monitor-bd7ee",
      storageBucket:     "task-monitor-bd7ee.firebasestorage.app",
      messagingSenderId: "544624731364",
      appId:             "1:544624731364:web:419d52fa061c5c7b4f38f1",
    };

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const storage  = getStorage(app);
    const sessRef  = ref(db, "studySessions");
    const topicRef = ref(db, "studyTopics");
    const planRef  = ref(db, "studyPlan");

    window._stx_fb = { db, ref, push, update, remove, sessRef, topicRef, planRef };

    window.uploadSessionFile = function(file, sessionId, onProgress, onDone, onError) {
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const path     = `studyNotes/${sessionId}/${Date.now()}_${safeName}`;
      const fileRef  = sRef(storage, path);
      const task     = uploadBytesResumable(fileRef, file);

      task.on("state_changed",
        snap => onProgress(Math.round((snap.bytesTransferred / snap.totalBytes) * 100)),
        onError,
        async () => {
          const url = await getDownloadURL(task.snapshot.ref);
          onDone({ url, name: file.name, path, size: file.size });
        }
      );
    };

    window.deleteSessionFile = function(filePath) {
      const fileRef = sRef(storage, filePath);
      return deleteObject(fileRef).catch(e => console.warn("Storage delete:", e));
    };

    onValue(sessRef, snap => {
      window._stx_sessions = snap.val() || {};
      window._stx_loaded = window._stx_loaded || {};
      window._stx_loaded.sessions = true;
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });

    onValue(topicRef, snap => {
      const topicData = snap.val() || {};
      window._stx_topics = topicData;
      window._stx_loaded = window._stx_loaded || {};
      window._stx_loaded.topics = true;

      if (!window._stx_seedChecked) {
        window._stx_seedChecked = true;
        if (Object.keys(topicData).length === 0) {
          Object.entries(DEFAULT_TOPICS_FALLBACK).forEach(([stream, list]) => {
            list.forEach(name => push(topicRef, { name, stream, createdAt: Date.now() }));
          });
        }
      }

      window.dispatchEvent(new CustomEvent("stx-sync"));
    });

    onValue(planRef, snap => {
      window._stx_plan = snap.val() || {};
      window._stx_loaded = window._stx_loaded || {};
      window._stx_loaded.plan = true;
      window.dispatchEvent(new CustomEvent("stx-sync"));
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d0d0d; --bg2:#141414; --bg3:#1a1a1a; --bg4:#222222;
      --border:#2a2a2a; --border2:#333333;
      --white:#e8e8e8; --grey:#888888; --grey2:#555555;
      --green:#98c379; --yellow:#e5c07b; --cyan:#56b6c2;
      --magenta:#ff79c6; --pink:#e06c75; --blue:#61afef;
      --orange:#d19a66; --purple:#c678dd;
      --renal:#d19a66; --gim:#61afef;
      --amber:#e5c07b;
      --font:'Fira Code','Cascadia Code','Courier New',monospace;
    }
    html,body { background:var(--bg); color:var(--white); font-family:var(--font); font-size:13px; min-height:100vh; line-height:1.5; }
    ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:var(--border2);}
    #header{background:var(--bg2);border-bottom:1px solid var(--border2);}
    .header-top{display:flex;align-items:stretch;flex-wrap:wrap;border-bottom:1px solid var(--border);}
    .header-logo{padding:10px 18px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .logo-line1{font-size:14px;font-weight:600;line-height:1;color:var(--green);}
    .logo-line1::before{content:"~/";color:var(--grey);}
    .logo-line1 span{color:var(--grey);}
    .logo-line2{font-size:9px;color:var(--grey);margin-top:3px;letter-spacing:0.12em;}
    .logo-sub{font-size:9px;color:var(--grey2);margin-top:2px;}
    .week-wrap{padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .week-label{font-size:9px;color:var(--grey);letter-spacing:0.1em;margin-bottom:5px;}
    .week-pips{display:flex;gap:5px;}
    .pip{width:24px;height:24px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--grey2);}
    .pip.done{background:rgba(152,195,121,0.12);border-color:var(--green);color:var(--green);}
    .week-sub{font-size:8px;color:var(--grey2);margin-top:4px;}
    .retest-wrap,.stat-cell{padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
    .retest-val,.stat-val{font-size:22px;font-weight:500;line-height:1;color:var(--yellow);}
    .retest-val.alert{color:var(--pink);}
    .retest-val.warn{color:var(--orange);}
    .retest-key,.stat-key{font-size:8px;color:var(--grey);letter-spacing:0.12em;margin-top:3px;}
    .header-clock{padding:10px 16px;margin-left:auto;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;align-items:flex-end;}
    .clock-time{font-size:16px;font-weight:500;color:var(--cyan);}
    .clock-date{font-size:9px;color:var(--grey);margin-top:2px;}
    .sync-dot{font-size:8px;color:var(--grey2);margin-top:3px;}
    #tabbar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0;display:flex;overflow-x:auto;}
    .tab{padding:8px 16px;background:transparent;border:none;border-right:1px solid var(--border);border-bottom:2px solid transparent;color:var(--grey);font-family:var(--font);font-size:11px;cursor:pointer;transition:all 0.1s;white-space:nowrap;}
    .tab:hover{color:var(--white);background:var(--bg3);}
    .tab.active{color:var(--yellow);border-bottom-color:var(--yellow);background:var(--bg3);}
    .tab::before{content:"[ ";color:var(--grey2);}
    .tab::after{content:" ]";color:var(--grey2);}
    #timer-panel{background:var(--bg2);border-bottom:1px solid var(--border2);padding:20px 24px;display:none;}
    #timer-panel.show{display:block;}
    .timer-display{text-align:center;margin-bottom:12px;}
    .timer-phase{font-size:9px;letter-spacing:0.2em;color:var(--grey);margin-bottom:6px;}
    .timer-phase::before{content:"# ";color:var(--grey2);}
    .timer-clock{font-size:72px;font-weight:300;color:var(--green);letter-spacing:0.04em;line-height:1;font-variant-numeric:tabular-nums;}
    .timer-clock.rest{color:var(--cyan);}
    .timer-clock.alert-pulse{animation:tpulse 1s ease-in-out infinite;}
    @keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .timer-bar-wrap{height:2px;background:var(--border2);margin-bottom:14px;overflow:hidden;}
    .timer-bar{height:100%;background:var(--green);transition:width 1s linear;}
    .timer-bar.rest{background:var(--cyan);}
    .timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .timer-btn{padding:5px 16px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:0.08em;cursor:pointer;transition:all 0.1s;}
    .timer-btn:hover{border-color:var(--green);color:var(--green);}
    .timer-btn.secondary:hover{border-color:var(--cyan);color:var(--cyan);}
    .timer-btn.danger{color:var(--pink);}
    .timer-btn.danger:hover{border-color:var(--pink);}
    #main{padding:14px 18px 100px;}
    .sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding:4px 0;border-bottom:1px solid var(--border);}
    .sec-title{font-size:11px;font-weight:500;color:var(--green);}
    .sec-title::before{content:"";}
    .sec-rule{flex:1;}
    .sec-note{font-size:9px;color:var(--grey2);}
    .log-form{background:var(--bg2);border:1px solid var(--border2);border-top:2px solid var(--yellow);padding:12px 14px;margin-bottom:18px;}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:10px;}
    .form-field{display:flex;flex-direction:column;gap:3px;}
    .form-field.wide{grid-column:span 2;}
    .form-label{font-size:9px;color:var(--grey);letter-spacing:0.12em;}
    .form-label::before{content:"── ";color:var(--grey2);}
    .form-inp{background:var(--bg);border:1px solid var(--border2);color:var(--white);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none;transition:border-color 0.1s;caret-color:var(--green);}
    .form-inp:focus{border-color:var(--yellow);}
    .form-inp option{background:var(--bg2);color:var(--white);}
    textarea.form-inp{resize:vertical;min-height:52px;color:var(--yellow);}
    .form-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .star-row{display:flex;gap:3px;}
    .star{width:22px;height:22px;border:1px solid var(--border2);background:transparent;color:var(--grey2);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
    .star.lit{color:var(--yellow);border-color:var(--yellow);background:rgba(229,192,123,0.08);}
    .session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:6px;margin-bottom:18px;}
    .sess-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border2);padding:10px 12px;transition:background 0.1s;}
    .sess-card:hover{background:var(--bg3);}
    .sess-card.stream-renal{border-left-color:var(--orange);}
    .sess-card.stream-gim{border-left-color:var(--blue);}
    .sess-card.retest-due{border-left-color:var(--pink);background:rgba(224,108,117,0.03);}
    .sess-card.retest-soon{border-left-color:var(--yellow);}
    .sess-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:8px;}
    .sess-topic{font-size:12px;font-weight:500;color:var(--white);}
    .sess-stream{font-size:8px;font-weight:500;padding:1px 5px;letter-spacing:0.06em;white-space:nowrap;}
    .sess-stream.renal{color:var(--orange);border:1px solid rgba(209,154,102,0.3);}
    .sess-stream.gim{color:var(--blue);border:1px solid rgba(97,175,239,0.3);}
    .sess-meta{font-size:9px;color:var(--grey2);margin-bottom:5px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
    .sess-notes{font-size:10px;color:var(--grey);padding:3px 8px;border-left:2px solid var(--border2);margin-bottom:6px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .sess-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;}
    .sess-retest{font-size:9px;font-weight:500;}
    .sess-retest.due{color:var(--pink);}
    .sess-retest.soon{color:var(--yellow);}
    .sess-retest.ok{color:var(--grey2);}
    .sess-retest.done{color:var(--green);}
    .sess-actions{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
    .sess-btn{background:none;border:1px solid var(--border2);color:var(--grey2);font-family:var(--font);font-size:9px;padding:2px 7px;cursor:pointer;transition:all 0.1s;}
    .sess-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    .sess-btn.danger:hover{border-color:var(--pink);color:var(--pink);}
    .conf-stars{display:flex;gap:2px;margin-bottom:2px;}
    .conf-star.lit{color:var(--yellow);}
    .conf-star.dim{color:var(--grey2);}
    .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:3px;margin-bottom:18px;}
    .topic-card{background:transparent;border:none;border-bottom:1px solid var(--border);padding:5px 8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
    .topic-card:hover{background:var(--bg2);}
    .topic-name{font-size:11px;color:var(--white);}
    .topic-name::before{content:"";}
    .topic-stream{font-size:8px;}
    .topic-stream.renal{color:var(--orange);}
    .topic-stream.gim{color:var(--blue);}
    .topic-del{background:none;border:none;color:var(--grey2);font-size:10px;cursor:pointer;padding:2px 4px;}
    .topic-del:hover{color:var(--pink);}
    .add-topic-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
    .btn-primary{padding:5px 16px;background:transparent;border:1px solid var(--green);color:var(--green);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:0.08em;cursor:pointer;transition:all 0.1s;}
    .btn-primary:hover{background:rgba(152,195,121,0.1);}
    .btn-primary:disabled{border-color:var(--grey2);color:var(--grey2);cursor:not-allowed;opacity:0.5;}
    .btn-secondary{padding:5px 12px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:10px;letter-spacing:0.06em;cursor:pointer;}
    .btn-secondary:hover{border-color:var(--grey);color:var(--white);}
    .upload-area{border:1px dashed var(--border2);padding:8px 12px;margin-top:5px;cursor:pointer;transition:all 0.1s;color:var(--grey2);font-size:10px;}
    .upload-area:hover{border-color:var(--cyan);color:var(--cyan);}
    .upload-progress{height:2px;background:var(--border2);margin-top:5px;overflow:hidden;display:none;}
    .upload-progress-bar{height:100%;background:var(--green);transition:width 0.2s;}
    .attached-file{display:flex;align-items:center;gap:8px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);margin-top:4px;font-size:10px;}
    .attached-file-name{color:var(--yellow);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .attached-file-size{color:var(--grey2);font-size:8px;}
    .attached-file-del{background:none;border:none;color:var(--grey2);cursor:pointer;}
    .attached-file-del:hover{color:var(--pink);}
    .sess-attachment{display:flex;align-items:center;gap:6px;margin-top:4px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border);text-decoration:none;border-left:2px solid var(--cyan);}
    .sess-attachment-name{font-size:10px;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sess-attachment-icon{color:var(--grey2);font-size:9px;}
    #statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);padding:5px 18px;display:flex;justify-content:space-between;align-items:center;z-index:100;font-size:9px;gap:12px;}
    .status-left{display:flex;gap:18px;color:var(--grey2);flex-wrap:wrap;}
    .status-item strong{color:var(--yellow);}
    .btn-timer{padding:3px 12px;background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:var(--font);font-size:9px;cursor:pointer;letter-spacing:0.06em;}
    .btn-timer:hover{border-color:var(--green);color:var(--green);}
    .empty-msg{padding:30px 0;color:var(--grey2);font-size:10px;letter-spacing:0.08em;}
    .empty-msg::before{content:"> ";}
    .topic-search-wrap{position:relative;}
    .topic-search-row{position:relative;display:flex;align-items:stretch;}
    .topic-search-inp{background:var(--bg);border:1px solid var(--border2);color:var(--white);font-family:var(--font);font-size:12px;padding:5px 36px 5px 8px;width:100%;outline:none;caret-color:var(--green);transition:border-color 0.1s;}
    .topic-search-inp:focus{border-color:var(--yellow);}
    .topic-drop-btn{position:absolute;right:0;top:0;bottom:0;width:32px;border:none;border-left:1px solid var(--border2);background:transparent;color:var(--grey);font-family:var(--font);font-size:11px;cursor:pointer;}
    .topic-drop-btn:hover{color:var(--yellow);background:var(--bg3);}
    .topic-dropdown{position:absolute;top:100%;left:0;right:0;z-index:500;background:var(--bg2);border:1px solid var(--yellow);border-top:none;max-height:180px;overflow-y:auto;display:none;}
    .topic-dropdown.open{display:block;}
    .topic-opt{padding:7px 10px;font-size:11px;color:var(--white);cursor:pointer;border-bottom:1px solid var(--border);}
    .topic-opt:hover,.topic-opt.active{background:var(--bg3);color:var(--yellow);}
    .topic-opt-stream{font-size:8px;color:var(--grey2);margin-left:6px;}
    .topic-opt.empty{color:var(--grey2);cursor:default;font-style:italic;}
    @media(max-width:640px){
      .session-grid,.topic-grid{grid-template-columns:1fr;}
      .header-clock{display:none;}
      .form-field.wide{grid-column:span 1;}
      #main{padding:10px 12px 100px;}
      .timer-clock{font-size:56px;}
      #statusbar{padding:5px 12px;}
    }
  </style>
</head>
<body>

<div id="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-line1">STX<span>//</span>01</div>
      <div class="logo-line2">STUDY TRACKER</div>
      <div class="logo-sub">RENAL · GIM</div>
    </div>
    <div class="week-wrap">
      <div class="week-label">THIS WEEK</div>
      <div class="week-pips" id="week-pips">
        <div class="pip" id="pip-1">1</div>
        <div class="pip" id="pip-2">2</div>
      </div>
      <div class="week-sub" id="week-sub">0 / 2 sessions</div>
    </div>
    <div class="retest-wrap">
      <div class="retest-val" id="retest-due-count">0</div>
      <div class="retest-key">RETESTS DUE</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="total-sessions">0</div>
      <div class="stat-key">TOTAL SESSIONS</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="streak-val">0</div>
      <div class="stat-key">WEEK STREAK</div>
    </div>
    <div class="header-clock">
      <div class="clock-time" id="clock">00:00</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="sync-dot" id="sync-dot">● CONNECTING</div>
    </div>
  </div>
</div>

<div id="timer-panel">
  <div class="timer-display">
    <div class="timer-phase" id="timer-phase">STUDY SESSION</div>
    <div class="timer-clock" id="timer-clock">90:00</div>
  </div>
  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timer-bar" style="width:100%"></div>
  </div>
  <div class="timer-btns">
    <button class="timer-btn" id="timer-start-btn" onclick="timerStartPause()">▶ START</button>
    <button class="timer-btn secondary" onclick="timerReset()">↺ RESET</button>
    <button class="timer-btn secondary" id="timer-switch-btn" onclick="switchPhase()">⇄ SWITCH TO REST</button>
    <button class="timer-btn danger" onclick="toggleTimer()">✕ CLOSE</button>
  </div>
</div>

function nextRetestDays(conf, prevInterval) {
  if (conf <= 2) return 3;

  return 14;
}


function retestDaysFromConf(conf) {
  if (conf <= 2) return 3;
  if (conf === 3) return 4;
  if (conf === 4) return 5;
  return 7;
}


function weakestTopics(n = 5) {
  const map = {};
  sessionList().forEach(s => {
    if (!s.topicId || !s.confidence) return;
    if (!map[s.topicId]) map[s.topicId] = [];
    map[s.topicId].push(s.confidence);
  });
  return Object.entries(map)
    .map(([id, confs]) => ({
      id,
      name: (topics[id] || {}).name || "Unknown",
      stream: (topics[id] || {}).stream || "renal",
      avg: confs.reduce((a,b) => a+b, 0) / confs.length,
      count: confs.length,
    }))
    .sort((a,b) => a.avg - b.avg)
    .slice(0, n);
}

let sessions       = {};

function timerStartPause() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    localStorage.setItem("stx_timer_running", "false");
    timerElapsedBeforePause += Math.floor((Date.now() - timerStartTime) / 1000);

  const elapsed = timerElapsedBeforePause + Math.floor((Date.now() - timerStartTime) / 1000);

  if (!timerCompleted && elapsed >= 60 * 60) {
    timerCompleted = true;
    localStorage.setItem("stx_timer_completed", "true");

    if (currentTab === "today") renderToday();

function normalizeTopicName(name) {
  return String(name || "")
    .normalize('NFKC')
    .toLowerCase()
    .replace(/[‐‑‒–—―]/g, "-")
    .replace(/[‘’`]/g, "'")
    .replace(/[“”]/g, '"')
    .replace(/\s+/g, " ")
    .replace(/\s*([-/:,;])\s*/g, "$1")
    .trim();
}
function topicKey(topic) {
  return `${String(topic.stream || "renal").trim().toLowerCase()}::${normalizeTopicName(topic.name)}`;
}
function topicList() {
  const seen = new Set();
  return Object.entries(topics)
    .map(([id,t]) => ({id,...t}))
    .filter(t => {
      const key = topicKey(t);
      if (!normalizeTopicName(t.name) || seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .sort((a,b) => a.name.localeCompare(b.name));
}
async function dedupeTopicsInFirebase() {
  if (window._stx_deduping || !window._stx_fb) return;
  const loaded = window._stx_loaded || {};
  if (!loaded.sessions || !loaded.topics || !loaded.plan) return;

  const rawTopics = window._stx_topics || {};
  const rawSessions = window._stx_sessions || {};
  const rawPlan = window._stx_plan || {};
  const topicEntries = Object.entries(rawTopics);
  if (!topicEntries.length) return;

  const keeperByKey = {};
  const duplicateMap = {};
  topicEntries
    .sort((a,b) => ((a[1]?.createdAt || 0) - (b[1]?.createdAt || 0)) || a[0].localeCompare(b[0]))
    .forEach(([id, topic]) => {
      const key = topicKey(topic || {});
      if (!normalizeTopicName(topic?.name)) return;
      if (!keeperByKey[key]) keeperByKey[key] = id;
      else duplicateMap[id] = keeperByKey[key];
    });

  const duplicateIds = Object.keys(duplicateMap);
  if (!duplicateIds.length) return;

  window._stx_deduping = true;
  const { db, ref, update, remove } = window._stx_fb;
  const updates = {};

  Object.entries(rawSessions).forEach(([id, sess]) => {
    if (sess?.topicId && duplicateMap[sess.topicId]) {
      updates[`studySessions/${id}/topicId`] = duplicateMap[sess.topicId];
    }
  });

  Object.entries(rawPlan).forEach(([id, item]) => {
    if (item?.topicId && duplicateMap[item.topicId]) {
      updates[`studyPlan/${id}/topicId`] = duplicateMap[item.topicId];
    }
  });

  try {
    if (Object.keys(updates).length) await update(ref(db), updates);
    await Promise.all(duplicateIds.map(dupId => remove(ref(db, `studyTopics/${dupId}`))));
    console.log(`Removed ${duplicateIds.length} duplicate topic(s)`);
  } catch (err) {
    console.error("Topic dedupe failed:", err);
  } finally {
    window._stx_deduping = false;
  }
}
function sessionList() {
  return Object.entries(sessions)
    .map(([id,s]) => ({id,...s}))
    .sort((a,b) => (b.date || "").localeCompare(a.date || ""));
}
function retestStatus(sess) {
  if (sess.retestDone) return "done";
  if (!sess.retestDate) return "ok";
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(sess.retestDate);
  const diff  = Math.round((due - today) / 86400000);
  if (diff < 0)  return "due";
  if (diff <= 3) return "soon";
  return "ok";
}
function retestLabel(sess) {
  if (sess.retestDone) return "✓ RETESTED";
  if (!sess.retestDate) return "no retest set";
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(sess.retestDate);
  const diff  = Math.round((due - today) / 86400000);
  if (diff < 0)  return `!! OVERDUE ${Math.abs(diff)}d`;
  if (diff === 0) return "!! DUE TODAY";
  if (diff <= 3) return `⚠ due in ${diff}d`;
  return `retest ${due.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}`;
}
function weekSessions() {
  const now    = new Date();
  const day    = now.getDay() || 7;
  const monday = new Date(now); monday.setDate(now.getDate() - day + 1); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);
    return sessionList().filter(s => {
    if (!s.date) return false;
    if (s.isRetest) return false;
    const d = new Date(s.date);
    return d >= monday && d <= sunday;
  });

}
function totalStudyHours() {
  return sessionList().reduce((acc, s) => acc + (s.duration || 90), 0) / 60;
}
function calcStreak() {
  let streak = 0;
  const now = new Date();
  for (let w = 0; w < 52; w++) {
    const refDate = new Date(now); refDate.setDate(now.getDate() - w * 7);
    const day = refDate.getDay() || 7;
    const mon = new Date(refDate); mon.setDate(refDate.getDate() - day + 1); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
    const count = sessionList().filter(s => {
      if (!s.date) return false;
      const d = new Date(s.date);
      return d >= mon && d <= sun;
    }).length;
    if (count >= 2) streak++;
    else if (w > 0) break;
  }
  return streak;
}

  const hidden = wrap?.querySelector('input[type="hidden"]');
  if (!drop) return;
  if (drop.classList.contains("open")) {
    drop.classList.remove("open");
  } else {
    if (input) input.focus();
    filterTopics(inputId, hidden?.id || "");
    drop.classList.add("open");
  }
}
function closeTopicDrop(inputId, delay) {
  setTimeout(() => document.getElementById(`drop-${inputId}`)?.classList.remove("open"), delay || 0);
}
function filterTopics(inputId, hiddenId) {
  const q    = document.getElementById(inputId)?.value.toLowerCase() || "";
  const drop = document.getElementById(`drop-${inputId}`);
  if (!drop) return;
  const hidden = hiddenId ? document.getElementById(hiddenId) : null;
  if (hidden) hidden.value = "";
  let any = false;
  drop.querySelectorAll(".topic-opt:not(.empty)").forEach(opt => {
    const match = opt.dataset.name.toLowerCase().includes(q);
    opt.style.display = match ? "" : "none";
    if (match) any = true;
  });
  const noRes = document.getElementById(`no-results-${inputId}`);
  if (noRes) noRes.style.display = any ? "none" : "";
  drop.classList.add("open");
}
function selectTopic(inputId, hiddenId, topicId, topicName) {
  document.getElementById(inputId).value  = topicName;
  document.getElementById(hiddenId).value = topicId;
  if (hiddenId === "f-topic") {
    localStorage.setItem("stx_session_topic", topicId);
    localStorage.setItem("stx_session_topic_name", topicName);
  }
  closeTopicDrop(inputId, 0);
}

function sessCard(s) {
  const topic = topics[s.topicId] || { name: s.topicId || "Unknown", stream: "renal" };
  const rs    = retestStatus(s);
  const rl    = retestLabel(s);
  const stars = [1,2,3,4,5].map(n =>
    `<span class="conf-star ${n<=s.confidence?'lit':'dim'}">${n<=s.confidence?'★':'☆'}</span>`
  ).join("");

  const typeArr = Array.isArray(s.sessionTypes)
    ? s.sessionTypes
    : s.sessionType ? [s.sessionType] : ["study"];
  const typeBadges = typeArr.map(t =>
    `<span style="font-size:8px;color:var(--grey);border:1px solid var(--border2);padding:1px 5px;margin-right:3px;">${String(t).toUpperCase()}</span>`
  ).join("");

  const dur = s.duration ? `${s.duration}min` : "90min";

  const retestStyle = rs === "due"
    ? `color:var(--pink);animation:tpulse 2s ease-in-out infinite;`
    : rs === "soon" ? `color:var(--yellow);` : `color:var(--grey2);`;

  return `
    <div class="sess-card stream-${topic.stream} ${rs==='due'?'retest-due':rs==='soon'?'retest-soon':''}">
      <div class="sess-head">
        <div class="sess-topic">${topic.name}</div>
        <span class="sess-stream ${topic.stream}">${STREAM_LABELS[topic.stream]||topic.stream.toUpperCase()}</span>
      </div>
      <div class="sess-meta">
        <span>${s.date ? new Date(s.date).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}) : "No date"}</span>
        <span>&nbsp;·&nbsp;</span>
        <span>${dur}</span>
        <span>&nbsp;·&nbsp;</span>
        <span>${typeBadges}</span>
      </div>
      ${s.notes ? `<div class="sess-notes">${escapeHtml(s.notes)}</div>` : ""}
        ${(s.attachments || (s.attachment ? [s.attachment] : [])).map(a => `
        <a class="sess-attachment" href="${a.url}" target="_blank" rel="noopener">
          <span class="sess-attachment-icon">📎</span>
          <span class="sess-attachment-name">${a.name}</span>
          <span style="font-size:8px;color:var(--grey2)">${(a.size/1024).toFixed(0)}KB ↗</span>
        </a>`).join("")}
        
      <div class="sess-footer">
        <div>
          <div class="conf-stars">${stars}</div>
          <div class="sess-retest" style="${retestStyle}">${rl}</div>
        </div>
        <div class="sess-actions">
          ${!s.retestDone && s.retestDate ? `<button class="sess-btn" onclick="markRetested('${s.id}')">✓ RETESTED</button>` : ""}
          <button class="sess-btn danger" onclick="deleteSession('${s.id}')">✕</button>
        </div>
      </div>
    </div>`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function handleFileSelect(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  files.forEach(file => {
    if (!pendingFiles.find(f => f.name === file.name))
      pendingFiles.push({ name: file.name, size: file.size, file });
  });
  renderPendingFiles();
  input.value = "";
}

function renderPendingFiles() {
  const preview = document.getElementById("attached-file-preview");
  if (!preview) return;
  if (!pendingFiles.length) { preview.innerHTML = ""; return; }
  preview.innerHTML = pendingFiles.map((f, i) => `
    <div class="attached-file">
      <span class="attached-file-name">📎 ${f.name}</span>
      <span class="attached-file-size">${(f.size/1024).toFixed(0)}KB</span>
      <button class="attached-file-del" onclick="removePendingFile(${i})">✕</button>
    </div>`).join("");
}

function removePendingFile(idx) {
  pendingFiles.splice(idx, 1);
  renderPendingFiles();
}


function clearPendingFile() {
  pendingFiles = [];
  const preview = document.getElementById("attached-file-preview");
  if (preview) preview.innerHTML = "";
  const input = document.getElementById("f-file");
  if (input) input.value = "";
}


function setConf(n) {
  selConfidence = n;
  const row = document.getElementById("star-row");
  if (row) {
    row.querySelectorAll(".star").forEach((b, i) => {
      b.className = "star" + (i < n ? " lit" : "");
      b.textContent = i < n ? "★" : "☆";
    });
  }
  const hint = document.getElementById("retest-hint");
  if (hint) hint.textContent = `// retest in ~${retestDaysFromConf(n)} days`;
}

function saveSession() {
  const topicId = document.getElementById("f-topic")?.value;
  if (!topicId) { alert("Please select a topic"); return; }

  const date  = document.getElementById("f-date").value;
  const notes = document.getElementById("f-notes").value.trim();
  const sessionTypes = ["study","quiz","teach"].filter(t =>
    document.getElementById(`f-type-${t}`)?.checked
  );
  if (!sessionTypes.length) sessionTypes.push("study");

  const duration = timerStartTime ? Math.max(1, Math.round((Date.now() - timerStartTime) / 60000)) : 90;

  const prevSess = sessionList().find(s => s.topicId === topicId && s.interval);
  const prevInterval = prevSess?.interval || 7;
  const days = nextRetestDays(selConfidence, prevInterval);
  const d = new Date(date); d.setDate(d.getDate() + days);
  const retestDate = d.toISOString().split("T")[0];

  const payload = {
    topicId, date, sessionTypes, notes, duration,
    confidence: selConfidence,
    interval: days,
    retestDate, retestDone: false,
    createdAt: Date.now(),
  };

  if (!window._stx_fb) return;

  const newRef = window._stx_fb.push(window._stx_fb.sessRef, payload);
  const sessionId = newRef.key;

    if (pendingFiles.length && sessionId && window.uploadSessionFile) {
    const filesToUpload = [...pendingFiles];
    const attachments = [];
    let completed = 0;
    filesToUpload.forEach((pf, i) => {
      window.uploadSessionFile(
        pf.file, sessionId,
        pct => {
          const bar = document.getElementById("upload-progress-bar");
          if (bar) bar.style.width = `${Math.round(((i + pct/100) / filesToUpload.length) * 100)}%`;
        },
        fileData => {
          attachments.push(fileData);
          completed++;
          if (completed === filesToUpload.length) {
            const { db, ref, update } = window._stx_fb;
            update(ref(db, `studySessions/${sessionId}`), { attachments });
          }
        },
        err => console.error("Upload failed:", err)
      );
    });
  }


  if (activePlanId && window._stx_fb) {
    const { db, ref, remove } = window._stx_fb;
    remove(ref(db, `studyPlan/${activePlanId}`));
    activePlanId = null;
  }

  timerCompleted = false;
  timerStartTime = null;
  localStorage.removeItem("stx_timer_completed");
  localStorage.removeItem("stx_timer_start");
  localStorage.removeItem("stx_session_topic");
  localStorage.removeItem("stx_session_notes");
  

  pendingFiles   = [];

  clearForm();
}

function clearForm() {
  const d = document.getElementById("f-date");
  const t = document.getElementById("f-topic");
  const ts = document.getElementById("f-topic-search");
  const n = document.getElementById("f-notes");
  const f = document.getElementById("f-file");
  const p = document.getElementById("attached-file-preview");
  if (d) d.value = new Date().toISOString().split("T")[0];
  if (t) t.value = "";
  if (ts) ts.value = "";
  if (n) n.value = "";
  if (f) f.value = "";
  if (p) p.innerHTML = "";
  pendingFiles = [];
  selConfidence = 3;
  setConf(3);
  renderLog();
}

function deleteSession(id) {
  if (!confirm("Delete this session?")) return;

  const sess = sessions[id];
  if (!window._stx_fb) return;

  const { db, ref, remove } = window._stx_fb;

  if (sess?.attachment?.path && window.deleteSessionFile) {
    window.deleteSessionFile(sess.attachment.path).finally(() => {
      remove(ref(db, `studySessions/${id}`));
    });
  } else {
    remove(ref(db, `studySessions/${id}`));
  }
}

function markRetested(id) {
  const sess = sessions[id];
  if (!sess) return;
  const newConf = parseInt(prompt("Rate your recall (1–5):") || "0", 10);
  if (!newConf || newConf < 1 || newConf > 5) return;
  const nextDays = nextRetestDays(newConf, sess.interval || 7);
  const nd = new Date(); nd.setDate(nd.getDate() + nextDays);
  const nextDate = nd.toISOString().split("T")[0];

  if (window._stx_fb) {
    const { db, ref, update } = window._stx_fb;
    update(ref(db, `studySessions/${id}`), {
      retestDone: true, retestedAt: Date.now(),
      retestConfidence: newConf,
    });
    window._stx_fb.push(window._stx_fb.sessRef, {
      topicId: sess.topicId,
      date: new Date().toISOString().split("T")[0],
      sessionTypes: ["quiz"],
      notes: `Retest of session from ${sess.date}`,
      confidence: newConf,
      interval: nextDays,
      retestDate: nextDate,
      retestDone: false,
      duration: 20,
      createdAt: Date.now(),
      isRetest: true,
    });
  }
}

function addTopic() {
  const name   = document.getElementById("new-topic-name")?.value.trim();
  const stream = document.getElementById("new-topic-stream")?.value;
  if (!name) return;
  if (window._stx_fb) window._stx_fb.push(window._stx_fb.topicRef, { name, stream });

function deleteTopic(id) {

    </div>
    <div style="font-size:8px;color:var(--grey2);margin-top:5px;letter-spacing:0.08em;">
      ${MAX - list.length} slot${MAX - list.length !== 1 ? "s" : ""} remaining
    </div>`;

  el.innerHTML = html;
}

function addPlan() {
  const topicId = document.getElementById("plan-topic")?.value;
  if (!topicId) { alert("Please select a topic"); return; }
  const note = document.getElementById("plan-note")?.value.trim();
  if (planList().length >= 5) { alert("Max 5 planned sessions"); return; }
  if (window._stx_fb) {
    window._stx_fb.push(window._stx_fb.planRef, {
      topicId, note, createdAt: Date.now(), activated: false
    });
  }
}

function deletePlan(id) {
  if (!confirm("Remove this planned session?")) return;
  if (window._stx_fb) {
    const { db, ref, remove } = window._stx_fb;
    remove(ref(db, `studyPlan/${id}`));
  }
}

function activatePlan(id, topicId) {
  activePlanId = id;

  if (window._stx_fb) {
    const { db, ref, update } = window._stx_fb;
    update(ref(db, `studyPlan/${id}`), { activated: true });
  }

  setTab("log");
  setTimeout(() => {
    const hidden = document.getElementById("f-topic");
    const search = document.getElementById("f-topic-search");
    if (hidden) hidden.value = topicId;
    if (search) {
      const topic = topics[topicId];
      if (topic) search.value = `[${STREAM_LABELS[topic.stream]}] ${topic.name}`;
    }
    const panel = document.getElementById("timer-panel");
    if (panel && !panel.classList.contains("show")) {
      panel.classList.add("show");
      updateTimerDisplay();
    }
  }, 50);
}
  function activateSuggested(topicId, topicName, stream) {
  setTab("log");
  setTimeout(() => {
    const hidden = document.getElementById("f-topic");
    const search = document.getElementById("f-topic-search");
    if (hidden) hidden.value = topicId;
    if (search) search.value = `[${STREAM_LABELS[stream]}] ${topicName}`;
    localStorage.setItem("stx_session_topic", topicId);
    localStorage.setItem("stx_session_topic_name", `[${STREAM_LABELS[stream]}] ${topicName}`);
    const panel = document.getElementById("timer-panel");
    if (panel && !panel.classList.contains("show")) {
      panel.classList.add("show");
      updateTimerDisplay();
    }
  }, 50);
}

function filterSessions(val) {
  localStorage.setItem("stx_sess_search", val);
  renderSessions();
}


renderAll();
setTab("today");
if (timerStartTime && localStorage.getItem("stx_timer_running") === "true") {
  const panel = document.getElementById("timer-panel");
  panel.classList.add("show");
  updateTimerDisplay();
  timerStartPause();
} else if (timerStartTime) {
  // Was paused — just show the timer panel at correct time
  const panel = document.getElementById("timer-panel");
  panel.classList.add("show");
  updateTimerDisplay();
}


</script>
</body>
</html>

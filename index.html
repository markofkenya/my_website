<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acute Take League</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

:root{
--pink:#ff3e6c;
--orange:#ff6b3e;
--gold:#ffd700;
--cyan:#00d4ff;
--green:#7cff6b;
--bg1:#0a0a1a;
--bg2:#111128;
--bg3:#1a0a2e;
}

body{
margin:0;
font-family:'JetBrains Mono',monospace;
background:linear-gradient(145deg,var(--bg1),var(--bg2),var(--bg3));
color:#e0e0f0;
}

.container{
max-width:700px;
margin:auto;
padding:16px;
}

.nhs-tag{
text-align:center;
letter-spacing:6px;
font-size:10px;
color:var(--pink);
}

.date{
text-align:center;
font-size:11px;
color:#666;
margin-top:4px;
}

.title{
text-align:center;
font-size:26px;
font-weight:800;
margin:8px 0 4px;
background:linear-gradient(90deg,var(--pink),var(--orange),var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:11px;
color:#666;
margin-bottom:16px;
}

.tabs{
display:flex;
gap:8px;
justify-content:center;
margin-bottom:16px;
}

.tab{
padding:8px 18px;
border-radius:6px;
background:#ffffff08;
border:1px solid #ffffff14;
cursor:pointer;
font-size:12px;
color:#aaa;
}

.tab.active{
background:linear-gradient(135deg,var(--pink),var(--orange));
color:white;
border:none;
}

#view-table{
display:flex;
flex-direction:column;
gap:6px;
}

.player-card{
background:#ffffff05;
border:1px solid #ffffff14;
border-radius:8px;
padding:12px;
cursor:pointer;
transition:transform .35s ease,background .35s ease,border .35s ease;
}

.player-card.leader{
border:1px solid var(--gold);
background:linear-gradient(135deg,#ffffff08,#ffd70015);
}

.player-row{
display:flex;
align-items:center;
gap:10px;
}

.rank{
width:50px;
font-weight:800;
}

.player-name{
font-size:16px;
font-weight:700;
}

.player-role{
font-size:11px;
text-transform:uppercase;
}

.player-pts{
margin-left:auto;
font-size:24px;
font-weight:900;
transition:.3s;
}

.flash{
animation:flash .35s;
}

@keyframes flash{
0%{transform:scale(1.4);color:var(--gold)}
100%{transform:scale(1)}
}

.score-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-top:12px;
}

.score-btn{
background:#ffffff08;
border:1px solid #ffffff12;
border-radius:6px;
padding:8px;
font-size:18px;
cursor:pointer;
}

.score-label{
font-size:10px;
color:#888;
}

.undo-btn{
font-size:10px;
background:none;
border:none;
color:#777;
cursor:pointer;
}

.add-panel{
text-align:center;
}

.name-input{
padding:10px;
width:100%;
border-radius:6px;
border:none;
margin-top:10px;
}

.role-btn{
margin:6px;
padding:6px 12px;
border-radius:6px;
border:1px solid #ffffff22;
background:#ffffff08;
cursor:pointer;
}

.role-btn.active{
background:var(--cyan);
color:black;
}

.add-btn{
margin-top:14px;
padding:10px 24px;
border-radius:6px;
border:none;
background:linear-gradient(135deg,var(--pink),var(--orange));
color:white;
cursor:pointer;
}

.hidden{display:none}

</style>

</head>

<body>

<div class="container">

<div class="nhs-tag">⚕ NHS ACUTE MEDICINE ⚕</div>
<div class="date" id="date"></div>

<div class="title">ACUTE TAKE LEAGUE</div>
<div class="subtitle">admissions & saves = 2 pts · others = 1 pt</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('table')">🏆 TABLE</div>
<div class="tab" onclick="switchTab('stats')">📊 STATS</div>
<div class="tab" onclick="switchTab('add')">+ ADD</div>
</div>

<div id="view-table"></div>
<div id="view-stats" class="hidden"></div>
<div id="view-add" class="hidden"></div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCJEXL8F28S3_UCXil8cVU-4MXOEg4cpwI",
authDomain:"acute-take-league.firebaseapp.com",
databaseURL:"https://acute-take-league-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"acute-take-league",
storageBucket:"acute-take-league.firebasestorage.app",
messagingSenderId:"1064553360872",
appId:"1:1064553360872:web:64a44af9f834b6f2bb885d"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const ROLES=["Med Reg","SHO","FY2","FY1"];

const ROLE_COLORS={
"Med Reg":"#ff3e6c",
"SHO":"#00d4ff",
"FY2":"#ffd700",
"FY1":"#7cff6b"
};

const CATEGORIES=[
{key:"admissions",emoji:"📋",label:"Admissions",points:2},
{key:"cannulas",emoji:"💉",label:"Cannulas",points:1},
{key:"abgs",emoji:"🫁",label:"ABGs",points:1},
{key:"tasks",emoji:"✅",label:"Tasks",points:1},
{key:"saves",emoji:"🦸",label:"Saves",points:2},
{key:"quiz",emoji:"🧠",label:"Quiz",points:1},
{key:"rest",emoji:"😴",label:"Rest",points:1}
];

let players=[];
let nextId=1;
let selected=null;
let currentView="table";
let newRole="SHO";

db.ref("players").on("value",snap=>{
let data=snap.val();
if(data){
players=data.players||[];
nextId=data.nextId||1;
}
render();
});

function save(){
db.ref("players").set({players,nextId});
}

function pts(stats){
return CATEGORIES.reduce((t,c)=>t+(stats?.[c.key]||0)*c.points,0);
}

function score(id,key,val){

let p=players.find(x=>x.id===id);

if(!p.stats)p.stats={};

p.stats[key]=(p.stats[key]||0)+val;

if(p.stats[key]<0)p.stats[key]=0;

save();

let el=document.getElementById("pts-"+id);
if(el){
el.classList.remove("flash");
void el.offsetWidth;
el.classList.add("flash");
}

}

function toggle(id){
selected=selected===id?null:id;
render();
}

function switchTab(tab){

currentView=tab;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab")[["table","stats","add"].indexOf(tab)].classList.add("active");

document.getElementById("view-table").classList.toggle("hidden",tab!=="table");
document.getElementById("view-stats").classList.toggle("hidden",tab!=="stats");
document.getElementById("view-add").classList.toggle("hidden",tab!=="add");

render();

}

function render(){

if(currentView==="table"){

let sorted=[...players].sort((a,b)=>pts(b.stats)-pts(a.stats));

let html="";

sorted.forEach((p,i)=>{

let leader=i===0 && pts(p.stats)>0;

let expanded=selected===p.id;

html+=`
<div class="player-card ${leader?'leader':''}" onclick="toggle(${p.id})">

<div class="player-row">

<div class="rank">${leader?'👑':''} ${i+1}</div>

<div>
<div class="player-name">${p.name}</div>
<div class="player-role" style="color:${ROLE_COLORS[p.role]}">${p.role}</div>
</div>

<div id="pts-${p.id}" class="player-pts">${pts(p.stats)}</div>

</div>
`;

if(expanded){

html+=`<div onclick="event.stopPropagation()">`;

html+=`<div class="score-grid">`;

CATEGORIES.forEach(c=>{

let val=p.stats?.[c.key]||0;

html+=`
<div>

<button class="score-btn"
onclick="event.stopPropagation();score(${p.id},'${c.key}',1)">
${c.emoji}
</button>

<div class="score-label">${c.label}</div>

<div>${val}</div>

${val>0?`<button class="undo-btn"
onclick="event.stopPropagation();score(${p.id},'${c.key}',-1)">
undo
</button>`:""}

</div>
`;

});

html+=`</div></div>`;
}

html+=`</div>`;

});

document.getElementById("view-table").innerHTML=html;

}

if(currentView==="stats"){

let totals={}
CATEGORIES.forEach(c=>totals[c.key]=0)

players.forEach(p=>{
CATEGORIES.forEach(c=>{
totals[c.key]+=p.stats?.[c.key]||0
})
})

let html="<h3 style='text-align:center'>TEAM ACTIVITY</h3>"

CATEGORIES.forEach(c=>{
html+=`
<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.06)">
<div>${c.emoji} ${c.label}</div>
<div><b>${totals[c.key]}</b></div>
</div>`
})

html+="<h3 style='text-align:center;margin-top:20px'>CATEGORY LEADERS</h3>"

CATEGORIES.forEach(c=>{

let leader=null
let best=0

players.forEach(p=>{
let val=p.stats?.[c.key]||0
if(val>best){
best=val
leader=p
}
})

if(best>0){
html+=`
<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,0.06)">
<div>👑 ${c.label}</div>
<div>${leader.name} — <b>${best}</b></div>
</div>`
}

})

let mvp=null
let bestPts=0

players.forEach(p=>{
let score=pts(p.stats)
if(score>bestPts){
bestPts=score
mvp=p
}
})

if(mvp){
html+=`
<div style="text-align:center;margin-top:25px">
<div style="font-size:12px;color:#888">🏆 SHIFT MVP</div>
<div style="font-size:22px;font-weight:900;background:linear-gradient(90deg,#ffd700,#ff6b3e);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
${mvp.name}
</div>
<div>${bestPts} pts</div>
</div>`
}

document.getElementById("view-stats").innerHTML=html;

}

if(currentView==="add"){

document.getElementById("view-add").innerHTML=`

<div class="add-panel">

<input id="nameInput" class="name-input" placeholder="Dr Smith">

<div>

${ROLES.map(r=>`
<button class="role-btn ${newRole===r?'active':''}"
onclick="newRole='${r}';render()">${r}</button>
`).join("")}

</div>

<button class="add-btn" onclick="addPlayer()">ADD TO ROSTER</button>

</div>
`;
}

}

function addPlayer(){

let name=document.getElementById("nameInput").value.trim();

if(!name)return;

players.push({
id:nextId++,
name,
role:newRole,
stats:{}
});

save();
switchTab("table");

}

let d=new Date();
document.getElementById("date").innerText=
d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});

render();

</script>

</body>
</html>

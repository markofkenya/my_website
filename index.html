<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Acute Take League</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

:root{
--pink:#ff3e6c;
--orange:#ff6b3e;
--gold:#ffd700;
--cyan:#00d4ff;
--green:#7cff6b;
--bg1:#0a0a1a;
--bg2:#111128;
--bg3:#1a0a2e;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
min-height:100vh;
background:linear-gradient(145deg,var(--bg1)0%,var(--bg2)40%,var(--bg3)100%);
color:#e0e0f0;
font-family:'JetBrains Mono','Courier New',monospace;
overflow-x:hidden;
}

.grid-bg{
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(100,100,255,0.03)1px,transparent 1px),
linear-gradient(90deg,rgba(100,100,255,0.03)1px,transparent 1px);
background-size:40px 40px;
pointer-events:none;
z-index:0;
}

.container{
position:relative;
z-index:1;
max-width:700px;
margin:0 auto;
padding:16px 12px;
}

.nhs-tag{
font-size:10px;
letter-spacing:6px;
text-transform:uppercase;
color:var(--pink);
margin-bottom:4px;
font-weight:700;
text-align:center;
}

.title{
font-size:26px;
font-weight:800;
letter-spacing:2px;
text-align:center;
cursor:pointer;
background:linear-gradient(90deg,var(--pink),var(--orange),var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
text-transform:uppercase;
}

.subtitle{
font-size:11px;
color:#666;
margin-top:4px;
text-align:center;
}

.tabs{
display:flex;
gap:6px;
justify-content:center;
margin:16px 0;
}

.tab{
padding:8px 20px;
border-radius:6px;
font-size:12px;
font-weight:700;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:#888;
border:1px solid rgba(255,255,255,0.1);
}

.tab.active{
background:linear-gradient(135deg,var(--pink),var(--orange));
color:#fff;
border:none;
}

.player-card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
border-radius:8px;
padding:12px 14px;
cursor:pointer;
position:relative;
overflow:hidden;
margin-bottom:6px;
}

.player-card.leader{
background:linear-gradient(135deg,rgba(255,62,108,0.15),rgba(255,215,0,0.1));
border:1px solid rgba(255,62,108,0.4);
}

.player-row{
display:flex;
align-items:center;
gap:12px;
}

.rank{
font-weight:900;
min-width:36px;
text-align:center;
}

.player-info{flex:1;}

.player-name{
font-size:16px;
font-weight:700;
color:#fff;
}

.player-role{
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
}

.player-pts{
font-size:24px;
font-weight:900;
text-align:right;
}

.score-grid{
margin-top:12px;
padding-top:12px;
border-top:1px solid rgba(255,255,255,0.08);
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
}

.score-btn{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:6px;
padding:8px;
cursor:pointer;
color:#fff;
font-size:18px;
}

.undo-btn{
background:none;
border:none;
color:#777;
font-size:10px;
cursor:pointer;
}

.remove-btn{
margin-top:10px;
background:none;
border:none;
color:rgba(255,62,108,0.4);
font-size:11px;
cursor:pointer;
}

.reset-btn{
background:none;
border:1px solid rgba(255,62,108,0.3);
color:rgba(255,62,108,0.6);
padding:6px 16px;
border-radius:6px;
font-size:11px;
cursor:pointer;
margin-top:16px;
}

.hidden{display:none;}

.footer{
text-align:center;
margin-top:24px;
padding-bottom:20px;
font-size:10px;
color:#333;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="grid-bg"></div>

<div class="container">

<div class="nhs-tag">⚕ NHS ACUTE MEDICINE ⚕</div>
<div class="title">ACUTE TAKE LEAGUE</div>
<div class="subtitle">admissions & saves = 3pts · rest = 1pt</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('table')">🏆 TABLE</button>
<button class="tab" onclick="switchTab('stats')">📊 STATS</button>
<button class="tab" onclick="switchTab('add')">+ ADD</button>
</div>

<div id="view-table"></div>
<div id="view-stats" class="hidden"></div>
<div id="view-add" class="hidden"></div>

<div class="footer">ACUTE TAKE LEAGUE · TAP A PLAYER TO SCORE</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCJEXL8F28S3_UCXil8cVU-4MXOEg4cpwI",
authDomain:"acute-take-league.firebaseapp.com",
databaseURL:"https://acute-take-league-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"acute-take-league",
storageBucket:"acute-take-league.firebasestorage.app",
messagingSenderId:"1064553360872",
appId:"1:1064553360872:web:64a44af9f834b6f2bb885d"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const ROLES=["Med Reg","SHO","FY2","FY1"];

const CATEGORIES=[
{key:"admissions",emoji:"📋",points:3},
{key:"cannulas",emoji:"💉",points:1},
{key:"abgs",emoji:"🫁",points:1},
{key:"tasks",emoji:"✅",points:1},
{key:"saves",emoji:"🦸",points:3},
{key:"quiz",emoji:"🧠",points:1},
{key:"rest",emoji:"😴",points:1}
];

const ROLE_COLORS={
"Med Reg":"#ff3e6c",
"SHO":"#00d4ff",
"FY2":"#ffd700",
"FY1":"#7cff6b"
};

let players=[];
let nextId=1;
let selectedPlayer=null;
let currentView="table";
let newRole="SHO";

db.ref("players").on("value",snap=>{
const data=snap.val();
if(data){
players=data.players||[];
nextId=data.nextId||1;
}
render();
});

function save(){
db.ref("players").set({players,nextId});
}

function getPoints(stats){
return CATEGORIES.reduce((t,c)=>t+(stats?.[c.key]||0)*c.points,0);
}

function togglePlayer(id){
selectedPlayer=selectedPlayer===id?null:id;
render();
}

function incrementStat(id,key,val){
const p=players.find(x=>x.id===id);
if(!p.stats)p.stats={};
p.stats[key]=(p.stats[key]||0)+val;
if(p.stats[key]<0)p.stats[key]=0;
save();
}

function removePlayer(id){
players=players.filter(p=>p.id!==id);
save();
}

function addPlayer(){
const name=document.getElementById("nameInput").value.trim();
if(!name)return;

players.push({id:nextId++,name,role:newRole,stats:{}});
save();
switchTab("table");
}

function switchTab(tab){
currentView=tab;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab")[["table","stats","add"].indexOf(tab)].classList.add("active");

document.getElementById("view-table").classList.toggle("hidden",tab!=="table");
document.getElementById("view-stats").classList.toggle("hidden",tab!=="stats");
document.getElementById("view-add").classList.toggle("hidden",tab!=="add");

render();
}

function render(){

if(currentView==="table"){

const el=document.getElementById("view-table");
const sorted=[...players].sort((a,b)=>getPoints(b.stats)-getPoints(a.stats));

let html="";

sorted.forEach((p,i)=>{

const pts=getPoints(p.stats);
const expanded=selectedPlayer===p.id;

html+=`
<div class="player-card" onclick="togglePlayer(${p.id})">

<div class="player-row">
<div class="rank">${i+1}</div>
<div class="player-info">
<div class="player-name">${p.name}</div>
<div class="player-role" style="color:${ROLE_COLORS[p.role]}">${p.role}</div>
</div>
<div class="player-pts">${pts}</div>
</div>
`;

if(expanded){

html+=`<div onclick="event.stopPropagation()">`;
html+=`<div class="score-grid">`;

CATEGORIES.forEach(c=>{
const val=p.stats[c.key]||0;

html+=`
<div>
<button class="score-btn"
onclick="event.stopPropagation();incrementStat(${p.id},'${c.key}',1)">
${c.emoji}
</button>

<div>${val}</div>

${val>0?`<button class="undo-btn"
onclick="event.stopPropagation();incrementStat(${p.id},'${c.key}',-1)">undo</button>`:""}

</div>
`;
});

html+=`</div>`;

html+=`
<button class="remove-btn"
onclick="event.stopPropagation();removePlayer(${p.id})">
remove player
</button>
`;

html+=`</div>`;
}

html+=`</div>`;
});

html+=`<button class="reset-btn" onclick="players.forEach(p=>p.stats={});save()">RESET SCORES</button>`;

el.innerHTML=html;
}

if(currentView==="add"){

document.getElementById("view-add").innerHTML=`
<div class="add-panel">

<div class="section-label">NEW PLAYER</div>

<input id="nameInput" class="name-input" placeholder="Dr Smith">

<div style="margin-top:20px">

${ROLES.map(r=>`
<button class="role-btn ${newRole===r?'active':''}"
onclick="newRole='${r}';render()">${r}</button>
`).join("")}

</div>

<button class="add-btn ready" onclick="addPlayer()">ADD TO ROSTER</button>

</div>
`;
}

if(currentView==="stats"){

let total=players.reduce((s,p)=>s+getPoints(p.stats),0);

document.getElementById("view-stats").innerHTML=`
<div style="text-align:center;font-size:32px;font-weight:900">${total}</div>
<div style="text-align:center;color:#666">TOTAL TEAM POINTS</div>
`;
}

}

render();

</script>

</body>
</html>

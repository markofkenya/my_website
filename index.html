<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acute Take League</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
background:#0a0a1a;
color:#eee;
font-family:'JetBrains Mono',monospace;
max-width:700px;
margin:auto;
padding:20px;
}

.nhs-tag{
text-align:center;
color:#ff3e6c;
letter-spacing:6px;
font-size:11px;
}

.date{
text-align:center;
color:#777;
margin-top:6px;
font-size:12px;
}

.title{
text-align:center;
font-size:28px;
font-weight:800;
margin:10px 0 20px;
background:linear-gradient(90deg,#ff3e6c,#ff6b3e,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* PLAYER CARD */

.player-card{
border:1px solid #222;
border-radius:8px;
padding:12px;
margin-bottom:8px;
cursor:pointer;
transition:all .35s ease;
}

.player-card.leader{
border:1px solid #ffd70055;
background:linear-gradient(135deg,#ffffff05,#ffd70008);
}

.player-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.rank{
width:55px;
font-weight:800;
}

.player-role{
font-size:11px;
opacity:.6;
}

.player-pts{
font-size:24px;
font-weight:900;
transition:all .25s ease;
}

/* POINT FLASH */

.flash{
animation:flashPts .35s ease;
}

@keyframes flashPts{
0%{transform:scale(1.3);color:#ffd700;text-shadow:0 0 12px #ffd700;}
100%{transform:scale(1);}
}

/* SCORE GRID */

.score-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-top:12px;
}

.score-btn{
padding:8px;
border-radius:6px;
border:1px solid #333;
background:#111;
color:white;
cursor:pointer;
}

.score-label{
font-size:10px;
opacity:.7;
}

.undo-btn{
font-size:10px;
background:none;
border:none;
color:#777;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="nhs-tag">⚕ NHS ACUTE MEDICINE ⚕</div>
<div class="date" id="date"></div>

<div class="title">ACUTE TAKE LEAGUE</div>

<div id="table"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCJEXL8F28S3_UCXil8cVU-4MXOEg4cpwI",
authDomain:"acute-take-league.firebaseapp.com",
databaseURL:"https://acute-take-league-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"acute-take-league",
storageBucket:"acute-take-league.firebasestorage.app",
messagingSenderId:"1064553360872",
appId:"1:1064553360872:web:64a44af9f834b6f2bb885d"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* SCORING CATEGORIES */

const CATEGORIES=[
{key:"admissions",emoji:"📋",label:"Admissions",points:3},
{key:"cannulas",emoji:"💉",label:"Cannulas",points:1},
{key:"abgs",emoji:"🫁",label:"ABGs",points:1},
{key:"tasks",emoji:"✅",label:"Tasks",points:1},
{key:"saves",emoji:"🦸",label:"Saves",points:3},
{key:"quiz",emoji:"🧠",label:"Quiz",points:1},
{key:"rest",emoji:"😴",label:"Rest",points:1}
];

let players=[];
let nextId=1;
let selected=null;

/* FIREBASE SYNC */

db.ref("players").on("value",snap=>{
let data=snap.val();

if(data){
players=data.players||[];
nextId=data.nextId||1;
}

render();
});

function save(){
db.ref("players").set({players,nextId});
}

/* POINT CALC */

function points(stats){
return CATEGORIES.reduce((t,c)=>t+(stats?.[c.key]||0)*c.points,0);
}

/* SCORING */

function inc(id,key,val){

let p=players.find(p=>p.id===id);

if(!p.stats)p.stats={};

p.stats[key]=(p.stats[key]||0)+val;

if(p.stats[key]<0)p.stats[key]=0;

save();

/* flash animation */

let el=document.getElementById("pts-"+id);

if(el){
el.classList.remove("flash");
void el.offsetWidth;
el.classList.add("flash");
}

}

/* UI */

function toggle(id){
selected=selected===id?null:id;
render();
}

/* RENDER */

function render(){

let sorted=[...players].sort((a,b)=>points(b.stats)-points(a.stats));

let html="";

sorted.forEach((p,i)=>{

let leader=i===0 && points(p.stats)>0;

let expanded=selected===p.id;

html+=`
<div class="player-card ${leader?'leader':''}" onclick="toggle(${p.id})">

<div class="player-row">

<div class="rank">
${leader?'👑':''} ${i+1}
</div>

<div>
<div>${p.name}</div>
<div class="player-role">${p.role||""}</div>
</div>

<div id="pts-${p.id}" class="player-pts">
${points(p.stats)}
</div>

</div>
`;

if(expanded){

html+=`<div onclick="event.stopPropagation()">`;

html+=`<div class="score-grid">`;

CATEGORIES.forEach(c=>{

let val=p.stats?.[c.key]||0;

html+=`
<div>

<button class="score-btn"
onclick="event.stopPropagation();inc(${p.id},'${c.key}',1)">
${c.emoji}
</button>

<div class="score-label">${c.label}</div>

<div>${val}</div>

${val>0?`<button class="undo-btn"
onclick="event.stopPropagation();inc(${p.id},'${c.key}',-1)">
undo
</button>`:""}

</div>
`;

});

html+=`</div>`;
html+=`</div>`;
}

html+=`</div>`;
});

document.getElementById("table").innerHTML=html;

}

render();

/* DATE */

let d=new Date();

document.getElementById("date").innerText=
d.toLocaleDateString(undefined,{
weekday:"long",
day:"numeric",
month:"long"
});

</script>

</body>
</html>

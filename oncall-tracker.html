<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OCT // On-Call Tracker</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="OCT" />
  <meta name="theme-color" content="#080808" />
  <link rel="manifest" id="pwa-manifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── Same Firebase project as renal tracker ─────────────
     const firebaseConfig = {
        apiKey: "AIzaSyAhv0PJy95vqXdzOQkCqbg1FuXfiqHTnI0",
        authDomain: "task-monitor-bd7ee.firebaseapp.com",
        databaseURL: "https://task-monitor-bd7ee-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "task-monitor-bd7ee",
        storageBucket: "task-monitor-bd7ee.firebasestorage.app",
        messagingSenderId: "544624731364",
        appId: "1:544624731364:web:419d52fa061c5c7b4f38f1"
};

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
   
    // Different path from renalTasks — same project, separate data
    const tasksRef = ref(db, "onCallTasks");
    window._fb = { db, ref, push, onValue, update, remove, set, tasksRef };
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --bg2:     #0d0d0d;
      --bg3:     #121212;
      --bg4:     #181818;

      /* Amber terminal — distinct from renal tracker's green */
      --amber:   #ffb000;
      --amber2:  #cc8c00;
      --amber3:  #996800;
      --amber4:  #664400;
      --amber5:  #332200;

      --red:     #ff3333;
      --orange:  #ff6600;
      --green:   #39ff14;
      --blue:    #00bfff;
      --dim:     #5a4a2a;
      --dimmest: #1a1208;

      --font: 'JetBrains Mono', 'Courier New', monospace;
      --scanline: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
      );

      /* Priority colours */
      --p-emergency: #ff3333;
      --p-urgent:    #ff6600;
      --p-routine:   #ffb000;
    }

    html, body {
      background: var(--bg);
      color: var(--amber);
      font-family: var(--font);
      font-size: 13px;
      min-height: 100vh;
      background-image: var(--scanline);
    }
    body { text-shadow: 0 0 6px rgba(255,176,0,0.2); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--amber4); }

    /* ── Header ──────────────────────────────────────────── */
    #header {
      background: var(--bg2);
      border-bottom: 2px solid var(--amber3);
    }
    .header-top {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--amber5);
    }
    .header-logo {
      padding: 14px 24px;
      border-right: 1px solid var(--amber5);
      display: flex; flex-direction: column; justify-content: center;
    }
    .logo-line1 {
      font-size: 20px; font-weight: 700;
      color: var(--amber); letter-spacing: 0.08em; line-height: 1;
    }
    .logo-line1 span { color: var(--amber3); }
    .logo-line2 { font-size: 8px; color: var(--amber3); letter-spacing: 0.3em; margin-top: 4px; }
    .logo-mode  { font-size: 9px; color: var(--amber2); letter-spacing: 0.15em; margin-top: 3px; }

    .header-stats { display: flex; flex: 1; }
    .stat-cell {
      flex: 1; padding: 10px 16px;
      border-right: 1px solid var(--amber5);
      display: flex; flex-direction: column; justify-content: center;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-val {
      font-size: 26px; font-weight: 700; line-height: 1; color: var(--amber);
    }
    .stat-val.emerg { color: var(--red);    text-shadow: 0 0 10px rgba(255,51,51,0.5); }
    .stat-val.urg   { color: var(--orange); text-shadow: 0 0 8px rgba(255,102,0,0.4); }
    .stat-key { font-size: 8px; color: var(--amber3); letter-spacing: 0.2em; margin-top: 3px; }

    .header-clock {
      padding: 10px 20px; min-width: 170px;
      border-left: 1px solid var(--amber5);
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-end;
    }
    .clock-time { font-size: 20px; font-weight: 700; color: var(--amber2); letter-spacing: 0.06em; }
    .clock-date { font-size: 9px; color: var(--amber3); margin-top: 3px; letter-spacing: 0.08em; }
    .shift-info { font-size: 8px; color: var(--amber4); margin-top: 5px; letter-spacing: 0.12em; }
    .sync-live  { font-size: 8px; color: var(--amber2); margin-top: 3px; letter-spacing: 0.15em; display: none; }
    .sync-dot   { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--amber2); margin-right: 4px; animation: blink 1.4s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Priority strip */
    #priority-strip {
      display: none;
      padding: 5px 24px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; text-shadow: none;
      animation: strobe 1.5s ease-in-out infinite;
    }
    #priority-strip.show { display: block; }
    #priority-strip.emerg { background: var(--red);    color: #fff; }
    #priority-strip.urg   { background: var(--orange); color: #fff; }
    @keyframes strobe { 0%,100%{opacity:1} 50%{opacity:0.7} }

    /* ── Command bar ─────────────────────────────────────── */
    #cmdbar {
      background: var(--bg3); border-bottom: 1px solid var(--amber4);
      padding: 0 24px; display: flex; align-items: stretch;
    }
    .cmd-prompt {
      padding: 9px 10px 9px 0; color: var(--amber3); font-size: 11px;
      border-right: 1px solid var(--amber5); display: flex; align-items: center;
    }
    .cmd-btn {
      padding: 9px 13px; background: transparent; border: none;
      border-right: 1px solid var(--amber5);
      color: var(--amber3); font-family: var(--font);
      font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.1s;
    }
    .cmd-btn:hover  { background: var(--bg4); color: var(--amber); }
    .cmd-btn.active { background: var(--amber5); color: var(--amber); }
    .cmd-select {
      padding: 9px 10px; background: transparent; border: none;
      border-right: 1px solid var(--amber5);
      color: var(--amber3); font-family: var(--font);
      font-size: 10px; letter-spacing: 0.08em; cursor: pointer; outline: none;
    }
    .cmd-select option { background: var(--bg3); color: var(--amber); }
    .cmd-right { margin-left: auto; display: flex; align-items: center; gap: 0; }
    .btn-handover {
      padding: 9px 16px; background: transparent;
      border-left: 1px solid var(--amber5); border-right: 1px solid var(--amber5);
      color: var(--amber3); font-family: var(--font);
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-handover:hover { background: var(--amber5); color: var(--amber); }
    .btn-new {
      padding: 9px 18px; background: var(--amber4); border: none;
      border-left: 1px solid var(--amber3);
      color: var(--amber); font-family: var(--font);
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-new:hover { background: var(--amber3); }

    /* ── Add / Edit drawer ───────────────────────────────── */
    #add-drawer {
      display: none; background: var(--bg2);
      border-bottom: 2px solid var(--amber3);
      animation: termSlide 0.15s ease;
    }
    #add-drawer.open { display: block; }
    @keyframes termSlide { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .drawer-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 24px; border-bottom: 1px solid var(--amber5);
      background: var(--bg3);
    }
    .drawer-prompt { color: var(--amber3); font-size: 10px; letter-spacing: 0.15em; }
    .drawer-prompt strong { color: var(--amber); }
    .btn-esc {
      background: none; border: 1px solid var(--amber4);
      color: var(--amber3); font-family: var(--font);
      font-size: 9px; padding: 3px 8px; cursor: pointer; letter-spacing: 0.1em; transition: all 0.1s;
    }
    .btn-esc:hover { border-color: var(--amber); color: var(--amber); }

    .drawer-body {
      padding: 16px 24px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field.s2 { grid-column: span 2; }
    .field.s4 { grid-column: span 4; }
    .lbl { font-size: 8px; color: var(--amber3); letter-spacing: 0.2em; text-transform: uppercase; }
    .lbl::before { content: "$ "; color: var(--amber4); }
    .inp {
      background: var(--bg); border: 1px solid var(--amber4);
      color: var(--amber); font-family: var(--font);
      font-size: 12px; padding: 7px 10px; outline: none;
      transition: border-color 0.12s; caret-color: var(--amber);
      text-transform: uppercase;
    }
    .inp:focus { border-color: var(--amber); box-shadow: 0 0 8px rgba(255,176,0,0.1); }
    .inp option { background: var(--bg); color: var(--amber); text-transform: none; }
    .inp.no-caps { text-transform: none; }
    textarea.inp { resize: vertical; min-height: 52px; text-transform: none; }

    /* Priority selector buttons */
    .priority-grid { display: flex; gap: 6px; }
    .pri-btn {
      flex: 1; padding: 8px 4px; background: var(--bg);
      border: 1px solid var(--amber5); color: var(--dim);
      font-family: var(--font); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; cursor: pointer; transition: all 0.12s;
      text-align: center;
    }
    .pri-btn.sel-routine   { background: var(--amber5); border-color: var(--amber);  color: var(--amber); }
    .pri-btn.sel-urgent    { background: #2a1500;       border-color: var(--orange); color: var(--orange); }
    .pri-btn.sel-emergency { background: #2a0000;       border-color: var(--red);    color: var(--red); }

    /* Task type buttons */
    .type-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .type-btn {
      padding: 4px 10px; background: var(--bg); border: 1px solid var(--amber5);
      color: var(--dim); font-family: var(--font); font-size: 10px;
      cursor: pointer; transition: all 0.1s;
    }
    .type-btn:hover { border-color: var(--amber3); color: var(--amber2); }
    .type-btn.sel { background: var(--amber4); border-color: var(--amber); color: var(--amber); font-weight: 700; }

    .drawer-foot {
      padding: 10px 24px; border-top: 1px solid var(--amber5);
      display: flex; justify-content: flex-end; gap: 8px; background: var(--bg3);
    }
    .btn-abort {
      padding: 6px 16px; background: transparent;
      border: 1px solid var(--amber4); color: var(--amber3);
      font-family: var(--font); font-size: 9px; letter-spacing: 0.12em;
      cursor: pointer; transition: all 0.1s;
    }
    .btn-abort:hover { border-color: var(--red); color: var(--red); }
    .btn-exec {
      padding: 6px 20px; background: var(--amber4); border: 1px solid var(--amber);
      color: var(--amber); font-family: var(--font);
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-exec:hover { background: var(--amber3); }

    /* ── Task table ──────────────────────────────────────── */
    #task-table { width: 100%; border-collapse: collapse; display: none; }
    #task-table.show { display: table; }

    .tbl-head { background: var(--bg3); border-bottom: 2px solid var(--amber3); }
    .tbl-head th {
      padding: 6px 12px; font-size: 8px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--amber3); text-align: left; white-space: nowrap;
    }

    .tbl-section td {
      padding: 10px 12px 4px; font-size: 9px; font-weight: 700;
      letter-spacing: 0.25em; color: var(--amber3); text-transform: uppercase;
      border-bottom: 1px solid var(--amber5);
    }
    .tbl-section td::before { content: "── "; color: var(--amber5); }
    .tbl-section td::after  { content: " " attr(data-count) " ────────────────────────────────"; color: var(--amber5); }

    .tbl-row {
      border-bottom: 1px solid var(--dimmest);
      transition: background 0.08s; animation: rowIn 0.18s ease;
    }
    @keyframes rowIn { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:translateX(0)} }
    .tbl-row:hover { background: var(--bg3); }
    .tbl-row.done  { opacity: 0.3; }
    .tbl-row td    { padding: 8px 12px; vertical-align: middle; font-size: 12px; }

    /* Checkbox */
    .td-cb { width: 28px; }
    .cb {
      width: 16px; height: 16px; border: 1px solid var(--amber4);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: var(--amber);
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .cb.checked { background: var(--amber4); border-color: var(--amber); box-shadow: 0 0 8px rgba(255,176,0,0.35); }
    .cb:active  { transform: scale(0.82); }

    /* Priority cell */
    .td-pri { width: 100px; }
    .pri-badge {
      font-size: 8px; font-weight: 700; letter-spacing: 0.12em;
      padding: 2px 6px; text-transform: uppercase; display: inline-block;
    }
    .pri-emergency { color: var(--red);    background: rgba(255,51,51,0.12);  border: 1px solid rgba(255,51,51,0.35); }
    .pri-urgent    { color: var(--orange); background: rgba(255,102,0,0.1);   border: 1px solid rgba(255,102,0,0.3); }
    .pri-routine   { color: var(--amber);  background: rgba(255,176,0,0.07);  border: 1px solid rgba(255,176,0,0.2); }

    /* Patient cell */
    .td-patient { width: 80px; white-space: nowrap; }
    .patient-str { color: var(--amber2); font-weight: 700; font-size: 11px; letter-spacing: 0.06em; }

    /* Type cell */
    .td-type { width: 100px; }
    .type-pill {
      font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
      padding: 2px 6px; border-left: 2px solid; text-transform: uppercase;
    }

    /* Task cell */
    .td-task { min-width: 180px; cursor: pointer; }
    .task-str { color: var(--amber); font-size: 12px; font-weight: 500; }
    .task-notes {
      display: none; margin-top: 5px; font-size: 10px; color: var(--dim);
      padding-left: 10px; border-left: 1px solid var(--amber5); line-height: 1.5;
    }
    .tbl-row.expanded .task-notes { display: block; }

    /* Time cell */
    .td-time { width: 60px; text-align: right; white-space: nowrap; }
    .time-str { font-size: 12px; font-weight: 700; color: var(--amber2); }
    .time-age { font-size: 9px; color: var(--amber4); margin-top: 2px; }

    /* Actions cell */
    .td-actions { width: 110px; text-align: right; white-space: nowrap; }
    .edt {
      background: none; border: 1px solid var(--amber5);
      color: var(--amber4); font-family: var(--font);
      font-size: 9px; letter-spacing: 0.08em;
      cursor: pointer; padding: 2px 6px; transition: all 0.1s;
    }
    .edt:hover { border-color: var(--amber2); color: var(--amber2); }
    .del {
      background: none; border: none; color: var(--amber5);
      font-family: var(--font); font-size: 11px; cursor: pointer;
      transition: color 0.1s; padding: 2px 4px;
    }
    .del:hover { color: var(--red); }

    /* Row priority left borders */
    .tbl-row.p-emergency { border-left: 3px solid var(--red);    background: rgba(255,51,51,0.03); }
    .tbl-row.p-urgent    { border-left: 3px solid var(--orange);  background: rgba(255,102,0,0.02); }
    .tbl-row.p-routine   { border-left: 3px solid var(--amber4); }

    /* ── Handover overlay ────────────────────────────────── */
    #handover-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(8,8,8,0.96); z-index: 200;
      align-items: center; justify-content: center;
    }
    #handover-overlay.show { display: flex; }
    .handover-box {
      background: var(--bg2); border: 1px solid var(--amber3);
      border-top: 3px solid var(--amber); padding: 0;
      max-width: 560px; width: 92%; max-height: 85vh;
      display: flex; flex-direction: column;
    }
    .ho-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; border-bottom: 1px solid var(--amber5);
      background: var(--bg3);
    }
    .ho-title { font-size: 11px; font-weight: 700; color: var(--amber); letter-spacing: 0.2em; }
    .ho-title::before { content: ">> "; color: var(--amber3); }
    .btn-ho-close {
      background: none; border: 1px solid var(--amber4); color: var(--amber3);
      font-family: var(--font); font-size: 9px; padding: 3px 8px; cursor: pointer;
    }
    .btn-ho-close:hover { border-color: var(--amber); color: var(--amber); }
    .ho-body {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .ho-text {
      padding: 16px 20px; font-size: 11px; line-height: 1.9;
      color: var(--amber2); white-space: pre-wrap; font-family: var(--font);
      background: var(--bg);
    }
    .ho-foot {
      padding: 12px 20px; border-top: 1px solid var(--amber5);
      display: flex; gap: 8px; justify-content: flex-end; background: var(--bg3);
    }
    .btn-copy {
      padding: 8px 22px; background: var(--amber4); border: 1px solid var(--amber);
      color: var(--amber); font-family: var(--font);
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em; cursor: pointer;
      transition: all 0.12s;
    }
    .btn-copy:hover   { background: var(--amber3); }
    .btn-copy.copied  { background: #0a3204; border-color: var(--green); color: var(--green); }

    /* ── Config overlay ──────────────────────────────────── */
    #config-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(8,8,8,0.97); z-index: 300;
      align-items: center; justify-content: center;
    }
    #config-overlay.show { display: flex; }
    .config-box {
      background: var(--bg2); border: 1px solid var(--amber3);
      padding: 28px; max-width: 460px; width: 90%;
    }
    .config-title { font-size: 13px; font-weight: 700; color: var(--amber); letter-spacing: 0.15em; margin-bottom: 4px; }
    .config-title::before { content: "// "; color: var(--amber4); }
    .config-sub   { font-size: 10px; color: var(--amber3); margin-bottom: 18px; line-height: 1.7; }
    .config-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .config-field  { display: flex; flex-direction: column; gap: 4px; }
    .config-lbl    { font-size: 8px; color: var(--amber3); letter-spacing: 0.2em; }
    .config-lbl::before { content: "$ "; color: var(--amber4); }
    .config-inp {
      background: var(--bg); border: 1px solid var(--amber4);
      color: var(--amber); font-family: var(--font); font-size: 11px;
      padding: 7px 10px; outline: none; transition: border-color 0.12s;
    }
    .config-inp:focus { border-color: var(--amber); }
    .btn-connect {
      width: 100%; padding: 10px; background: var(--amber4);
      border: 1px solid var(--amber); color: var(--amber);
      font-family: var(--font); font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; cursor: pointer;
    }
    .btn-connect:hover { background: var(--amber3); }
    .config-note { margin-top: 12px; font-size: 9px; color: var(--amber4); line-height: 1.8; }

    /* ── Loading / empty / statusbar ─────────────────────── */
    #loading {
      padding: 50px 24px; text-align: center;
      color: var(--amber3); font-size: 11px; letter-spacing: 0.15em;
    }
    .spinner {
      width: 20px; height: 20px; margin: 0 auto 12px;
      border: 1px solid var(--amber4); border-top-color: var(--amber);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #empty {
      display: none; padding: 50px 24px; text-align: center;
      color: var(--amber4); font-size: 11px; letter-spacing: 0.2em;
    }
    #empty::before { content: "> "; }

    #statusbar {
      position: sticky; bottom: 0;
      background: var(--bg3); border-top: 1px solid var(--amber4);
      padding: 6px 24px; display: flex; justify-content: space-between; align-items: center;
    }
    .status-left { display: flex; gap: 20px; align-items: center; }
    .status-item { font-size: 9px; color: var(--amber3); letter-spacing: 0.1em; }
    .status-item strong { color: var(--amber); }
    .btn-clr {
      background: transparent; border: 1px solid var(--amber5);
      color: var(--amber4); font-family: var(--font);
      font-size: 9px; letter-spacing: 0.1em; padding: 3px 10px; cursor: pointer; transition: all 0.1s;
    }
    .btn-clr:hover { border-color: var(--red); color: var(--red); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 680px) {
      .header-clock { display: none; }
      .header-stats .stat-cell:nth-child(n+4) { display: none; }
      .drawer-body { grid-template-columns: 1fr 1fr; }
      .field.s4 { grid-column: span 2; }
      .td-type { display: none; }
    }
  </style>
</head>
<body>


<!-- Handover overlay -->
<div id="handover-overlay">
  <div class="handover-box">
    <div class="ho-head">
      <span class="ho-title">HANDOVER_EXPORT</span>
      <button class="btn-ho-close" onclick="closeHandover()">ESC</button>
    </div>
    <div class="ho-body">
      <div class="ho-text" id="ho-text"></div>
    </div>
    <div class="ho-foot">
      <button class="btn-ho-close" onclick="closeHandover()">CLOSE</button>
      <button class="btn-copy" id="copy-btn" onclick="copyHandover()">COPY TO CLIPBOARD ▸</button>
    </div>
  </div>
</div>

<!-- Header -->
<div id="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-line1">OCT<span>//</span>01</div>
      <div class="logo-line2">ON-CALL TRACKER</div>
      <div class="logo-mode" id="shift-type-display">GIM + RENAL</div>
    </div>
    <div class="header-stats">
      <div class="stat-cell">
        <div class="stat-val emerg" id="stat-emerg">0</div>
        <div class="stat-key">EMERGENCY</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val urg" id="stat-urg">0</div>
        <div class="stat-key">URGENT</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="stat-pend">0</div>
        <div class="stat-key">PENDING</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="stat-done">0</div>
        <div class="stat-key">DONE</div>
      </div>
    </div>
    <div class="header-clock">
      <div class="clock-time" id="clock">00:00:00</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="shift-info" id="shift-duration"></div>
      <div class="sync-live" id="sync-live"><span class="sync-dot"></span>LIVE</div>
    </div>
  </div>
</div>

<!-- Priority strip -->
<div id="priority-strip"></div>

<!-- Command bar -->
<div id="cmdbar">
  <span class="cmd-prompt">oct&gt;</span>
  <div id="status-filters">
    <button class="cmd-btn active" data-filter="active">--active</button>
    <button class="cmd-btn" data-filter="completed">--done</button>
    <button class="cmd-btn" data-filter="all">--all</button>
  </div>
  <select class="cmd-select" id="pri-filter">
    <option value="all">--priority=all</option>
    <option value="emergency">--priority=emergency</option>
    <option value="urgent">--priority=urgent</option>
    <option value="routine">--priority=routine</option>
  </select>
  <select class="cmd-select" id="type-filter">
    <option value="all">--type=all</option>
    <option value="handover">--type=handover</option>
    <option value="referral-in">--type=referral-in</option>
    <option value="referral-out">--type=referral-out</option>
    <option value="review">--type=review</option>
    <option value="bloods">--type=bloods</option>
    <option value="imaging">--type=imaging</option>
    <option value="procedure">--type=procedure</option>
    <option value="escalation">--type=escalation</option>
    <option value="other">--type=other</option>
  </select>
  <div class="cmd-right">
    <button class="btn-handover" onclick="openHandover()">HANDOVER ▸▸</button>
    <button class="btn-new" onclick="openDrawer()">NEW_JOB +</button>
  </div>
</div>

<!-- Add / Edit drawer -->
<div id="add-drawer">
  <div class="drawer-head">
    <span class="drawer-prompt">oct&gt; <strong id="drawer-mode-label">job.create</strong> --interactive</span>
    <button class="btn-esc" onclick="closeDrawer()">ESC</button>
  </div>
  <div class="drawer-body">
    <!-- Row 1 -->
    <div class="field">
      <label class="lbl">patient_id *</label>
      <input class="inp" id="f-patient" placeholder="JD" maxlength="8" />
    </div>
    <div class="field">
      <label class="lbl">location</label>
      <input class="inp no-caps" id="f-location" placeholder="Ward 5B" maxlength="20" />
    </div>
    <div class="field">
      <label class="lbl">time_in</label>
      <input class="inp" id="f-time" type="time" />
    </div>
    <div class="field">
      <label class="lbl">on-call</label>
      <select class="inp" id="f-oncall">
        <option value="GIM">GIM</option>
        <option value="Renal">Renal</option>
        <option value="Both">Both</option>
      </select>
    </div>
    <!-- Row 2 — priority -->
    <div class="field s4">
      <label class="lbl">priority *</label>
      <div class="priority-grid">
        <button class="pri-btn sel-routine" data-p="routine"    onclick="setPriority('routine')">ROUTINE</button>
        <button class="pri-btn"             data-p="urgent"     onclick="setPriority('urgent')">URGENT</button>
        <button class="pri-btn"             data-p="emergency"  onclick="setPriority('emergency')">!! EMERGENCY</button>
      </div>
    </div>
    <!-- Row 3 — task type -->
    <div class="field s4">
      <label class="lbl">job_type *</label>
      <div class="type-grid" id="type-grid"></div>
    </div>
    <!-- Row 4 — task description -->
    <div class="field s4">
      <label class="lbl">task_description *</label>
      <input class="inp no-caps" id="f-task" placeholder="describe the job..." />
    </div>
    <!-- Row 5 — notes -->
    <div class="field s4">
      <label class="lbl">notes</label>
      <textarea class="inp no-caps" id="f-notes" placeholder="// background, relevant history, actions taken so far..."></textarea>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn-abort" onclick="closeDrawer()">ABORT</button>
    <button class="btn-exec" id="drawer-exec-btn" onclick="saveJob()">EXECUTE ▸</button>
  </div>
</div>

<!-- Task table -->
<div id="loading"><div class="spinner"></div>CONNECTING TO FIREBASE...</div>
<table id="task-table">
  <thead>
    <tr class="tbl-head">
      <th></th>
      <th>PRIORITY</th>
      <th>PATIENT</th>
      <th>TYPE</th>
      <th>JOB</th>
      <th style="text-align:right">TIME</th>
      <th style="text-align:right">ACTIONS</th>
    </tr>
  </thead>
  <tbody id="task-body"></tbody>
</table>
<div id="empty">no jobs on the list</div>

<!-- Status bar -->
<div id="statusbar">
  <div class="status-left">
    <span class="status-item"><strong id="sb-pend">0</strong> pending</span>
    <span class="status-item"><strong id="sb-done">0</strong> done</span>
    <span class="status-item" id="sb-sync" style="color:var(--amber4)">db: --</span>
  </div>
  <button class="btn-clr" onclick="clearShift()">END_SHIFT</button>
</div>

<script>
// ── Constants ────────────────────────────────────────────────
const JOB_TYPES = [
  { label:"Handover",     key:"handover",     color:"#ffb000" },
  { label:"Referral In",  key:"referral-in",  color:"#00bfff" },
  { label:"Referral Out", key:"referral-out", color:"#bf7fff" },
  { label:"Review",       key:"review",       color:"#39ff14" },
  { label:"Bloods",       key:"bloods",       color:"#ff9944" },
  { label:"Imaging",      key:"imaging",      color:"#ff9944" },
  { label:"Procedure",    key:"procedure",    color:"#ff6600" },
  { label:"Escalation",   key:"escalation",   color:"#ff3333" },
  { label:"Other",        key:"other",        color:"#5a4a2a" },
];

const PRI_ORDER = { emergency: 0, urgent: 1, routine: 2 };

// ── State ────────────────────────────────────────────────────
let tasks = {}, filterStatus="active", filterPri="all", filterType="all";
let selPriority = "routine";
let selType     = JOB_TYPES[0];
let editingId   = null;
let shiftStart  = Date.now();

// ── Helpers ──────────────────────────────────────────────────
const nowTimeStr = () => new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
const esc        = s  => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtTime    = s  => s || "--:--";
const typeObj    = k  => JOB_TYPES.find(t=>t.key===k) || JOB_TYPES[JOB_TYPES.length-1];

function timeAgo(timeStr) {
  if (!timeStr) return "";
  const [h,m] = timeStr.split(":").map(Number);
  const now = new Date();
  const then = new Date();
  then.setHours(h, m, 0, 0);
  const diff = Math.round((now - then) / 60000);
  if (diff < 0)   return "";
  if (diff < 60)  return `${diff}m ago`;
  return `${Math.floor(diff/60)}h ${diff%60}m`;
}

// ── Clock ────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  document.getElementById("clock-date").textContent =
    now.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}).toUpperCase();
  // Shift duration
  const mins = Math.floor((Date.now() - shiftStart) / 60000);
  const h = Math.floor(mins/60), m = mins%60;
  document.getElementById("shift-duration").textContent =
    `shift: ${h}h ${m}m`;
}
tickClock();
setInterval(tickClock, 1000);


// ── Firebase ─────────────────────────────────────────────────
function initFirebase() {
  const { onValue, tasksRef } = window._fb;

  document.getElementById("sync-live").style.display = "block";
  document.getElementById("sb-sync").textContent = "db: connected";
  document.getElementById("sb-sync").style.color = "var(--amber3)";

  onValue(tasksRef, snap => {
    tasks = snap.val() || {};
    render();
    document.getElementById("loading").style.display = "none";
    document.getElementById("task-table").classList.add("show");
  });
}

// 👇 THIS replaces the old listener
if (window._fb) {
  initFirebase();
} else {
  window.addEventListener("firebase-ready", initFirebase);
}
// ── Type grid ────────────────────────────────────────────────
function buildTypeGrid() {
  const grid = document.getElementById("type-grid");
  grid.innerHTML = "";
  JOB_TYPES.forEach(t => {
    const b = document.createElement("button");
    b.className = "type-btn" + (t.key===selType.key?" sel":"");
    b.textContent = t.label;
    b.onclick = () => { selType = t; buildTypeGrid(); };
    grid.appendChild(b);
  });
}

// ── Priority selector ────────────────────────────────────────
function setPriority(p) {
  selPriority = p;
  document.querySelectorAll(".pri-btn").forEach(b => {
    const bp = b.dataset.p;
    b.className = "pri-btn" + (bp===p ? ` sel-${bp}` : "");
  });
}

// ── Drawer ───────────────────────────────────────────────────
function openDrawer(taskId) {
  editingId = taskId || null;
  const task = editingId ? tasks[editingId] : null;

  document.getElementById("drawer-mode-label").textContent = task ? "job.edit" : "job.create";
  document.getElementById("drawer-exec-btn").textContent   = task ? "UPDATE ▸" : "EXECUTE ▸";

  if (task) {
    document.getElementById("f-patient").value  = task.patient  || "";
    document.getElementById("f-location").value = task.location || "";
    document.getElementById("f-time").value     = task.timeIn   || "";
    document.getElementById("f-oncall").value   = task.oncall   || "GIM";
    document.getElementById("f-task").value     = task.task     || "";
    document.getElementById("f-notes").value    = task.notes    || "";
    selPriority = task.priority || "routine";
    selType = typeObj(task.type);
    setPriority(selPriority);
  } else {
    ["f-patient","f-location","f-task","f-notes"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("f-time").value   = nowTimeStr();
    document.getElementById("f-oncall").value = "GIM";
    selPriority = "routine";
    selType = JOB_TYPES[0];
    setPriority("routine");
  }

  buildTypeGrid();
  document.getElementById("add-drawer").classList.add("open");
  document.getElementById("f-patient").focus();
}
function closeDrawer() {
  document.getElementById("add-drawer").classList.remove("open");
  editingId = null;
}

// ── Save job ─────────────────────────────────────────────────
function saveJob() {
  const patient = document.getElementById("f-patient").value.trim().toUpperCase();
  const task    = document.getElementById("f-task").value.trim();
  if (!patient || !task) {
    if (!patient) document.getElementById("f-patient").focus();
    else          document.getElementById("f-task").focus();
    return;
  }

  const payload = {
    patient,
    location: document.getElementById("f-location").value.trim(),
    timeIn:   document.getElementById("f-time").value,
    oncall:   document.getElementById("f-oncall").value,
    priority: selPriority,
    type:     selType.key,
    task,
    notes:    document.getElementById("f-notes").value.trim(),
  };

  if (editingId) {
    const { db, ref, update } = window._fb;
    update(ref(db, `onCallTasks/${editingId}`), payload);
  } else {
    window._fb.push(window._fb.tasksRef, {
      ...payload, completed: false, createdAt: Date.now(), completedAt: null,
    });
  }
  closeDrawer();
}

// ── Mutations ────────────────────────────────────────────────
function toggleDone(id) {
  const t = tasks[id]; if (!t) return;
  const { db, ref, update } = window._fb;
  update(ref(db,`onCallTasks/${id}`),{
    completed: !t.completed,
    completedAt: !t.completed ? Date.now() : null,
  });
  const el = document.querySelector(`#tr-${id} .cb`);
  if (el) { el.style.transform="scale(1.35)"; setTimeout(()=>el.style.transform="",180); }
}
function deleteJob(id) {
  const { db, ref, remove } = window._fb;
  remove(ref(db, `onCallTasks/${id}`));
}
function toggleExpand(id) {
  document.getElementById("tr-"+id)?.classList.toggle("expanded");
}
function clearShift() {
  if (!confirm("END_SHIFT: clear all tasks? This cannot be undone.")) return;
  const { db, ref, set } = window._fb;
  set(ref(db, "onCallTasks"), null);
}

// ── Handover export ──────────────────────────────────────────
function openHandover() {
  const all = Object.values(tasks);
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  const timeStr = now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

  let out = "";
  out += `OCT // ON-CALL HANDOVER\n`;
  out += `${"─".repeat(44)}\n`;
  out += `${dateStr.toUpperCase()} :: ${timeStr}\n`;
  out += `${"─".repeat(44)}\n\n`;

  const pending   = all.filter(t=>!t.completed).sort((a,b)=>PRI_ORDER[a.priority]-PRI_ORDER[b.priority]);
  const completed = all.filter(t=> t.completed).sort((a,b)=>(a.timeIn||"").localeCompare(b.timeIn||""));

  if (pending.length) {
    out += `!! OUTSTANDING (${pending.length})\n${"─".repeat(44)}\n`;
    pending.forEach(t => {
      out += `[${(t.priority||"routine").toUpperCase().padEnd(9)}] `;
      out += `${(t.patient||"?").padEnd(6)} `;
      out += `${(t.type||"other").padEnd(12)} `;
      out += `@${t.timeIn||"??:??"} `;
      out += `${t.oncall||""}\n`;
      out += `  >> ${t.task}\n`;
      if (t.location) out += `  // ward: ${t.location}\n`;
      if (t.notes)    out += `  // ${t.notes}\n`;
      out += "\n";
    });
  }

  if (completed.length) {
    out += `✓ COMPLETED (${completed.length})\n${"─".repeat(44)}\n`;
    completed.forEach(t => {
      out += `[DONE      ] `;
      out += `${(t.patient||"?").padEnd(6)} `;
      out += `${(t.type||"other").padEnd(12)} `;
      out += `@${t.timeIn||"??:??"}\n`;
      out += `  >> ${t.task}\n`;
      if (t.notes) out += `  // ${t.notes}\n`;
      out += "\n";
    });
  }

  if (!pending.length && !completed.length) {
    out += "// no jobs recorded this shift\n";
  }

  out += `${"─".repeat(44)}\n`;
  out += `// generated by OCT v1.0 :: on-call tracker`;

  document.getElementById("ho-text").textContent = out;
  document.getElementById("copy-btn").textContent = "COPY TO CLIPBOARD ▸";
  document.getElementById("copy-btn").classList.remove("copied");
  document.getElementById("handover-overlay").classList.add("show");
}
function closeHandover() {
  document.getElementById("handover-overlay").classList.remove("show");
}
function copyHandover() {
  const text = document.getElementById("ho-text").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ COPIED";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "COPY TO CLIPBOARD ▸";
      btn.classList.remove("copied");
    }, 2500);
  });
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const tbody = document.getElementById("task-body");
  const empty = document.getElementById("empty");

  let arr = Object.entries(tasks).map(([id,t])=>({id,...t}));
  if (filterStatus==="active")    arr=arr.filter(t=>!t.completed);
  if (filterStatus==="completed") arr=arr.filter(t=> t.completed);
  if (filterPri!=="all")          arr=arr.filter(t=>t.priority===filterPri);
  if (filterType!=="all")         arr=arr.filter(t=>t.type===filterType);

  // Sort: emergency first, then urgent, then routine; within each by time
  arr.sort((a,b) => {
    const pd = (PRI_ORDER[a.priority]||2) - (PRI_ORDER[b.priority]||2);
    if (pd !== 0) return pd;
    return (a.timeIn||"").localeCompare(b.timeIn||"");
  });

  // Stats
  const all       = Object.values(tasks);
  const pending   = all.filter(t=>!t.completed);
  const emergCt   = pending.filter(t=>t.priority==="emergency").length;
  const urgCt     = pending.filter(t=>t.priority==="urgent").length;
  const doneCt    = all.filter(t=>t.completed).length;

  document.getElementById("stat-emerg").textContent = emergCt;
  document.getElementById("stat-urg").textContent   = urgCt;
  document.getElementById("stat-pend").textContent  = pending.length;
  document.getElementById("stat-done").textContent  = doneCt;
  document.getElementById("sb-pend").textContent    = pending.length;
  document.getElementById("sb-done").textContent    = doneCt;

  // Priority strip
  const strip = document.getElementById("priority-strip");
  if (emergCt > 0) {
    strip.className = "show emerg";
    strip.textContent = `!! ${emergCt} EMERGENCY JOB${emergCt>1?"S":""} OUTSTANDING !!`;
  } else if (urgCt > 0) {
    strip.className = "show urg";
    strip.textContent = `▲ ${urgCt} URGENT JOB${urgCt>1?"S":""} OUTSTANDING`;
  } else {
    strip.className = "";
  }

  tbody.innerHTML = "";
  if (arr.length===0) { empty.style.display="block"; return; }
  empty.style.display = "none";

  // Sections for active view
  const groups = filterStatus==="active"
    ? [
        { label:"EMERGENCY", items:arr.filter(t=>t.priority==="emergency"&&!t.completed) },
        { label:"URGENT",    items:arr.filter(t=>t.priority==="urgent"&&!t.completed) },
        { label:"ROUTINE",   items:arr.filter(t=>t.priority==="routine"&&!t.completed) },
      ].filter(g=>g.items.length)
    : [{ label:null, items:arr }];

  groups.forEach(g => {
    if (g.label) {
      const sep = document.createElement("tr");
      sep.className = "tbl-section";
      sep.innerHTML = `<td colspan="7" data-count="${g.items.length}">${g.label}</td>`;
      tbody.appendChild(sep);
    }
    g.items.forEach(task => tbody.appendChild(buildRow(task)));
  });
}

function buildRow(task) {
  const t    = typeObj(task.type);
  const pri  = task.priority || "routine";

  const tr = document.createElement("tr");
  tr.className = `tbl-row p-${pri}${task.completed?" done":""}`;
  tr.id = "tr-"+task.id;

  tr.innerHTML = `
    <td class="td-cb">
      <button class="cb${task.completed?" checked":""}" onclick="toggleDone('${task.id}')">
        ${task.completed?"✓":""}
      </button>
    </td>
    <td class="td-pri">
      <span class="pri-badge pri-${pri}">${pri.toUpperCase()}</span>
    </td>
    <td class="td-patient">
      <div class="patient-str">${esc(task.patient||"?")}</div>
      ${task.location?`<div style="font-size:9px;color:var(--amber4)">${esc(task.location)}</div>`:""}
      ${task.oncall?`<div style="font-size:9px;color:var(--amber4)">${esc(task.oncall)}</div>`:""}
    </td>
    <td class="td-type">
      <span class="type-pill" style="border-color:${t.color};color:${t.color}">${t.label}</span>
    </td>
    <td class="td-task" onclick="toggleExpand('${task.id}')">
      <div class="task-str">${esc(task.task||"")}</div>
      ${task.notes?`<div class="task-notes">// ${esc(task.notes)}</div>`:""}
    </td>
    <td class="td-time">
      <div class="time-str">${fmtTime(task.timeIn)}</div>
      <div class="time-age" id="age-${task.id}">${timeAgo(task.timeIn)}</div>
    </td>
    <td class="td-actions">
      ${!task.completed?`<button class="edt" onclick="openDrawer('${task.id}')">EDIT</button>`:""}
      <button class="del" onclick="deleteJob('${task.id}')">✕</button>
    </td>`;
  return tr;
}

// Refresh time-ago every minute
setInterval(() => {
  Object.keys(tasks).forEach(id => {
    const el = document.getElementById("age-"+id);
    if (el && tasks[id]) el.textContent = timeAgo(tasks[id].timeIn);
  });
}, 60000);

// ── Controls ─────────────────────────────────────────────────
document.getElementById("status-filters").addEventListener("click", e => {
  if (!e.target.dataset.filter) return;
  filterStatus = e.target.dataset.filter;
  document.querySelectorAll(".cmd-btn[data-filter]").forEach(b =>
    b.classList.toggle("active", b.dataset.filter===filterStatus));
  render();
});
document.getElementById("pri-filter").addEventListener("change",  e=>{filterPri=e.target.value; render();});
document.getElementById("type-filter").addEventListener("change", e=>{filterType=e.target.value; render();});

// ── PWA ──────────────────────────────────────────────────────
const mf = {
  name:"OCT On-Call Tracker", short_name:"OCT",
  start_url:"./", display:"standalone",
  background_color:"#080808", theme_color:"#080808",
  icons:[{
    src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080808'/><text y='65' x='50' text-anchor='middle' font-size='38' font-family='monospace' fill='%23ffb000'>OCT</text></svg>",
    sizes:"192x192", type:"image/svg+xml"
  }]
};
document.getElementById("pwa-manifest").href = URL.createObjectURL(
  new Blob([JSON.stringify(mf)], {type:"application/json"})
);
</script>
</body>
</html>
